  // ---------- 答题引擎（全屏层，诊断 tab 与图谱共用） ----------
  const quizScreen = document.getElementById('quiz-screen');
  const quizBody = document.getElementById('quiz-body');
  function buildQuizItems(questions) {
    return shuffle(questions).map(q => {
      if (q.type === 'choice') {
        const opts = q.options.map((text, i) => ({
          text: String(text).replace(/^[A-D][.、．]\s*/, ''),
          correct: 'ABCD'[i] === q.answer,
        }));
        return { topicId: q.topicId, type: 'choice', q: q.q, options: shuffle(opts), explain: q.explain };
      }
      return { topicId: q.topicId, type: 'judge', q: q.q, answer: !!q.answer, explain: q.explain };
    });
  }
  function showQuizScreen() { quizScreen.classList.add('show'); }
  function hideQuizScreen() { quizScreen.classList.remove('show'); }
  function startNodeQuiz(topicId, returnTo) {
    const qs = quizByTopic.get(topicId);
    if (!qs || !qs.length) { toast('该知识点题库建设中'); return; }
    quiz = { mode: 'node', topicId, returnTo: returnTo || 'map', items: buildQuizItems(qs), idx: 0, answers: {}, scored: false };
    showQuizScreen();
    renderQuiz();
  }
  function startQuickQuiz(grade, subject) {
    diagFlow = { step: 'subject' };   // 答题结束后回诊断 tab 是首页（hero 按是否诊断过收起）
    const subj = subject || '道德与法治';
    const pool = topics.filter(t => t.subject === subj
      && t.gradeRangeStart <= grade && t.gradeRangeEnd >= grade && quizByTopic.has(t.id));
    const pickedTopics = shuffle(pool).slice(0, Math.min(10, pool.length));
    if (!pickedTopics.length) { toast('该年级题库建设中'); return; }
    const qs = pickedTopics.map(t => {
      const arr = quizByTopic.get(t.id);
      return arr[Math.floor(Math.random() * arr.length)];
    });
    quiz = { mode: 'quick', grade, subject: subj, returnTo: 'diag', items: buildQuizItems(qs), idx: 0, answers: {}, scored: false };
    showQuizScreen();
    renderQuiz();
  }
  function exitQuiz() {
    const mode = quiz && quiz.mode;
    const topicId = quiz && quiz.topicId;
    const returnTo = quiz && quiz.returnTo;
    quiz = null;
    hideQuizScreen();
    if (mode === 'node') {
      if (returnTo === 'plan') { switchTab('plan'); }
      else if (returnTo === 'today') { switchTab('today'); }
      else if (returnTo === 'course') { /* 课程层仍在下方，无需切换 */ }
      else { switchTab('map'); selectTopic(topicId); }
    }
  }
  let quizTimer = null;
  function renderQuiz() {
    if (!quiz) return;
    if (quiz.idx >= quiz.items.length) { renderQuizResult(); return; }
    clearTimeout(quizTimer); quizTimer = null;
    const item = quiz.items[quiz.idx];
    const it = topicById.get(item.topicId);
    const ans = quiz.answers[quiz.idx];          // 已答题保留选中态，可返回修改
    const answered = !!ans;
    let optsHtml;
    if (item.type === 'choice') {
      optsHtml = item.options.map((o, i) => {
        let cls = 'quiz-opt';
        if (answered) {
          if (o.correct) cls += ' correct';
          else if (ans.picked === i) cls += ' wrong';
        }
        return `<button class="${cls}" data-i="${i}">${esc(o.text)}</button>`;
      }).join('');
    } else {
      const jbtn = (val, label) => {
        let cls = 'quiz-opt judge';
        if (answered) {
          if (item.answer === val) cls += ' correct';
          else if (ans.picked === val) cls += ' wrong';
        }
        return `<button class="${cls}" data-v="${val ? 1 : 0}">${label}</button>`;
      };
      optsHtml = `<div class="quiz-judge">${jbtn(true, '✓ 对')}${jbtn(false, '✗ 错')}</div>`;
    }
    const ok = answered && ans.ok;
    const title = quiz.mode === 'node'
      ? `测一测：<span style="color:${it._color}">${esc(it.name)}</span>`
      : `快速诊断 · ${quiz.grade} 年级 ${esc(quiz.subject)}`;
    quizBody.innerHTML = `
      <h2>${title}</h2>
      <div class="quiz-meta">第 ${quiz.idx + 1} / ${quiz.items.length} 题 · ${item.type === 'choice' ? '单选题' : '判断题'}${quiz.mode === 'quick' ? ` · 知识点：<span style="color:${it._color}">${esc(it.name)}</span>` : ''}</div>
      <div class="quiz-q">${esc(item.q)}</div>
      <div class="quiz-opts">${optsHtml}</div>
      ${answered ? `<div class="quiz-fb ${ok ? 'ok' : 'bad'}">${ok ? '✓ 回答正确' : '✗ 回答错误'}</div>
        ${!ok ? `<div class="err-row" id="qerr">错因：${['concept', 'transfer', 'careless'].map(k =>
          `<button class="err-chip ${((ans.err || 'transfer') === k) ? 'on' : ''}" data-err="${k}">${ERR_CN[k]}</button>`).join('')}</div>` : ''}
        <div class="quiz-explain">${esc(item.explain)}</div>` : ''}
      <div class="quiz-nav">
        ${quiz.idx > 0 ? '<button class="tbtn quiz-prev" id="quiz-prev">‹ 上一题</button>' : '<span></span>'}
        ${answered ? `<button class="tbtn quiz-next" id="quiz-next">${quiz.idx + 1 < quiz.items.length ? '下一题 ›' : '查看结果 ›'}</button>` : '<span class="quiz-auto">作答后自动进入下一题</span>'}
      </div>
      <button class="diag-exit" id="quiz-exit">‹ 退出答题</button>
      <div style="height:20px"></div>`;
    quizBody.querySelector('#quiz-exit').onclick = exitQuiz;
    quizBody.querySelectorAll('.quiz-opt').forEach(btn => btn.onclick = () => {
      let ok2, answerText, picked;
      if (item.type === 'choice') {
        picked = +btn.dataset.i;
        ok2 = item.options[picked].correct;
        answerText = item.options[picked].text;
      } else {
        picked = btn.dataset.v === '1';
        ok2 = (picked === item.answer);
        answerText = picked ? '对' : '错';
      }
      quiz.answers[quiz.idx] = { item, ok: ok2, answerText, picked };
      const cur = quiz.idx;
      renderQuiz();
      // 300ms+ 正误反馈后自动进入下一题
      quizTimer = setTimeout(() => {
        if (quiz && quiz.idx === cur && quiz.answers[cur]) {
          quiz.idx++;
          renderQuiz();
        }
      }, 550);
    });
    quizBody.querySelectorAll('#qerr .err-chip').forEach(c => c.onclick = () => {
      quiz.answers[quiz.idx].err = c.dataset.err;
      quizBody.querySelectorAll('#qerr .err-chip').forEach(x => x.classList.toggle('on', x === c));
    });
    const pv = quizBody.querySelector('#quiz-prev');
    if (pv) pv.onclick = () => { clearTimeout(quizTimer); quiz.idx--; renderQuiz(); };
    const nx = quizBody.querySelector('#quiz-next');
    if (nx) nx.onclick = () => { clearTimeout(quizTimer); quiz.idx++; renderQuiz(); };
  }
  function quizResults() {   // 按题号顺序汇总作答
    return quiz.items.map((it, i) => quiz.answers[i]).filter(Boolean);
  }
  function renderQuizResult() {
    const results = quizResults();
    const total = results.length;
    const okCount = results.filter(r => r.ok).length;
    if (quiz.mode === 'node') {
      const t = topicById.get(quiz.topicId);
      const allOk = total > 0 && okCount === total;
      if (!quiz.scored) {
        quiz.scored = true;
        for (const r of results) applyAnswer(quiz.topicId, r.ok, r.err);   // 逐题记连续值掌握度
      }
      const wrong = results.filter(r => !r.ok);
      const wrongHtml = wrong.map((r, wi) => {
        const ansTxt = r.item.type === 'choice' ? esc(r.item.options.find(o => o.correct).text) : (r.item.answer ? '对' : '错');
        return `<div class="quiz-wr">
          <div class="wr-q">${esc(r.item.q)}</div>
          <div>你的答案：${esc(r.answerText)} · <span class="wr-a">正确答案：${ansTxt}</span></div>
          <div class="wr-e">${esc(r.item.explain)}</div>
          <div class="err-row" data-i="${quiz.items.indexOf(r.item)}">错因：${['concept', 'transfer', 'careless'].map(k =>
            `<button class="err-chip ${((r.err || 'transfer') === k) ? 'on' : ''}" data-err="${k}">${ERR_CN[k]}</button>`).join('')}</div>
        </div>`;
      }).join('');
      const mNow = mv(quiz.topicId);
      const course = courseOf(quiz.topicId);
      quizBody.innerHTML = `
        <h2 style="color:${t._color}">测一测结果：${esc(t.name)}</h2>
        <div class="quiz-score" style="color:${allOk ? 'var(--green-bright)' : 'var(--bad)'}">${okCount} / ${total}</div>
        <div class="quiz-meta">当前掌握度 ${Math.round((mNow || 0) * 100)}%（${mState(quiz.topicId) === 'yes' ? '已掌握' : mState(quiz.topicId) === 'mid' ? '在进步' : '还不会'}）· 答对 +34%，答错 -50%，练到 67% 以上算真掌握</div>
        ${allOk
          ? `<div class="quiz-fb ok">全部答对，掌握度已提升 ✓</div>`
          : `<div class="quiz-fb bad">有 ${wrong.length} 道题答错，掌握度已扣减；标一下错因，复习更有针对性</div>
             <h3>错题回顾</h3>${wrongHtml}
             <button class="tbtn quiz-entry" id="qr-diag">帮我找原因 ›</button>
             ${course ? `<button class="tbtn quiz-entry" id="qr-course">看配套课程 ›</button>` : ''}`}
        <button class="tbtn quiz-next" id="qr-retest">再测一次（题目与选项重新打乱）</button>
        <button class="diag-exit" id="qr-back">‹ 返回</button>
        <div style="height:20px"></div>`;
      quizBody.querySelector('#qr-retest').onclick = () => startNodeQuiz(quiz.topicId, quiz.returnTo);
      quizBody.querySelector('#qr-back').onclick = exitQuiz;
      const qd = quizBody.querySelector('#qr-diag');
      if (qd) qd.onclick = () => {

  // ---------- 诊断 tab（主入口：hero + 说一说 / 测一测 / 拍整卷） ----------
  const diagBody = document.getElementById('diag-body');

    try { return JSON.parse(localStorage.getItem('cnk12_lastdiag') || 'null'); } catch (e) { return null; }
  }
  const SAY_EXAMPLES = ['文言文翻译老丢分', '作文总写跑题', '分数应用题不会', '古诗背了就忘'];
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;
  // 本地 2-gram 匹配：topics 的 name/description + coaching 的 ask/pattern，name 命中权重最高
  function sayMatch(q) {
    const s = q.replace(/[\s，。、！？,.!?「」『』“”"'：:；;（）()]/g, '');
    if (s.length < 2) return [];
    const grams = new Set();
    for (let i = 0; i < s.length - 1; i++) grams.add(s.slice(i, i + 2));
    const scored = [];
    for (const t of topics) {
      const c = coaching[t.id];
      const aux = c ? `${c.ask || ''} ${c.pattern || ''}` : '';
      let score = 0;
      for (const g of grams) {
        if (t.name.includes(g)) score += 3;
        else if (aux.includes(g)) score += 2;
        else if (t.description.includes(g)) score += 1;
      }
      if (score > 0) scored.push({ t, score });
    }
    scored.sort((a, b) => b.score - a.score || a.t.gradeRangeStart - b.t.gradeRangeStart);
    return scored.slice(0, 5).map(x => x.t);
  }
  function sayHitCard(t) {
    const c = coaching[t.id];
    const m = mastery[t.id];
    const ask = c && c.ask ? c.ask
      : (t.evidence && t.evidence.length ? `你孩子能做到：${t.evidence[0]}吗？` : t.description.slice(0, 46) + '…');
    const mHtml = m === 'yes' ? '<span class="sh-m yes">已掌握 ✓</span>'
      : m === 'no' ? '<span class="sh-m no">还不会</span>' : '<span class="sh-m none">未测过</span>';
    return `<div class="say-hit" data-id="${t.id}">
      <div class="sh-name" style="color:${t._color}">${esc(t.name)}</div>
      <div class="sh-ask">${esc(ask)}</div>

    </div>`;
  }
  function renderSay() {
    diagBody.innerHTML = `
      <div class="card">
        <h3>说一说孩子的情况</h3>

        : `<div class="card" style="margin-top:12px"><h3>没直接匹配到</h3><div class="c-sub">换个说法试试，比如：${SAY_EXAMPLES.map(e => `<span class="say-ex">${e}</span>`).join('')}<br>或者直接用「测一测」随机抽题排查。</div></div>`;

    }

  // ---------- 今日 tab（教练视角：忆 → 测练 → 学） ----------
  const todayBody = document.getElementById('today-body');
  const ERR_COACH = { concept: '概念还没吃透', transfer: '换个问法就容易错', careless: '会但容易粗心' };
  function weakestNode() {
    let best = null, bestV = Infinity;
    for (const t of topics) {
      const v = mv(t.id);
      if (v === null || v >= 0.67) continue;
      if (v < bestV) { bestV = v; best = t; }
    }
    return best;
  }
  function recallQueue() {
    const now = Date.now(), weak = [], stale = [];
    for (const t of topics) {
      const v = mv(t.id);
      if (v === null || !quizByTopic.has(t.id)) continue;
      if (v < 0.34) weak.push(t);                       // 还没消化，优先回忆
      else if (v >= 0.67) {
        const meta = masteryMeta[t.id];
        if (meta && meta.ts && now - meta.ts > 86400000) stale.push(t);   // 超 1 天没碰，防遗忘
      }
    }
    weak.sort((a, b) => mv(a.id) - mv(b.id));
    stale.sort((a, b) => (masteryMeta[a.id].ts || 0) - (masteryMeta[b.id].ts || 0));
    return weak.concat(stale).slice(0, 2);
  }
  function coachLine(weak) {
    if (!weak) return '目前没有薄弱点，去图谱里挑一个新知识点，往前推进一步。';
    const meta = masteryMeta[weak.id] || {};
    const reason = ERR_COACH[meta.err] || ERR_COACH.transfer;
    return `「${esc(weak.name)}」${reason}。今天先回忆旧题，再练新题——先回忆，后看答案。`;
  }

  // ---------- 今日打卡清单（R2：诊断输出 = 可执行计划） ----------
  const PLAN2_KEY = 'cnk12_plan2';
  let plan2 = null;
  try { plan2 = JSON.parse(localStorage.getItem(PLAN2_KEY) || 'null'); } catch (e) { plan2 = null; }
  function savePlan2() { try { localStorage.setItem(PLAN2_KEY, JSON.stringify(plan2)); } catch (e) {} }

  // 拓扑排序：前置没掌握的排前面（Kahn，同层按年级从低到高）
  function buildPlanIds() {
    const weak = Object.keys(mastery).filter(id => topicById.has(id) && mState(id) === 'no');
    if (!weak.length) return [];
    const inPlan = new Set(weak);
    for (const id of weak) {
      const chain = collectChain(id, prereqsOf);
      for (const pid of chain.keys()) if (mState(pid) !== 'yes') inPlan.add(pid);
    }
    const indeg = new Map(), adj = new Map();
    for (const id of inPlan) indeg.set(id, 0);
    for (const d of deps) {
      if (inPlan.has(d.topicId) && inPlan.has(d.prerequisiteId)) {
        indeg.set(d.topicId, indeg.get(d.topicId) + 1);
        if (!adj.has(d.prerequisiteId)) adj.set(d.prerequisiteId, []);
        adj.get(d.prerequisiteId).push(d.topicId);
      }
    }
    const byGrade = (a, b) => {
      const ta = topicById.get(a), tb = topicById.get(b);
      return ta.gradeRangeStart - tb.gradeRangeStart || a.localeCompare(b);
    };
    const avail = [...inPlan].filter(id => indeg.get(id) === 0).sort(byGrade);
    const out = [];
    while (avail.length) {
      const id = avail.shift();
      out.push(id);
      for (const nx of (adj.get(id) || [])) {
        indeg.set(nx, indeg.get(nx) - 1);
        if (indeg.get(nx) === 0) { avail.push(nx); avail.sort(byGrade); }
      }
    }
    for (const id of inPlan) if (!out.includes(id)) out.push(id);
    return out;
  }
  // 计划项：动作 + 预计分钟 + 验收标准 + 关联资源
  const PLAN_CAP = 8;   // 一次只做一件事：今日清单最多 8 项
  function toPlanItem(id) {
    const t = topicById.get(id);
    const course = courseOf(id);
    const coach = coaching[id];
    const hasQuiz = quizByTopic.has(id);
    const drillsN = coach && Array.isArray(coach.drills) ? coach.drills.length : 0;
    const minutes = (course ? 15 : 10) + (hasQuiz ? 5 : 0) + (drillsN ? 5 : 0);
    let criteria;
    if (hasQuiz) criteria = '测一测全部答对';
    else if (drillsN) criteria = `做完 ${drillsN} 道变式训练，核对答案能讲清错因`;
    else if (coach && coach.ask) criteria = coach.ask;
    else if (t.evidence && t.evidence.length) criteria = '能做到：' + t.evidence[0];
    else criteria = '能用自己的话给家长讲明白';
    // 有变式训练的知识点：动作直接落到"完成 N 道变式训练"（题在图谱节点详情的 coaching 卡里）
    const action = drillsN
      ? `学习「${t.name}」并完成 ${drillsN} 道变式训练`
      : `学习「${t.name}」`;
    return { id, action, minutes, criteria, done: false };
  }
  function buildTodayPlan(ids) {
    const capped = ids.slice(0, PLAN_CAP);
    plan2 = { date: todayStr(), items: capped.map(toPlanItem) };

    updatePlanBadge();

  }
  function updatePlanBadge() {

  const planBody = document.getElementById('plan-body');

    planBody.querySelectorAll('.todo-check').forEach(el => el.onclick = () => requireMember(() => {   // 非会员能看清单，不能打卡
      const it = plan2.items[+el.dataset.i];

      renderPlanTab();
    }));
    planBody.querySelectorAll('.todo-course').forEach(el => el.onclick = () => requireMember(() => {   // 付费墙：看课

  // ---------- 原生课程页（L4：国家平台有反嵌套保护，不再用 iframe；元数据渲染 + 新窗口打开官方页） ----------
  const courseScreen = document.getElementById('course-screen');

  const csTitle = document.getElementById('cs-title');
  const csQuizBtn = document.getElementById('cs-quiz');
  const csCheckin = document.getElementById('cs-checkin');
  let csCtx = null;   // { topicId, planKey, lesson, url, title }
  const WATCH_KEY = 'cnk12_watch';
  let watchLog = {};
  try { watchLog = JSON.parse(localStorage.getItem(WATCH_KEY) || '{}') || {}; } catch (e) { watchLog = {}; }
  function saveWatch() { try { localStorage.setItem(WATCH_KEY, JSON.stringify(watchLog)); } catch (e) {} }

  // 五件套呈现顺序：看视频 → 领任务单 → 做课后练习 → 课件 → 教学设计
  const PACK_ORDER = [['video', '看视频'], ['taskSheet', '领任务单'], ['exercise', '做课后练习'], ['courseware', '课件'], ['lessonPlan', '教学设计']];
  // 合规：标了 requiresAuth 的资源一律不直链文件本体，统一打开课时 playUrl 页
  function packEntryUrl(lesson, item) {
    if (!item) return lesson.playUrl || null;
    if (item.requiresAuth) return lesson.playUrl || null;
    return item.playUrl || lesson.playUrl || null;
  }
  function fmtDur(d) {   // ISO8601 PT15M20S → 15分20秒
    const m = /^PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/.exec(d || '');
    if (!m) return '';
    return (m[1] ? m[1] + '时' : '') + (m[2] ? m[2] + '分' : '') + (m[3] ? m[3] + '秒' : '');
  }
  function fmtSize(b) {
    if (!b) return '';
    return b >= 1048576 ? (b / 1048576).toFixed(0) + 'MB' : Math.max(1, Math.round(b / 1024)) + 'KB';
  }
  function openExternal(u) {
    if (!u) { toast('该资源暂无可用链接'); return; }
    window.open(u, '_blank', 'noopener,noreferrer');
  }
  function renderCourseBody() {
    const lesson = csCtx.lesson;
    const playUrl = csCtx.url;
    const video = lesson && lesson.pack && Array.isArray(lesson.pack.video) && lesson.pack.video[0];
    const thumb = video && video.thumb;
    const entries = [];
    if (lesson && lesson.pack) {
      for (const [key, label] of PACK_ORDER) {
        const items = Array.isArray(lesson.pack[key]) ? lesson.pack[key] : [];
        for (const it of items) entries.push({ label, it });
      }
    }
    const metaBits = [];
    if (video && video.duration) metaBits.push(fmtDur(video.duration));
    if (video && video.format) metaBits.push(video.format);
    if (video && video.sizeBytes) metaBits.push(fmtSize(video.sizeBytes));
    csBody.innerHTML = `
      <div class="cs-cover" id="cs-cover">
        ${thumb ? `<img src="${esc(thumb)}" alt="" onerror="this.remove()">` : ''}
        <button class="cs-play" id="cs-play" type="button">▶ 播放视频课程<span>在国家中小学智慧教育平台打开（新窗口）</span></button>

      ${entries.length ? `<div class="cs-pack-t">本课五件套 · 按顺序使用</div>` : ''}

        <div class="cs-pk">

            <div class="cs-pk-t">${esc(e.it.title || csCtx.title)}</div>
            <div class="cs-pk-f">${[e.it.format, e.it.duration ? fmtDur(e.it.duration) : '', e.it.sizeBytes ? fmtSize(e.it.sizeBytes) : ''].filter(Boolean).join(' · ')}</div>
          </div>
          <button class="tbtn cs-pk-open" data-i="${i}" type="button">打开</button>
        </div>`).join('')}
      <div class="cs-tip">国家平台有反嵌套保护，无法站内播放——点「打开」会在新窗口进入官方页面，看完回来点下方「看完打卡」。</div>`;
    csBody.querySelector('#cs-play').onclick = () => openExternal(packEntryUrl(lesson, video) || playUrl);

      if (e.target.closest('#cs-play')) return;

  function openCourse(topicId, url, title, planKey) {

    updateCheckinBtn();
  };

        <ul class="member-benefits" style="margin-top:8px">${memberBenefits().map(([b, d]) => `<li><b>${b}</b> —— ${d}</li>`).join('')}</ul>
        <div class="me-row"><span class="k"></span><button class="tbtn" id="me-member">查看会员信息</button></div>` : `
        <div class="price-row"><span class="price-now">¥199</span><span class="price-per">/年</span>
          <span class="price-was">¥399</span><span class="price-tag">早鸟价</span></div>
        <ul class="member-benefits" style="margin-top:8px">${memberBenefits().map(([b, d]) => `<li><b>${b}</b> —— ${d}</li>`).join('')}</ul>
        <div class="refund">✓ 7 天无理由退款，不满意随时退</div>
        <button class="big-cta" id="me-member">早鸟价开通 · ¥199/年</button>`}
      </div>
      <div class="card">
        <h3>掌握度总览</h3>
        <div class="me-row"><span class="k">已掌握</span><span class="v" style="color:var(--green-bright)">${yes} 个</span></div>
        <div class="me-row"><span class="k">还不会</span><span class="v" style="color:var(--bad)">${no} 个</span></div>
        <div class="me-row"><span class="k">图谱总节点</span><span class="v">${topics.length} 个</span></div>
        <div class="me-row"><span class="k"></span><button class="tbtn" id="me-gomap">去图谱标记 ›</button></div>
      </div>
      <div class="card">
        <h3>数据与说明</h3>
        <div class="c-sub">所有标记、清单、会员状态只存在这台设备的浏览器里（localStorage），不上传任何服务器。课程资源来自国家中小学智慧教育平台等公开官方渠道，小满伴学只做学习导航，不出售课程。</div>
        <div class="me-row" style="margin-top:8px"><span class="k"></span><button class="tbtn danger" id="me-clear">清除本机数据</button></div>
      </div>
      <div class="madeby">小满即安 出品</div>`;
    meBody.querySelector('#me-profile').onclick = openOnboard;
    meBody.querySelector('#me-member').onclick = openMemberModal;
    meBody.querySelector('#me-gomap').onclick = () => switchTab('map');
    meBody.querySelector('#me-clear').onclick = () => {
      if (!confirm('确定清除本机上的全部学习数据（标记、清单、会员、档案）吗？此操作不可撤销。')) return;
      for (const k of ['cnk12_mastery', 'cnk12_mastery_meta', 'cnk12_profile', 'cnk12_member', 'cnk12_plan', 'cnk12_plan2', 'cnk12_lastdiag', 'cnk12_watch', 'cnk12_panel_w', 'cnk12_pack_output']) {
        try { localStorage.removeItem(k); } catch (e) {}
      }
      location.reload();
    };
  }

  // ---------- 下一步学什么（图谱工具栏） ----------
  function renderNext() {
    const hasAnyMark = Object.keys(mastery).length > 0;
    let bodyHtml;
    if (!hasAnyMark) {
      bodyHtml = `<div class="next-guide">先在图谱上标记几个你会的和不会的，<br>或到「诊断」tab 测一次，<br>我才能告诉你接下来学什么。</div>`;
    } else {
      const recs = [];
      for (const t of topics) {
        if (t.status !== 'complete') continue;
        if (mState(t.id) === 'yes') continue;
        const hard = (prereqsOf.get(t.id) || []).filter(e => e.strength === 'hard');
        if (hard.every(e => mState(e.id) === 'yes')) recs.push(t);
      }
      recs.sort((a, b) => a.gradeRangeStart - b.gradeRangeStart || a.subject.localeCompare(b.subject, 'zh'));
      const top = recs.slice(0, 8);
      bodyHtml = top.length
        ? `<div class="desc" style="color:var(--text-dim);font-size:12.5px;margin-top:4px">以下条件全部满足：所有硬先修已掌握 + 还没标记已掌握。按年级从低到高：</div>` +
          top.map(t => `<div class="next-item" data-id="${t.id}">
            <div class="ni-name" style="color:${t._color}">${esc(t.name)}</div>
            <div class="ni-meta">${t.subject} · ${gradeTxtOf(t)}</div>
            <div class="ni-desc">${esc(t.description.slice(0, 60))}${t.description.length > 60 ? '…' : ''}</div>
          </div>`).join('')
        : `<div class="next-guide">暂时没有可推荐的知识点——<br>可能标记「已掌握」的先修还不够，多标记几个试试。</div>`;
    }
    panelBody.innerHTML = `
      <button id="panel-close" title="关闭">×</button>
      <h2>下一步学什么</h2>
      ${bodyHtml}
      <div style="height:20px"></div>`;
    panelBody.querySelector('#panel-close').onclick = closePanel;
    panelBody.querySelectorAll('.next-item').forEach(el => el.onclick = () => selectTopic(el.dataset.id));
  }
  document.getElementById('btn-next').onclick = () => {
    panelView = 'next';
    openPanelMobile();
    renderPanel();
  };

  // ---------- 点选节点 → 聚焦补间 + 先修链高亮 ----------
  function applyHighlight(id) {
    const pre = collectChain(id, prereqsOf);
    const unlock = collectChain(id, unlocksOf);
    highlightSet = new Set([...pre.keys(), ...unlock.keys()]);
    highlightEdges = new Set();
    for (const d of deps) {
      const inPath = (highlightSet.has(d.prerequisiteId) || d.prerequisiteId === id) &&
                     (highlightSet.has(d.topicId) || d.topicId === id);
      if (inPath && (pre.has(d.prerequisiteId) || d.prerequisiteId === id || unlock.has(d.topicId) || d.topicId === id)) {
        if (pre.has(d.topicId) || unlock.has(d.prerequisiteId) || d.prerequisiteId === id || d.topicId === id)
          highlightEdges.add(d.prerequisiteId + '>' + d.topicId);
      }
    }
  }
  function selectTopic(id) {
    selectedId = id;
    panelView = 'detail';
    diagRootId = null;
    applyHighlight(id);
    openPanelMobile();
    renderPanel();
    startFocus(topicById.get(id));
    requestDraw();
  }

  // ---------- 搜索 ----------
  const searchInput = document.getElementById('search');
  const srBox = document.getElementById('search-results');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchMatches.clear();
    if (!q) { srBox.style.display = 'none'; requestDraw(); return; }
    const hits = topics.filter(t => visible(t) && (t.name.includes(q) || t.description.includes(q) || t.domain.includes(q))).slice(0, 12);
    hits.forEach(t => searchMatches.add(t.id));
    if (hits.length) {
      srBox.innerHTML = hits.map(t => `<div class="sr-item" data-id="${t.id}"><span style="color:${t._color}">${esc(t.name)}</span> <span class="m">${t.subject} · ${t.gradeRangeStart}年级</span></div>`).join('');
      srBox.style.display = 'block';
      srBox.querySelectorAll('.sr-item').forEach(el => el.onclick = () => {
        selectTopic(el.dataset.id);
        srBox.style.display = 'none';
      });
    } else {
      srBox.innerHTML = '<div class="sr-item" style="color:var(--text-dim)">没有匹配的知识点</div>';
      srBox.style.display = 'block';
    }
    requestDraw();
  });
  document.addEventListener('click', (e) => { if (!srBox.contains(e.target) && e.target !== searchInput) srBox.style.display = 'none'; });

  // ---------- 学科筛选 chips（桌面多选开关；移动端单选 = 切换当前学科并 fit-to-view） ----------
  const chipsBox = document.getElementById('chips');
  const chipEls = new Map();
  function syncChips() {
    for (const [s, chip] of chipEls) {
      const on = activeSubjects.has(s);
      chip.classList.toggle('on', on);
      chip.classList.toggle('off', !on);
    }
  }
  for (const s of subjects) {
    const chip = document.createElement('div');
    chip.className = 'chip on';
    chip.style.setProperty('--chip-color', COLORS[s]);
    const count = topics.filter(t => t.subject === s).length;
    chip.innerHTML = `<span class="dot" style="background:${COLORS[s]}"></span>${s} ${count}`;
    chip.onclick = () => {
      if (isMobile()) {
        mobileSubject = s;
        activeSubjects.clear();
        activeSubjects.add(s);
        selectedId = null; highlightSet.clear(); highlightEdges.clear();
        closePanelMobileKeep();
        fitSubjectMobile(s);
      } else {
        if (activeSubjects.has(s)) { activeSubjects.delete(s); } else { activeSubjects.add(s); }
      }
      syncChips();
      updateStats();
      requestDraw();
    };
    chipEls.set(s, chip);
    chipsBox.appendChild(chip);
  }
  function closePanelMobileKeep() {   // 切学科时收起抽屉、清空选中
    panelView = 'empty'; diagRootId = null;
    panelBody.innerHTML = EMPTY_HINT_HTML;
    if (isMobile()) { sheetState = 'collapsed'; applySheetState(); }
  }
  // 图例收起/展开（移动端默认收起成小条）
  document.getElementById('legend-toggle').onclick = () => {
    const lg = document.getElementById('legend');
    lg.classList.toggle('open');
  };

  // ---------- 首次使用引导（分步：年级 → 学科 → 进入；默认家长视角） ----------
  const onboard = document.getElementById('onboard');
  const obBox = document.getElementById('ob-box');
  const OB_SUBJECTS = ['道德与法治', '语文'];
  let obState = { step: 1, grade: null, subject: null };
  function skipOnboard() {
    if (!profile) { profile = { skipped: true }; saveProfile(); }
    onboard.classList.remove('show');
  }
  function applyOnboard() {
    profile = { role: 'parent', grade: obState.grade, subject: obState.subject };
    saveProfile();
    onboard.classList.remove('show');
    switchTab('diag');
    toast(`档案已保存。先做一次「诊断」，看看 ${obState.grade} 年级${obState.subject}哪里需要补。`);
  }
  function renderOnboard() {
    const s = obState;
    if (s.step === 1) {
      obBox.innerHTML = `
        <div class="ob-step-tag">第 1 步 / 共 2 步</div>
        <div class="ob-title">孩子现在上几年级？</div>
        <div class="ob-sub">选完诊断会按对应年级抽题。</div>
        <div class="ob-grades">${[1,2,3,4,5,6,7,8,9].map(g =>
          `<button data-grade="${g}">${g} 年级</button>`).join('')}</div>
        <button class="ob-close" id="ob-skip">先随便看看 ›</button>`;
      obBox.querySelectorAll('.ob-grades button').forEach(b => b.onclick = () => {
        obState.grade = +b.dataset.grade; obState.step = 2; renderOnboard();
      });
      obBox.querySelector('#ob-skip').onclick = skipOnboard;
    } else if (s.step === 2) {
      obBox.innerHTML = `
        <div class="ob-step-tag">第 2 步 / 共 2 步</div>
        <div class="ob-title">想先看哪门学科？</div>
        <div class="ob-sub">这两门已按 2024 版新教材完整填充，其他学科正在建设中。</div>
        <div class="ob-subjects">${OB_SUBJECTS.map(sub =>
          `<button data-subject="${esc(sub)}">${esc(sub)}</button>`).join('')}</div>
        <button class="ob-back" id="ob-back">‹ 上一步</button>
        <button class="ob-close" id="ob-skip">先随便看看 ›</button>`;
      obBox.querySelectorAll('.ob-subjects button').forEach(b => b.onclick = () => {
        obState.subject = b.dataset.subject; obState.step = 3; renderOnboard();
      });
      obBox.querySelector('#ob-back').onclick = () => { obState.step = 1; renderOnboard(); };
      obBox.querySelector('#ob-skip').onclick = skipOnboard;
    } else {
      obBox.innerHTML = `
        <div class="ob-step-tag">都选好了</div>
        <div class="ob-title">准备就绪</div>
        <div class="ob-summary">
          年级：<b>${s.grade} 年级</b><br>
          学科：<b>${esc(s.subject)}</b>
        </div>
        <button class="ob-close ob-enter" id="ob-enter">开始第一次诊断 ✓</button>
        <button class="ob-back" id="ob-back">‹ 上一步</button>`;
      obBox.querySelector('#ob-enter').onclick = applyOnboard;
      obBox.querySelector('#ob-back').onclick = () => { obState.step = 2; renderOnboard(); };
    }
  }
  function openOnboard() {
    obState = {
      step: 1,
      grade: profile ? profile.grade : null,
      subject: profile ? profile.subject : null,
    };
    renderOnboard();
    onboard.classList.add('show');
  }

  // ---------- 桌面端面板拖拽调宽 ----------
  const PANEL_W_KEY = 'cnk12_panel_w';
  const resizer = document.getElementById('panel-resizer');
  let panelW = 420;
  try { panelW = Math.min(600, Math.max(280, parseInt(localStorage.getItem(PANEL_W_KEY), 10) || 420)); } catch (e) {}
  function applyPanelW() { panel.style.setProperty('--pw', panelW + 'px'); }
  applyPanelW();
  let rzDrag = null;
  resizer.addEventListener('pointerdown', (e) => {
    if (window.innerWidth <= 860) return;
    try { resizer.setPointerCapture(e.pointerId); } catch (err) {}
    rzDrag = { x: e.clientX, w: panelW };
    resizer.classList.add('active');
    e.preventDefault();
  });
  resizer.addEventListener('pointermove', (e) => {
    if (!rzDrag) return;
    panelW = Math.min(600, Math.max(280, rzDrag.w + (rzDrag.x - e.clientX)));
    applyPanelW();
  });
  function endRzDrag() {
    if (!rzDrag) return;
    rzDrag = null;
    resizer.classList.remove('active');
    try { localStorage.setItem(PANEL_W_KEY, String(panelW)); } catch (e) {}
  }
  resizer.addEventListener('pointerup', endRzDrag);
  resizer.addEventListener('pointercancel', endRzDrag);

  // ---------- 轻提示 ----------
  let toastTimer = null;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2600);
  }

  // ---------- 启动 ----------
  let mapInited = false;
  function initMapView() {
    mapInited = true;
    if (window.innerWidth < 860 && !isMobile()) panel.classList.add('hidden');
    if (isMobile()) {
      sheetState = 'collapsed'; panel.classList.remove('hidden');
      // 移动端单学科模式：默认当前档案学科（否则第一个学科），chips 单选切换
      mobileSubject = (profile && profile.subject && subjects.includes(profile.subject)) ? profile.subject : subjects[0];
      activeSubjects.clear();
      activeSubjects.add(mobileSubject);
      syncChips();
      rotAngle = 0;
    }
    resize();
    if (isMobile()) fitSubjectMobile(mobileSubject);
    else if (profile && profile.grade) focusGradeSubject(profile.grade, profile.subject);
    else fitView();
    enterT0 = performance.now(); enterDone = false;   // 入场生长动画
  }
  updateStats();
  updatePlanBadge();
  switchTab('today');   // 主入口 = 今日（教练任务页）
  if (!profile) openOnboard();

  // 自动化验收辅助
  window.__cnkTest = {
    posOf: (id) => {   // 返回视口坐标（含 canvas 在页面中的偏移，便于自动化点按）
      const t = topicById.get(id);
      if (!t) return null;
      topicScreen(t);
      const r = canvas.getBoundingClientRect();
      return [t._sx + r.left, t._sy + r.top];
    },
    quiz: () => quiz,
    isMember,
    switchTab,
    selectTopic,
    openCourse,
    plan: () => plan2,
    coaching: () => coaching,
    pack: (id) => resPackByTopic.get(id),
    supplyPack: (id) => packByTopic.get(id),
    visibleSubjects: () => [...activeSubjects],
    mobileSubject: () => mobileSubject,
    viewSize: () => [W, H],
    scale: () => scale,
    rotAngle: () => rotAngle,
    currentTab: () => currentTab,
  };
})();
</script>
</body>
</html>

  }
  function fitView() {
    const b = projectedBounds(topics);
    const minX = b.minX - 90, maxX = b.maxX + 90;
    const minY = 0.3 * ROW_H, maxY = b.maxY + 90;
    scale = Math.min(W / (maxX - minX), H / (maxY - minY));
    scale = Math.max(0.2, Math.min(1.0, scale));
    tx = (W - (minX + maxX) * scale) / 2;
    ty = (H - (minY + maxY) * scale) / 2;
  }
  function focusGradeMobile(g, subject) {
    const want = subject && subjX.get(subject) != null ? subject : '道德与法治';
    const cx = subjX.get(want) != null ? subjX.get(want) : 0;
    const [px, py] = projectPoint(cx, g * ROW_H, 0);
    scale = 0.9;
    tx = W / 2 - px * scale;
    ty = H * 0.42 - py * scale;
  }
  function focusGradeSubject(g, subject) {
    if (isMobile()) { focusGradeMobile(g, subject); return; }
    const cx = subject && subjX.get(subject) != null ? subjX.get(subject) : 0;
    const [px, py] = projectPoint(cx, g * ROW_H, 0);
    scale = Math.min(1.1, Math.max(0.5, W / 2600, H / 900));
    scale = Math.min(6, Math.max(0.12, scale));
    tx = W / 2 - px * scale;
    ty = H / 2 - py * scale;
  }

  // 移动端单学科 fit-to-view：螺旋塔适配视口宽度，不横向溢出；内容矮于视口则垂直居中，否则顶端对齐
  function fitSubjectMobile(subject) {
    const list = topics.filter(t => t.subject === subject);
    if (!list.length || !W || !H) return;
    const b = projectedBounds(list);
    const minX = b.minX - 74, maxX = b.maxX + 74;
    scale = W / (maxX - minX);
    scale = Math.min(2.2, Math.max(0.5, scale));
    tx = W / 2 - ((minX + maxX) / 2) * scale;
    const minY = b.minY - 40, maxY = b.maxY + 40;
    if ((maxY - minY) * scale <= H) {
      ty = H / 2 - ((minY + maxY) / 2) * scale;
    } else {
      ty = H - 12 - maxY * scale;
    }
  }

  // ---------- 状态 ----------
  const activeSubjects = new Set(subjects);
  let mobileSubject = null;   // 移动端：单学科模式，chips 单选切换
  let selectedId = null, hoverId = null;
  let highlightSet = new Set(), highlightEdges = new Set();
  let searchMatches = new Set();
  let panelView = 'empty';   // 'empty' | 'detail' | 'diag'
  let diagRootId = null;
  let quiz = null;           // 答题会话 { mode:'node'|'quick'|'first3', returnTo, topicId?, grade?, subject?, guest?, items, idx, picked, results, scored }

  function visible(t) { return activeSubjects.has(t.subject); }
  function isMobile() { return window.innerWidth < 768; }

  // ---------- 绘制 ----------
  function draw(now) {
    now = now || performance.now();
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(bgCanvas, 0, 0, W, H);
    // 年级网格线：移动端画屏幕水平线 + 左缘悬浮标签；桌面端画随塔自转的投影线
    ctx.font = '11px sans-serif';
    const gradeAnchorX = isMobile() && mobileSubject && subjX.get(mobileSubject) != null ? subjX.get(mobileSubject) : 0;
    for (let g = 1; g <= 12; g++) {
      if (isMobile()) {
        const [pgx, pgy] = projectPoint(gradeAnchorX, g * ROW_H, 0);
        const [, sy] = worldToScreen(pgx, pgy);
        if (sy < -20 || sy > H + 20) continue;
        ctx.strokeStyle = g % 3 === 1 ? 'rgba(16,24,40,0.10)' : 'rgba(16,24,40,0.05)';
        ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
        const label = g + ' 年级';
        const lw = ctx.measureText(label).width + 10;
        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.fillRect(4, sy - 15, lw, 15);
        ctx.fillStyle = '#667085';
        ctx.fillText(label, 9, sy - 4);
      } else {
        const [p0x, p0y] = projectPoint(-1400, g * ROW_H, 0);
        const [x0, y0] = worldToScreen(p0x, p0y);
        const [p1x, p1y] = projectPoint(7200, g * ROW_H, 0);
        const [x1, y1] = worldToScreen(p1x, p1y);
        ctx.strokeStyle = g % 3 === 1 ? 'rgba(16,24,40,0.08)' : 'rgba(16,24,40,0.04)';
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
        const [plx, ply] = projectPoint(-90, g * ROW_H, 0);
        const [lx, ly] = worldToScreen(plx, ply);
        ctx.fillStyle = '#98A2B3';
        ctx.textAlign = 'right';
        ctx.fillText(g + ' 年级', lx, ly - 4);
        ctx.textAlign = 'left';
      }
    }
    // 学科塔标题：桌面端画在塔顶；移动端由 chips 承担，不画
    if (!isMobile()) {
      ctx.font = 'bold 13px sans-serif';
      for (const s of subjects) {
        if (!activeSubjects.has(s)) continue;
        const [psx, psy] = projectPoint(subjX.get(s), 12 * ROW_H + 70, 0);
        const [sx, sy] = worldToScreen(psx, psy);
        ctx.fillStyle = COLORS[s];
        ctx.textAlign = 'center';
        ctx.fillText(s, sx, sy);
        ctx.textAlign = 'left';
      }
    }

    // 入场生长动画：节点按年级从低到高 stagger 点亮（每次进入图谱播一次）
    let enterNow = 1e9;
    if (!enterDone) {
      if (enterT0 < 0) enterT0 = now;
      enterNow = now - enterT0;
      if (enterNow > 900) enterDone = true;
    }

    // 边：默认透明度 ≤0.1（Marble 暗纹）；选中后只画高亮先修链
    const dashOff = -((now / 30) % 24);
    for (const d of deps) {
      const a = topicById.get(d.prerequisiteId), b = topicById.get(d.topicId);
      if (!a || !b || !visible(a) || !visible(b)) continue;
      const inHL = highlightEdges.has(d.prerequisiteId + '>' + d.topicId);
      if (selectedId && !inHL) continue;   // 选中态：无关心整条隐去
      const [x1, y1] = topicScreen(a);
      const [x2, y2] = topicScreen(b);
      if ((x1 < -50 && x2 < -50) || (x1 > W + 50 && x2 > W + 50)) continue;
      if ((y1 < -50 && y2 < -50) || (y1 > H + 50 && y2 > H + 50)) continue;
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const dx = Math.max(-60, Math.min(60, (x2 - x1) * 0.25));
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(mx + dx, my, x2, y2);
      if (inHL) {
        ctx.strokeStyle = hexA(b._color, 0.9); ctx.lineWidth = 2.5;   // 先修链：学科色加粗
        ctx.setLineDash([7, 5]); ctx.lineDashOffset = dashOff;
        ctx.stroke(); ctx.setLineDash([]);
      } else {
        ctx.strokeStyle = d.strength === 'hard' ? 'rgba(16,24,40,0.08)' : 'rgba(16,24,40,0.05)';   // 极浅灰边
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // 节点：远的先画（画家算法），透视缩放半径 + 远端压暗
    const pulse = 1 + 0.14 * Math.sin(now / 280);
    const drawList = [];
    for (const t of topics) {
      if (!visible(t)) continue;
      topicScreen(t);
      if (t._sx < -60 || t._sx > W + 60 || t._sy < -60 || t._sy > H + 60) continue;
      drawList.push(t);
    }
    drawList.sort((a, b) => b._zr - a._zr);
    for (const t of drawList) {
      const sx = t._sx, sy = t._sy;
      const skeleton = t.status === 'skeleton';
      const ms = mState(t.id);
      let ea = 1;
      if (!enterDone) {
        const delay = ((t._gMid - 1) / 11) * 560 + (hashStr(t.id) % 80);
        const p = Math.max(0, Math.min(1, (enterNow - delay) / 200));
        ea = p * p * (3 - 2 * p);
        if (ea <= 0) continue;
      }
      // 选中态：无关节点降至 8% 透明度
      if (selectedId && !highlightSet.has(t.id) && t.id !== selectedId) ea *= 0.08;
      // 纵深：远端节点压暗
      ea *= Math.max(0.35, Math.min(1.08, (t._psr - 0.80) / 0.45));
      let r = (t._r || 6) * t._psr * Math.min(1.3, Math.max(0.6, scale));
      // R3b 断点优先（默认视图）：薄弱红橙放大突出，已掌握/未测退后
      t._de = 1;
      if (!selectedId && !skeleton && enterDone) {
        if (ms === 'no') { r *= 1.4; t._de = 1.4; }
        else if (ms === 'mid') { r *= 1.2; t._de = 1.2; }
        else if (ms === 'yes') { ea *= 0.45; t._de = 0.45; }
        else { ea *= 0.6; t._de = 0.6; }
      }
      if (t.id === selectedId) r *= 1.35 * pulse;
      else if (t.id === hoverId) r *= 1.18;
      if (!enterDone) r *= 0.3 + 0.7 * Math.min(1, ea * 2);
      const nodeAlpha = Math.min(1, ea * (skeleton ? 0.55 : 1));
      t._dr = r; t._da = nodeAlpha;   // 测试钩子：最后绘制的半径/透明度
      ctx.globalAlpha = nodeAlpha;
      if (ms === 'yes' || ms === 'mid' || ms === 'no') {
        // 掌握态实心圆（青绿+微光晕 / 麦黄 / 红橙）
        const S = r * 2 * SPR_K;
        ctx.drawImage(ms === 'yes' ? spriteYes : ms === 'mid' ? spriteMid : spriteNo, sx - S / 2, sy - S / 2, S, S);
        if (skeleton) {   // 骨架节点已测：叠一圈虚线提示内容建设中
          ctx.beginPath(); ctx.arc(sx, sy, r + 1.5, 0, Math.PI * 2);
          ctx.setLineDash([3, 3]); ctx.strokeStyle = t._color; ctx.lineWidth = 1.2; ctx.stroke(); ctx.setLineDash([]);
        }
      } else {
        // 未测：白芯 + 学科色浅描边（空心后退，给底面留呼吸感）
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#FFFFFF'; ctx.fill();
        if (skeleton) ctx.setLineDash([3, 3]);
        ctx.strokeStyle = hexA(t._color, 0.5); ctx.lineWidth = 1.4; ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.globalAlpha = 1;   // 高亮/搜索圈不受节点透明度影响
      if (highlightSet.has(t.id) && t.id !== selectedId) {
        ctx.beginPath(); ctx.arc(sx, sy, r + 4.5, 0, Math.PI * 2);
        ctx.strokeStyle = hexA(t._color, 0.9); ctx.lineWidth = 2; ctx.stroke();
      }
      if (searchMatches.has(t.id)) {
        ctx.beginPath(); ctx.arc(sx, sy, r + 8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(22,199,183,0.85)'; ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
      }
    }
    if (selectedId) {
      const t = topicById.get(selectedId);
      if (t) {
        const [px, py, psr] = projectTopic(t);
        const [sx, sy] = worldToScreen(px, py);
        const r = (t._r || 6) * psr * Math.min(1.3, Math.max(0.6, scale)) * 1.35 * pulse;
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(250,247,242,0.92)'; ctx.lineWidth = 3;
        ctx.strokeText(t.name, sx, sy - r - 7);
        ctx.fillStyle = '#101828';
        ctx.fillText(t.name, sx, sy - r - 7);
        ctx.textAlign = 'left';
      }
    }
    // 点亮脉冲：节点刚掌握时扩散一圈（1 秒，尊重 prefers-reduced-motion——noteLit 已拦截）
    if (litPulse.size) {
      for (const [pid, t0p] of litPulse) {
        const pt = topicById.get(pid);
        const e = (now - t0p) / 1000;
        if (!pt || pt._sx == null || e > 1) { if (e > 1 || !pt) litPulse.delete(pid); continue; }
        const rr = (pt._r || 6) * (pt._psr || 1) * Math.min(1.3, Math.max(0.6, scale)) + e * 46;
        ctx.beginPath();
        ctx.arc(pt._sx, pt._sy, rr, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(22,199,183,${(0.9 * (1 - e)).toFixed(3)})`;
        ctx.lineWidth = 3 * (1 - e) + 1;
        ctx.stroke();
      }
    }
  }

  // ---------- 指针交互 ----------
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    inertia = null; focusTween = null;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const [wx, wy] = screenToWorld(mx, my);
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    scale = Math.min(6, Math.max(0.12, scale * factor));
    tx = mx - wx * scale; ty = (H - my) - wy * scale;
    requestDraw();
  }, { passive: false });

  // 悬停即停（仅鼠标）
  canvas.addEventListener('pointerenter', (e) => {
    if (e.pointerType === 'mouse') { hoverPause = true; }
  });
  canvas.addEventListener('pointerleave', (e) => {
    if (e.pointerType === 'mouse') { hoverPause = false; tooltip.style.display = 'none'; hoverId = null; requestDraw(); }
  });

  const pointers = new Map();
  let panMoved = 0, panLast = null, downTime = 0, pinch = null;
  let panStart = null, panActive = false;   // 拖拽死区：位移超过死区才开始平移，点按抖动不带动地图
  let velSamples = [];

  // 阻断触摸后的兼容鼠标事件（ghost click），避免抽屉刚打开就被同一坐标落的假点击误关
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

  function hitTest(sx, sy, isTouch) {   // 屏幕空间命中（投影缓存，透视下也准）
    let best = null, bestScore = Infinity;
    for (const t of topics) {
      if (!visible(t)) continue;
      if (t._sx == null) topicScreen(t);
      const rS = (t._r || 6) * (t._psr || 1) * Math.min(1.3, Math.max(0.6, scale));
      const lim = Math.max(isTouch ? 28 : 14, rS + 6);
      const d = Math.hypot(t._sx - sx, t._sy - sy);
      if (d < lim && d < bestScore) { bestScore = d; best = t; }
    }
    return best;
  }

  canvas.addEventListener('pointerdown', (e) => {
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, t: Date.now() });
    tooltip.style.display = 'none';
    inertia = null; focusTween = null;
    touchPause = true;   // 触摸即停
    if (pointers.size === 1) {
      panMoved = 0; panLast = { x: e.clientX, y: e.clientY }; downTime = Date.now();
      panStart = { x: e.clientX, y: e.clientY }; panActive = false;
      velSamples = [];
      pinch = null;
      canvas.classList.add('dragging');
    } else if (pointers.size === 2) {
      const [p1, p2] = [...pointers.values()];
      pinch = {
        d: Math.hypot(p2.x - p1.x, p2.y - p1.y),
        mx: (p1.x + p2.x) / 2, my: (p1.y + p2.y) / 2,
        scale, tx, ty
      };
      panMoved = 999;
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, t: pointers.get(e.pointerId).t });

    if (pointers.size === 2 && pinch) {
      const [p1, p2] = [...pointers.values()];
      const d = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      const cx = (p1.x + p2.x) / 2 - rect.left, cy = (p1.y + p2.y) / 2 - rect.top;
      const newScale = Math.min(6, Math.max(0.12, pinch.scale * (d / (pinch.d || 1))));
      const [wx, wy] = screenToWorld(cx, cy);
      scale = newScale;
      tx = cx - wx * scale; ty = (H - cy) - wy * scale;
      requestDraw();
      return;
    }
    if (pointers.size === 1 && panLast) {
      if (!panActive) {
        const dead = e.pointerType === 'mouse' ? 3 : 9;   // 死区内视为点按抖动，不平移
        if (Math.hypot(e.clientX - panStart.x, e.clientY - panStart.y) < dead) return;
        panActive = true;
        panLast = { x: e.clientX, y: e.clientY };
        return;
      }
      const dx = e.clientX - panLast.x, dy = e.clientY - panLast.y;
      panMoved += Math.abs(dx) + Math.abs(dy);
      tx += dx; ty -= dy;
      panLast = { x: e.clientX, y: e.clientY };
      velSamples.push({ x: e.clientX, y: e.clientY, t: performance.now() });
      if (velSamples.length > 6) velSamples.shift();
      requestDraw();
      return;
    }
    if (e.pointerType === 'mouse' && pointers.size === 0) {
      const best = hitTest(mx, my, false);
      const newHover = best ? best.id : null;
      if (newHover !== hoverId) {
        hoverId = newHover;
        if (best) {
          tooltip.style.display = 'block';
          tooltip.style.left = (mx + 14) + 'px';
          tooltip.style.top = (my + 10) + 'px';
          tooltip.innerHTML = `<div class="tt-name" style="color:${best._color}">${best.name}</div>
            <div class="tt-meta">${best.subject} · ${best.domain} · ${best.gradeRangeStart === best.gradeRangeEnd ? best.gradeRangeStart + '年级' : best.gradeRangeStart + '-' + best.gradeRangeEnd + '年级'}${best.status === 'skeleton' ? ' · 骨架占位' : ''}</div>`;
        } else tooltip.style.display = 'none';
        requestDraw();
      } else if (best) {
        tooltip.style.left = (mx + 14) + 'px';
        tooltip.style.top = (my + 10) + 'px';
      }
    }
  });

  function endPointer(e) {
    const wasSingle = pointers.size === 1 && pointers.has(e.pointerId);
    const isTouch = e.pointerType !== 'mouse';
    pointers.delete(e.pointerId);
    if (pointers.size === 0) touchPause = false;   // 抬起后恢复自转（鼠标悬停仍暂停）
    if (pointers.size < 2) pinch = null;
    if (pointers.size === 1) {
      const [p] = [...pointers.values()];
      panLast = { x: p.x, y: p.y };
      velSamples = [];
    }
    if (pointers.size === 0) {
      canvas.classList.remove('dragging');
      const disp = panStart ? Math.hypot(e.clientX - panStart.x, e.clientY - panStart.y) : 999;
      const tapLim = isTouch ? 26 : 8;   // 位移制 tap 判定（真机点按普遍带 10-20px 位移）
      if (wasSingle && panMoved < 900 && disp < tapLim && (Date.now() - downTime) < 600) {
        const rect = canvas.getBoundingClientRect();
        const best = hitTest(e.clientX - rect.left, e.clientY - rect.top, isTouch);
        if (best) selectTopic(best.id);
      } else if (wasSingle && isTouch && panActive && panMoved >= 10 && velSamples.length >= 2) {
        const last = velSamples[velSamples.length - 1];
        const recent = velSamples.filter(s => last.t - s.t <= 100);
        const first = recent[0] || last;
        const dt = Math.max(16, last.t - first.t);
        let vx = (last.x - first.x) / dt, vy = (last.y - first.y) / dt;
        const sp = Math.hypot(vx, vy);
        if (sp > 0.25) {   // 只有明确的甩动才给惯性，慢速误触不再滑走
          const cap = 2.5;
          if (sp > cap) { vx *= cap / sp; vy *= cap / sp; }
          inertia = {
            vx, vy: -vy, t0: performance.now(), last: performance.now(),
            dur: Math.max(300, Math.min(600, 300 + sp * 200))
          };
          requestDraw();
        }
      }
      panStart = null; panActive = false;
      panLast = null;
      velSamples = [];
    }
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);

  // ---------- 面板骨架（桌面右栏 / 移动端固定底部抽屉） ----------
  const panel = document.getElementById('panel');
  const panelBody = document.getElementById('panel-body');
  const handle = document.getElementById('panel-handle');
  const drawerMask = document.getElementById('drawer-mask');
  let sheetState = 'collapsed';   // 移动端语义：'open'（55vh 固定抽屉）| 'collapsed'（隐藏）

  const EMPTY_HINT_HTML = '<div id="empty-hint">点击图谱上的任意节点，查看它的先修链与详情。<br>先用「诊断」找出孩子的薄弱点，再来这里追溯根源。</div>';
  function applySheetState() {
    if (!isMobile()) {
      panel.style.transform = '';
      panel.classList.remove('sheet-open', 'dragging');
      drawerMask.classList.remove('show');
      return;
    }
    panel.classList.toggle('sheet-open', sheetState === 'open');
    drawerMask.classList.toggle('show', sheetState === 'open');
    if (sheetState !== 'open') panel.style.transform = '';
  }
  function openPanelMobile() {
    if (isMobile()) { sheetState = 'open'; applySheetState(); }
    panel.classList.remove('hidden');
  }
  function closePanel() {
    if (isMobile()) { sheetState = 'collapsed'; applySheetState(); }
    else panel.classList.add('hidden');
    selectedId = null; panelView = 'empty'; diagRootId = null;
    highlightSet.clear(); highlightEdges.clear();
    panelBody.innerHTML = EMPTY_HINT_HTML;
    closePanelMore();
    requestDraw();
  }
  drawerMask.addEventListener('click', () => { if (isMobile() && sheetState === 'open') closePanel(); });
  // 抓手条：点按关闭；下滑超过阈值或快速甩动关闭，否则回弹
  let hDrag = null;
  handle.addEventListener('pointerdown', (e) => {
    if (!isMobile() || sheetState !== 'open' || e.pointerType === 'mouse') return;   // 鼠标事件一律忽略，防 ghost click
    try { handle.setPointerCapture(e.pointerId); } catch (err) {}
    hDrag = { startY: e.clientY, dy: 0, moved: 0 };
    panel.classList.add('dragging');
    e.preventDefault();
  });
  handle.addEventListener('pointermove', (e) => {
    if (!hDrag) return;
    const dy = Math.max(0, e.clientY - hDrag.startY);   // 只允许向下拖
    hDrag.dy = dy;
    hDrag.moved += Math.abs(e.movementY || 0);
    panel.style.transform = dy > 0 ? `translateY(${dy}px)` : '';
  });
  function endHandleDrag(e) {
    if (!hDrag) return;
    panel.classList.remove('dragging');
    const dy = hDrag.dy, moved = hDrag.moved;
    const v = e && typeof e.movementY === 'number' ? e.movementY : 0;
    hDrag = null;
    if (moved < 6 || dy > panel.offsetHeight * 0.35 || (dy > 40 && v > 12)) closePanel();
    else { panel.style.transform = ''; }
  }
  handle.addEventListener('pointerup', endHandleDrag);
  handle.addEventListener('pointercancel', () => { hDrag = null; panel.classList.remove('dragging'); panel.style.transform = ''; });

  // ---------- 详情面板（点选节点 → 追溯视图） ----------
  const TYPE_CN = { CONCEPTUAL: '概念理解', PROCEDURAL: '方法技能', REPRESENTATIONAL: '表征方式', LANGUAGE: '语言表达', META: '元认知' };
  function gradeTxtOf(t) { return t.gradeRangeStart === t.gradeRangeEnd ? t.gradeRangeStart + ' 年级' : t.gradeRangeStart + '–' + t.gradeRangeEnd + ' 年级'; }
  function chainListHtml(list, emptyTxt) {
    if (!list.length) return `<div class="desc" style="color:var(--text-dim);font-size:12px">${emptyTxt}</div>`;
    return list.map(e => {
      const t = topicById.get(e.id);
      if (!t) return '';
      return `<div class="chain-item ${e.strength}" data-id="${e.id}">
        <span style="color:${t._color}">${esc(t.name)}</span>
        <span class="r">${gradeTxtOf(t)} · ${e.strength === 'hard' ? '硬依赖' : '软依赖'}${e.reason ? '：' + esc(e.reason) : ''}</span>
      </div>`;
    }).join('');
  }

  function renderPanel(keepScroll) {
    const st = keepScroll ? panelBody.scrollTop : 0;
    if (panelView === 'detail' && selectedId) renderDetail();
    else if (panelView === 'diag' && diagRootId) renderDiag();
    if (keepScroll) panelBody.scrollTop = st;
  }

  // coaching 卡：ask 问句 + pattern 规律 + variants 课外变式 + drills 同类训练（答案默认折叠，给思路不给答案）
  function renderCoachCard(coach, skipDrills, topicId) {
    const vars = Array.isArray(coach.variants) ? coach.variants : [];
    const drills = skipDrills ? [] : (Array.isArray(coach.drills) ? coach.drills : []);
    if (!coach.ask && !coach.pattern && !vars.length && !drills.length) return '';
    const varsHtml = vars.length ? `
      <div class="ask-sec">课外变式 · 换个语境还是这条规律（${vars.length}）</div>
      ${vars.map(v => `<div class="var-item">
        <div class="v-t">${esc(v.text)}</div>
        <div class="v-e">${esc(v.explain)}</div>
      </div>`).join('')}` : '';
    const drillsHtml = drills.length ? `
      <div class="ask-sec">同类训练（${drills.length}）· 先看思路提示，做完再点开核对</div>
      ${drills.map((d, i) => `<div class="drill-item">
        <div class="d-q">${esc(d.q)}</div>
        ${d.hint ? `<div class="d-hint"><b>思路：</b>${esc(d.hint)}</div>` : ''}
        <button class="drill-ans-btn" type="button">查看答案（先自己做完再对）</button>
        <div class="drill-ans"><b>参考答案：</b>${esc(d.answer)}</div>
      </div>`).join('')}` : '';
    return `
      <div class="ask-card">
        ${coach.ask ? `<div class="ask-tag">家长一问</div><div class="ask-q">${esc(coach.ask)}</div>
          <div class="ask-cta">
            ${(() => {
              const v = topicId != null ? mv(topicId) : null;
              const st = v === null ? null : mState(topicId);
              const mTxt = v === null ? '<span class="ask-mv">还没测过，别凭感觉判断</span>'
                : `<span class="ask-mv ${st}">当前掌握度 ${Math.round(v * 100)}%（${st === 'yes' ? '已掌握' : st === 'mid' ? '在进步' : '还不会'}）</span>`;
              const btn = (topicId != null && quizByTopic.has(topicId))
                ? `<button class="tbtn ask-quiz-btn" id="ask-quiz">测一测就知道 ›</button>` : '';
              return mTxt + btn;
            })()}
          </div>` : ''}
        ${coach.pattern ? `<div class="ask-pattern">规律：${esc(coach.pattern)}</div>` : ''}
        ${varsHtml}
        ${drillsHtml}
      </div>`;
  }

  function renderDetail() {
    const t = topicById.get(selectedId);
    if (!t) return;
    const preClosure = collectChain(selectedId, prereqsOf);          // 先修总数（传递闭包 BFS）
    const unlockClosure = collectChain(selectedId, unlocksOf);
    const directPre = prereqsOf.get(selectedId) || [];               // 直接先修
    const directUnlock = unlocksOf.get(selectedId) || [];            // 解锁什么
    const coach = coaching[selectedId] || null;
    const cluster = clusterByKey.get(t.subject + '|' + t.domain);
    const m = mState(selectedId);
    const mVal = mv(selectedId);
    const hasQuiz = quizByTopic.has(selectedId);
    const stdHtml = (t.standards || []).map(k => {
      const s = stdByKey.get(k);
      return s ? `<div style="margin-bottom:6px"><b style="font-size:12px">${s.title}</b><div style="font-size:12px;color:var(--text-dim);line-height:1.6">${s.summary}</div></div>` : '';
    }).join('');
    const mBadge = m === 'yes' ? `<span class="badge m-yes">已掌握 ✓ ${Math.round(mVal * 100)}%</span>`
                 : m === 'mid' ? `<span class="badge m-mid">在进步 ${Math.round(mVal * 100)}%</span>`
                 : m === 'no' ? `<span class="badge m-no">还不会 ${Math.round(mVal * 100)}%</span>` : '';
    // coaching 卡（ask/pattern/variants/drills 来自 data/coaching.json；无数据时不渲染此卡）
    // 会员且有补给包时 drills 并入补给包区（合并去重），此处不再重复渲染
    const askHtml = coach ? renderCoachCard(coach, packByTopic.has(selectedId) && isMember(), selectedId) : '';
    const packHtml = renderPackSection(selectedId);

    // ---------- R3b：单一主动作，按掌握态分流 ----------
    let primaryHtml = '';
    if (m === null) {
      primaryHtml = `<button class="act-primary" id="act-main">现在让孩子测 ›</button>
        <div class="act-sub">${hasQuiz ? `${quizByTopic.get(selectedId).length} 道题，孩子答完就知道会不会` : '这个知识点暂无题库，可以先看先修链或专攻'}</div>`;
    } else if (m === 'yes') {
      primaryHtml = `<button class="act-primary" id="act-main">回忆挑战 ›</button>
        <div class="act-sub">${hasQuiz ? '隔几天回头做一组，防遗忘' : '这个知识点暂无题库'}</div>`;
    } else {
      primaryHtml = `<button class="act-primary" id="act-main">安排补 · 加入今日清单 ›</button>
        <div class="act-sub">自动带上没掌握的先修，按先基础后进阶排好顺序</div>
        <div class="act-row" style="margin-top:2px">
          ${hasQuiz ? `<button class="act-link" id="btn-quiz">先测一测 ›</button>` : ''}
          <button class="act-link plain" id="btn-diag">孩子老错这里？帮我找原因 ›</button>
        </div>`;
    }

    // ---------- 第二层（上滑）：课标 / 资源 / 描述 / 先修名单 / 检验卡 ----------
    const assessMore = t.assessmentPrompt ? `
      <h3>家长检验卡</h3>
      <div class="assess-card">
        <div class="assess-q">检验问题：${t.assessmentPrompt}</div>
        ${(t.evidence && t.evidence.length) ? `<div class="assess-ev"><b>怎么算答对：</b><ul>${t.evidence.map(e => `<li>${e}</li>`).join('')}</ul></div>` : ''}
      </div>` : '';
    const moreHtml = `
      <button class="pm-back" id="pm-back">‹ 返回</button>
      <h2 style="color:${t._color};font-size:16px">${esc(t.name)} · 更多资料</h2>
      <div class="desc">${t.description}</div>
      ${t.status === 'skeleton' ? '<div class="placeholder-note">⚠ 骨架占位节点：内容待按该学科课标逐步填充，当前仅展示知识结构位置。</div>' : ''}
      ${(t.evidence && t.evidence.length && !t.assessmentPrompt) ? `<h3>掌握证据（能做到这些就算学会）</h3><ul>${t.evidence.map(e => `<li>${e}</li>`).join('')}</ul>` : ''}
      ${assessMore}
      ${stdHtml ? `<h3>课标对齐（2022 年版义务教育课程标准）</h3>${stdHtml}` : ''}
      ${cluster ? `<h3>本单元概述</h3><div class="desc" style="font-size:12.5px;color:var(--text-dim)">${cluster.summary}</div>` : ''}
      ${resourceSectionHtml(selectedId)}
      <h3>直接先修（${directPre.length}）</h3>
      ${chainListHtml(directPre, '没有直接先修，这是基础起点。')}
      <h3>学会后能解锁（${directUnlock.length}）</h3>
      ${chainListHtml(directUnlock, '暂无后续知识点依赖它。')}
      <h3>完整先修链（${preClosure.size}）</h3>
      ${chainListHtml([...preClosure.values()], '这个知识点没有先修节点。')}
      <div style="height:20px"></div>`;

    panelBody.innerHTML = `
      <button id="panel-close" title="关闭">×</button>
      <h2 style="color:${t._color}">${esc(t.name)}</h2>
      <div class="badges">
        <span class="badge" style="color:${t._color};border-color:${t._color}">${t.subject} · ${t.domain}</span>
        <span class="badge type">${TYPE_CN[t.type] || t.type}</span>
        <span class="badge grade">${gradeTxtOf(t)}</span>
        ${t.status === 'skeleton' ? '<span class="badge skeleton">骨架占位</span>' : ''}
        ${mBadge}
      </div>
      <div class="trace-stats">
        <div class="trace-stat"><div class="n">${preClosure.size}</div><div class="l">先修总数（全链）</div></div>
        <div class="trace-stat"><div class="n">${directPre.length}</div><div class="l">直接先修</div></div>
        <div class="trace-stat"><div class="n">${directUnlock.length}</div><div class="l">学会后解锁</div></div>
      </div>
      ${primaryHtml}
      <div class="act-row">
        <button class="act-link" id="act-focus">专攻这个 ›</button>
        <button class="act-link" id="act-chain">在星图上看先修链 ›</button>
      </div>
      ${askHtml}
      ${packHtml}
      <button class="more-toggle" id="btn-more">更多资料（课标 / 资源 / 先修名单）▸</button>
      <div style="height:16px"></div>`;
    const pmBox = document.getElementById('panel-more');
    pmBox.innerHTML = moreHtml;
    pmBox.classList.remove('open');
    bindDetailEvents();
  }

  function bindDetailEvents() {
    const scope = document.getElementById('panel');   // 含第一层 panel-body 与第二层 panel-more
    scope.querySelector('#panel-close').onclick = closePanel;
    // R3b 单一主动作：未测→现在测 / 薄弱→安排补 / 已掌握→回忆挑战
    const am = scope.querySelector('#act-main');
    if (am) am.onclick = () => {
      const mm = mState(selectedId);
      if (mm === null || mm === 'yes') {
        if (!quizByTopic.has(selectedId)) { toast('这个知识点暂时没有题库，可以先看先修链'); return; }
        startNodeQuiz(selectedId, 'map');
      } else {
        requireMember(() => addToTodayPlan(selectedId));   // 付费墙：生成清单
      }
    };
    const af = scope.querySelector('#act-focus');
    if (af) af.onclick = () => startSession({ topicIds: [selectedId] });   // R3a 会话：专攻这个
    const ac = scope.querySelector('#act-chain');
    if (ac) ac.onclick = () => {
      applyHighlight(selectedId);
      startFocus(topicById.get(selectedId));
      if (isMobile()) { sheetState = 'collapsed'; applySheetState(); }
      toast('已在星图上高亮它的先修链');
    };
    const bd = scope.querySelector('#btn-diag');
    if (bd) bd.onclick = () => { panelView = 'diag'; diagRootId = selectedId; closePanelMore(); renderPanel(); };
    const bq = scope.querySelector('#btn-quiz');
    if (bq) bq.onclick = () => startNodeQuiz(selectedId, 'map');   // 测一测免费
    // 第二层上滑/收起
    const bm = scope.querySelector('#btn-more');
    if (bm) bm.onclick = () => {
      const pm = document.getElementById('panel-more');
      document.getElementById('panel').scrollTop = 0;
      pm.classList.add('open');
    };
    const pb = scope.querySelector('#pm-back');
    if (pb) pb.onclick = closePanelMore;
    const aq = scope.querySelector('#ask-quiz');
    if (aq) aq.onclick = () => startNodeQuiz(selectedId, 'map');   // ask 卡：测一测就知道
    const br = scope.querySelector('#btn-retest');
    if (br) br.onclick = () => startNodeQuiz(selectedId, 'map');
    const ru = scope.querySelector('#res-unlock');
    if (ru) ru.onclick = () => requireMember(() => renderPanel(true));
    const pu = scope.querySelector('#pack-unlock');
    if (pu) pu.onclick = () => requireMember(() => renderPanel(true));
    const pod = scope.querySelector('#pack-output-done');
    if (pod) pod.onclick = () => {
      togglePackDone(selectedId);
      const done = isPackDone(selectedId);
      pod.classList.toggle('done', done);
      pod.textContent = done ? '已完成 ✓（再点撤销）' : '完成了';
      if (done) { markCheckinDay(); confetti(); }
      toast(done ? '产出任务已打卡 ✓' : '已撤销打卡');
    };
    // 作文例文标注：点击/悬停高亮句显示手法 note（移动端点按展开标注条）
    const annoBar = scope.querySelector('#anno-bar');
    if (annoBar) {
      scope.querySelectorAll('.anno').forEach(m => {
        const show = () => {
          scope.querySelectorAll('.anno').forEach(x => x.classList.toggle('on', x === m));
          annoBar.textContent = m.dataset.note || '';
          annoBar.classList.add('show');
        };
        m.onclick = show;
        m.onmouseenter = show;
      });
    }
    scope.querySelectorAll('.chain-item').forEach(el => el.onclick = () => { closePanelMore(); selectTopic(el.dataset.id); });
    scope.querySelectorAll('.drill-ans-btn').forEach(btn => btn.onclick = () => {
      const item = btn.closest('.drill-item');
      const open = item.classList.toggle('open');
      btn.textContent = open ? '收起答案' : '查看答案（先自己做完再对）';
    });
    scope.querySelectorAll('[data-course-url]').forEach(el => el.onclick = () => {
      openCourse(selectedId, el.dataset.courseUrl, el.dataset.courseTitle);
    });
  }
  function closePanelMore() {
    const pm = document.getElementById('panel-more');
    if (pm) pm.classList.remove('open');
  }

  // ---------- 错因回溯（诊断模式，面板内） ----------
  function renderDiag() {
    const root = topicById.get(diagRootId);
    if (!root) return;
    const chain = collectChain(diagRootId, prereqsOf);
    const list = [...chain.entries()].sort((a, b) => {
      const ta = topicById.get(a[0]), tb = topicById.get(b[0]);
      return tb.gradeRangeStart - ta.gradeRangeStart;
    });
    const rows = list.map(([id, e]) => {
      const t = topicById.get(id);
      const m = mState(id);
      return `<div class="diag-row" data-id="${id}">
        <div class="dr-head">
          <span class="dr-name" style="color:${t._color}">${esc(t.name)}</span>
          <span class="dr-grade">${gradeTxtOf(t)}</span>
        </div>
        <div class="dr-reason">为什么相关：${esc(e.reason || '后续学习以它为基础')}</div>
        <div class="dr-btns">
          <button class="no ${m === 'no' ? 'active' : ''}" data-id="${id}" data-v="no">不会</button>
          <button class="yes ${m === 'yes' ? 'active' : ''}" data-id="${id}" data-v="yes">会</button>
        </div>
      </div>`;
    }).join('');
    panelBody.innerHTML = `
      <button id="panel-close" title="关闭">×</button>
      <h2 style="color:${root._color}">错因回溯：${esc(root.name)}</h2>
      <div class="desc" style="color:var(--text-dim);font-size:12.5px">学不会往往是因为前面的基础有缺口。下面是「${esc(root.name)}」的完整先修链，逐个自评「会 / 不会」，帮你找到最根上的缺口。（自评会直接写入掌握度标记）</div>
      <div class="diag-list">${rows || '<div class="desc">这个知识点没有先修节点，它就是最基础的起点。</div>'}</div>
      <div id="diag-conclusion-slot"></div>
      <button class="diag-exit" id="diag-exit">‹ 退出，返回详情</button>
      <div style="height:20px"></div>`;
    panelBody.querySelector('#panel-close').onclick = closePanel;
    panelBody.querySelector('#diag-exit').onclick = () => { panelView = 'detail'; selectedId = diagRootId; renderPanel(); };
    panelBody.querySelectorAll('.dr-btns button').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id, v = btn.dataset.v;
        setMastery(id, v);
        const row = panelBody.querySelector(`.diag-row[data-id="${id}"]`);
        if (row) {
          const m2 = mState(id);
          row.querySelector('.yes').classList.toggle('active', m2 === 'yes');
          row.querySelector('.no').classList.toggle('active', m2 === 'no');
        }
        renderDiagConclusion();
      };
    });
    renderDiagConclusion();
  }
  function renderDiagConclusion() {
    const slot = panelBody.querySelector('#diag-conclusion-slot');
    if (!slot) return;
    const chain = collectChain(diagRootId, prereqsOf);
    let deepest = null;
    let anyNo = false, total = 0, answered = 0;
    for (const id of chain.keys()) {
      total++;
      const m = mState(id);
      if (m) answered++;
      if (m === 'no') {
        anyNo = true;
        const t = topicById.get(id);
        if (!deepest || t.gradeRangeStart < topicById.get(deepest).gradeRangeStart) deepest = id;
      }
    }
    if (deepest) {
      const t = topicById.get(deepest);
      slot.innerHTML = `<div class="diag-conclusion">
        建议从这里开始补：<b>${esc(t.name)}</b>（${gradeTxtOf(t)}）—— 它是不会的链条里最根上的缺口。把它补上，再回来重学「${esc(topicById.get(diagRootId).name)}」会顺很多。
        <button class="jump" id="diag-jump">跳转查看 ›</button>
      </div>`;
      slot.querySelector('#diag-jump').onclick = () => selectTopic(deepest);
    } else if (total > 0 && answered === total && !anyNo) {
      slot.innerHTML = `<div class="diag-conclusion">整条先修链都标记了「会」——基础没问题，可以直接攻克这个知识点本身，多练几道题试试。</div>`;
    } else if (answered > 0) {
      slot.innerHTML = `<div class="diag-conclusion" style="border-color:var(--panel-border);background:var(--input-bg);color:var(--text-dim)">已自评 ${answered}/${total} 个先修节点，继续把剩下的评完，结论会更准。</div>`;
    } else {
      slot.innerHTML = '';
    }
  }

  // ---------- 会员门 ----------

  // ---------- 学习资源区（会员功能；课程/视频站内 iframe 播放） ----------
  const RES_ICON = { course: '课', video: '视', practice: '练', article: '文' };
  function resourceSectionHtml(topicId) {

  function courseOf(id) {

  // ---------- 补给包（导学卡/变式训练/回忆卡/产出任务；会员专享） ----------
  const PACK_DONE_KEY = 'cnk12_pack_output';
  let packDone = {};
  try { packDone = JSON.parse(localStorage.getItem(PACK_DONE_KEY) || '{}') || {}; } catch (e) { packDone = {}; }
  function isPackDone(id) { return !!packDone[id]; }
  function togglePackDone(id) {
    if (packDone[id]) delete packDone[id]; else packDone[id] = Date.now();
    try { localStorage.setItem(PACK_DONE_KEY, JSON.stringify(packDone)); } catch (e) {}
  }
  // 字段防御：字符串直接用；对象取 text/task/title；其余转空串（杜绝 [object Object]）
  function sTxt(v) {
    if (typeof v === 'string') return v;
    if (v && typeof v === 'object') return v.text || v.task || v.title || '';
    return v == null ? '' : String(v);
  }
  // 知识漫画卡（v64：图 + 文字覆盖层，全员可见，懒加载）
  function comicCardHtml(id) {
    const c = comicByTopic.get(id);
    if (!c) return '';
    return `<div class="comic-card">
      <img class="comic-img" src="${esc(c.image)}" alt="${esc(c.alt || '')}" loading="lazy">
      <div class="comic-cap"><b>${esc(c.title || '')}</b>${c.caption ? `<span>${esc(c.caption)}</span>` : ''}</div>
    </div>`;
  }
  // 漫画材料题图（v64：图 + 场景标注，懒加载）
  function comicMaterialHtml(key) {
    const m = comicMaterialByKey.get(key);
    if (!m) return '';
    return `<figure class="comic-material">
      <img class="comic-img" src="${esc(m.image)}" alt="${esc(m.alt || '')}" loading="lazy">
      ${m.scene ? `<figcaption class="comic-scene">${esc(m.scene)}</figcaption>` : ''}
    </figure>`;
  }
  // 导学卡（why 孩子为什么错 → rule 规律 → example 例子）
  function packGuideHtml(pack) {
    const g = pack.guide || {};
    const why = sTxt(g.why), rule = sTxt(g.rule), example = sTxt(g.example);
    if (!why && !rule && !example) return '';
    return `<div class="pack-guide">
      <div class="pg-tag">导学卡</div>
      ${why ? `<div class="pg-sec"><b>孩子为什么错</b><div>${esc(why)}</div></div>` : ''}
      ${rule ? `<div class="pg-sec"><b>规律</b><div>${esc(rule)}</div></div>` : ''}
      ${example ? `<div class="pg-sec"><b>例子</b><div>${esc(example)}</div></div>` : ''}
    </div>`;
  }
  // 回忆卡（正面问题，点击翻面显示答案）
  function packRecallHtml(pack) {
    const rc = pack.recall || {};
    const front = sTxt(rc.front), back = sTxt(rc.back);
    if (!front && !back) return '';
    return `<div class="flip-card" onclick="this.classList.toggle('flipped')" role="button" aria-label="回忆卡，点击翻面">
      <div class="flip-inner">
        <div class="flip-face flip-front"><div class="ff-tag">回忆卡 · 问题</div><div class="ff-text">${esc(front)}</div><div class="ff-hint">先自己想，点卡片翻面 ›</div></div>
        <div class="flip-face flip-back"><div class="ff-tag">答案</div><div class="ff-text">${esc(back)}</div><div class="ff-hint">再点翻回 ›</div></div>
      </div>
    </div>`;
  }
  // ---- 作文补给包专属区块（type === 'composition'） ----
  // structure：空格缩进的树状大纲 → 嵌套树（层级线连接）
  function packStructureHtml(pack) {
    const lines = Array.isArray(pack.structure) ? pack.structure.filter(s => typeof s === 'string' && s.trim()) : [];
    if (!lines.length) return '';
    const indents = lines.map(s => (s.match(/^ */) || [''])[0].length);
    const unit = Math.min(...indents.filter(n => n > 0)) || 2;
    let html = '<ul>', depth = 0;
    lines.forEach((s, i) => {
      const d = Math.min(Math.round(indents[i] / unit), depth + 1);   // 一次最多深入一层，防空行跳级
      if (i > 0) {
        if (d > depth) html += '<ul>';
        else if (d < depth) { for (let k = d; k < depth; k++) html += '</li></ul>'; html += '</li>'; }
        else html += '</li>';
      }
      html += `<li>${esc(s.trim())}`;
      depth = d;
    });
    html += '</li>' + '</li></ul>'.repeat(depth) + '</ul>';
    return `<div class="ask-sec">写作框架 · 按层次搭好再动笔</div><ul class="zw-tree">${html}</ul>`;
  }
  // materials：素材卡片列表
  function packMaterialsHtml(pack) {
    const mats = Array.isArray(pack.materials) ? pack.materials : [];
    if (!mats.length) return '';
    return `<div class="ask-sec">素材库 · 挑一个用进作文（${mats.length}）</div>` +
      mats.map(m => `<div class="var-item zw-material"><div class="v-t">${esc(sTxt(m))}</div></div>`).join('');
  }
  // sample：例文 + 手法标注（quote 正文高亮，点击/悬停显示 note）
  function packSampleHtml(pack) {
    const s = pack.sample;
    const text = s ? sTxt(s.text) : '';
    if (!s || !text) return '';
    const annos = (Array.isArray(s.annotations) ? s.annotations : [])
      .map(a => ({ quote: sTxt(a && a.quote), note: sTxt(a && a.note) }))
      .filter(a => a.quote && a.note);
    const paras = text.split('\n').filter(p => p.trim()).map(para => {
      let h = esc(para);
      annos.forEach((a, i) => {
        const q = esc(a.quote);
        const pos = h.indexOf(q);
        if (pos >= 0) h = h.slice(0, pos) + `<mark class="anno" data-note="${esc(a.note)}">${q}</mark>` + h.slice(pos + q.length);
      });
      return `<p>${h}</p>`;
    }).join('');
    return `<div class="ask-sec">例文 · 点高亮句看手法标注</div>
      <div class="zw-sample">
        ${sTxt(s.title) ? `<div class="zw-sample-title">${esc(sTxt(s.title))}</div>` : ''}
        <div class="zw-sample-text">${paras}</div>
        ${annos.length ? '<div class="anno-bar" id="anno-bar"></div>' : ''}
      </div>`;
  }
  function packCompositionHtml(pack) {
    if (!pack || pack.type !== 'composition') return '';
    return packStructureHtml(pack) + packMaterialsHtml(pack) + packSampleHtml(pack);
  }
  // 变式训练：与 coaching.drills 合并、按题干去重（答案折叠复用 drill-item）
  function packDrills(id) {
    const coachDrills = (coaching[id] && Array.isArray(coaching[id].drills)) ? coaching[id].drills : [];
    const pack = packByTopic.get(id);
    const seen = new Set(coachDrills.map(d => String(d.q || '').trim()));
    const extra = (pack && Array.isArray(pack.drills) ? pack.drills : [])
      .filter(d => d && d.q && !seen.has(String(d.q).trim()));
    return coachDrills.concat(extra);
  }
  function packDrillsHtml(id) {
    const drills = packDrills(id);
    if (!drills.length) return '';
    return `<div class="ask-sec">变式训练（${drills.length}）· 先看思路提示，做完再点开核对</div>
      ${drills.map(d => `<div class="drill-item">
        <div class="d-q">${esc(sTxt(d.q))}</div>
        ${sTxt(d.hint) ? `<div class="d-hint"><b>思路：</b>${esc(sTxt(d.hint))}</div>` : ''}
        <button class="drill-ans-btn" type="button">查看答案（先自己做完再对）</button>
        <div class="drill-ans"><b>参考答案：</b>${esc(sTxt(d.answer))}</div>
      </div>`).join('')}`;
  }
  // 产出任务：output 兼容两种 schema——字符串（yw/df）或 {task, done_when} 对象（zw）
  function packOutputHtml(id) {
    const pack = packByTopic.get(id);
    if (!pack || !pack.output) return '';
    const o = pack.output;
    const task = sTxt(o);
    const doneWhen = o && typeof o === 'object' ? sTxt(o.done_when) : '';
    if (!task) return '';
    const done = isPackDone(id);
    return `<div class="ask-sec">产出任务 · 用出来才算真会</div>
      <div class="pack-output">
        <div class="po-text">${esc(task)}</div>
        ${doneWhen ? `<div class="po-when"><b>怎么算完成：</b>${esc(doneWhen)}</div>` : ''}
        <button class="tbtn po-done ${done ? 'done' : ''}" id="pack-output-done">${done ? '已完成 ✓（再点撤销）' : '完成了'}</button>
      </div>`;
  }
  // 图谱节点详情的补给包区：有 pack 才显示；非会员只见标题与锁定卡
  function renderPackSection(id) {
    const pack = packByTopic.get(id);
    const comicHtml = comicByTopic.has(id) ? `<h3>知识漫画</h3>${comicCardHtml(id)}` : '';   // v64：漫画全员可见
    if (!pack) return comicHtml;
    const t = topicById.get(id);
    if (!isMember()) {
      return comicHtml + `<h3>补给包</h3>
        <div class="res-locked" id="pack-locked">
          <div class="res-locked-t">会员专享 · 「${esc(t ? t.name : id)}」补给包</div>
          <div class="res-locked-s">导学卡 + 变式训练 + 回忆卡 + 产出任务，专攻这一个薄弱点</div>
          <button class="tbtn" id="pack-unlock" style="min-height:44px">开通会员解锁 ›</button>
        </div>`;
    }
    return comicHtml + `<h3>补给包</h3>
      <div class="pack-card" id="pack-card">
        ${packGuideHtml(pack)}
        ${packCompositionHtml(pack)}
        ${packDrillsHtml(id)}
        ${pack.recall ? '<div class="ask-sec">回忆卡 · 先自己想，点卡片翻面核对</div>' + packRecallHtml(pack) : ''}
        ${packOutputHtml(id)}
        ${pack.source_note ? `<div class="pack-src">${esc(sTxt(pack.source_note))}</div>` : ''}
      </div>`;
  }

  // ---------- 答题引擎（全屏层，诊断 tab 与图谱共用） ----------
  const quizScreen = document.getElementById('quiz-screen');
  const quizBody = document.getElementById('quiz-body');
  function buildQuizItems(questions) {
    return shuffle(questions).map(q => {
      if (q.type === 'choice') {
        const opts = q.options.map((text, i) => ({
          text: String(text).replace(/^[A-D][.、．]\s*/, ''),
          correct: 'ABCD'[i] === q.answer,
        }));
        return { topicId: q.topicId, type: 'choice', q: q.q, options: shuffle(opts), explain: q.explain, comic: q.comic || null };
      }
      return { topicId: q.topicId, type: 'judge', q: q.q, answer: !!q.answer, explain: q.explain, comic: q.comic || null };
    });
  }
  function showQuizScreen() { quizScreen.classList.add('show'); }
  function hideQuizScreen() { quizScreen.classList.remove('show'); }
  function startNodeQuiz(topicId, returnTo) {
    const qs = quizByTopic.get(topicId);
    if (!qs || !qs.length) { toast('该知识点题库建设中'); return; }
    quiz = { mode: 'node', topicId, returnTo: returnTo || 'map', items: buildQuizItems(qs), idx: 0, answers: {}, scored: false };
    showQuizScreen();
    renderQuiz();
  }
  // v60：跨学科混抽——按学科分组轮转取题，题池不足的学科自动跳过，不看学科只看年级
  function startQuickQuiz(grade) {
    grade = grade || 7;
    const bySubj = new Map();
    for (const t of topics) {
      if (!(t.gradeRangeStart <= grade && t.gradeRangeEnd >= grade) || !quizByTopic.has(t.id)) continue;
      if (!bySubj.has(t.subject)) bySubj.set(t.subject, []);
      bySubj.get(t.subject).push(t);
    }
    const queues = shuffle([...bySubj.values()].map(arr => shuffle(arr)));
    const pickedTopics = [];
    while (pickedTopics.length < 10 && queues.some(q => q.length)) {
      for (const q of queues) {
        if (q.length && pickedTopics.length < 10) pickedTopics.push(q.pop());
      }
    }
    if (!pickedTopics.length) { toast('该年级题库建设中'); return; }
    const qs = pickedTopics.map(t => {
      const arr = quizByTopic.get(t.id);
      return arr[Math.floor(Math.random() * arr.length)];
    });
    quiz = { mode: 'quick', grade, subject: null, returnTo: isGuest() ? 'guest' : 'today', guest: isGuest(), items: buildQuizItems(qs), idx: 0, answers: {}, scored: false };
    showQuizScreen();
    renderQuiz();
  }
  // ---------- 快诊断落地：零选择直接 3 道题（默认 7 年级，全科混抽，答前可一行小字改年级） ----------
  function first3Pool(grade) {
    return topics.filter(t => t.gradeRangeStart <= grade && t.gradeRangeEnd >= grade && quizByTopic.has(t.id));
  }
  function startFirst3(grade) {
    grade = grade || 7;
    const pool = first3Pool(grade);
    if (pool.length < 3) {   // 题库实在不够：退回档案引导
      openOnboard();
      return;
    }
    const pickedTopics = shuffle(pool).slice(0, 3);
    const qs = pickedTopics.map(t => {
      const arr = quizByTopic.get(t.id);
      return arr[Math.floor(Math.random() * arr.length)];
    });
    quiz = { mode: 'first3', grade, subject: null, returnTo: 'today', items: buildQuizItems(qs), idx: 0, answers: {}, scored: false };
    showQuizScreen();
    renderQuiz();
  }
  function exitQuiz() {
    const mode = quiz && quiz.mode;
    const topicId = quiz && quiz.topicId;
    const returnTo = quiz && quiz.returnTo;
    if (mode === 'first3' && !profile) {   // 中途退出也落一份默认档案，下次不再强制快诊断
      profile = { role: 'parent', grade: quiz.grade, via: 'first3' };
      saveProfile();
    }
    quiz = null;
    hideQuizScreen();
    if (mode === 'first3') { if (isGuest()) exitGuestMode(); switchTab('today'); return; }
    if (mode === 'node') {
      if (returnTo === 'guest') { renderGuestBridge(); return; }
      if (returnTo === 'plan' || returnTo === 'today') { switchTab('today'); }
      else if (returnTo === 'course') { /* 课程层仍在下方，无需切换 */ }
      else { switchTab('map'); selectTopic(topicId); }
    }
  }
  let quizTimer = null;
  function renderQuiz() {
    if (!quiz) return;
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();   // v50：跳题后清焦点，避免上一题残留聚焦样式
    if (quiz.idx >= quiz.items.length) { renderQuizResult(); return; }
    clearTimeout(quizTimer); quizTimer = null;
    const item = quiz.items[quiz.idx];
    const it = topicById.get(item.topicId);
    const ans = quiz.answers[quiz.idx];          // 已答题保留选中态，可返回修改
    const answered = !!ans;
    let optsHtml;
    if (item.type === 'choice') {
      optsHtml = item.options.map((o, i) => {
        let cls = 'quiz-opt';
        if (answered) {
          if (o.correct) cls += ' correct';
          else if (ans.picked === i) cls += ' wrong';
        }
        return `<button class="${cls}" data-i="${i}">${esc(o.text)}</button>`;
      }).join('');
    } else {
      const jbtn = (val, label) => {
        let cls = 'quiz-opt judge';
        if (answered) {
          if (item.answer === val) cls += ' correct';
          else if (ans.picked === val) cls += ' wrong';
        }
        return `<button class="${cls}" data-v="${val ? 1 : 0}">${label}</button>`;
      };
      optsHtml = `<div class="quiz-judge">${jbtn(true, '✓ 对')}${jbtn(false, '✗ 错')}</div>`;
    }
    const ok = answered && ans.ok;
    const title = quiz.mode === 'node'
      ? `测一测：<span style="color:${it._color}">${esc(it.name)}</span>`
      : quiz.mode === 'first3'
        ? '3 道题，定位孩子卡在哪'
        : `快速诊断 · ${quiz.grade} 年级 · 全科`;
    quizBody.innerHTML = `
      <h2>${title}</h2>
      <div class="quiz-meta">第 ${quiz.idx + 1} / ${quiz.items.length} 题 · ${item.type === 'choice' ? '单选题' : '判断题'}${quiz.mode === 'quick' || quiz.mode === 'first3' ? ` · ${esc(it.subject)}：<span style="color:${it._color}">${esc(it.name)}</span>` : ''}</div>
      ${quiz.mode === 'first3' ? `<button class="fq-change" id="fq-change">默认 ${quiz.grade} 年级 · 全科混抽（点这里修改）</button>` : ''}
      ${item.comic ? comicMaterialHtml(item.comic) : ''}
      <div class="quiz-q">${esc(item.q)}</div>
      <div class="quiz-opts">${optsHtml}</div>
      ${answered ? `<div class="quiz-fb ${ok ? 'ok' : 'bad'}">${ok ? '✓ 回答正确' : '✗ 回答错误'}</div>
        ${!ok ? `<div class="err-row" id="qerr">错因：${['concept', 'transfer', 'careless'].map(k =>
          `<button class="err-chip ${((ans.err || 'transfer') === k) ? 'on' : ''}" data-err="${k}">${ERR_CN[k]}</button>`).join('')}</div>` : ''}
        <div class="quiz-explain">${esc(item.explain)}</div>` : ''}
      <div class="quiz-nav">
        ${quiz.idx > 0 ? '<button class="tbtn quiz-prev" id="quiz-prev">‹ 上一题</button>' : '<span></span>'}
        ${answered ? `<button class="tbtn quiz-next" id="quiz-next">${quiz.idx + 1 < quiz.items.length ? '下一题 ›' : '查看结果 ›'}</button>` : '<span class="quiz-auto">作答后自动进入下一题</span>'}
      </div>
      <button class="diag-exit" id="quiz-exit">‹ 退出答题</button>
      <div style="height:20px"></div>`;
    quizBody.querySelector('#quiz-exit').onclick = exitQuiz;
    const fc = quizBody.querySelector('#fq-change');
    if (fc) fc.onclick = openOnboard;   // 答前改年级学科：复用档案弹层，确认后重启 3 题
    quizBody.querySelectorAll('.quiz-opt').forEach(btn => btn.onclick = () => {
      let ok2, answerText, picked;
      if (item.type === 'choice') {
        picked = +btn.dataset.i;
        ok2 = item.options[picked].correct;
        answerText = item.options[picked].text;
      } else {
        picked = btn.dataset.v === '1';
        ok2 = (picked === item.answer);
        answerText = picked ? '对' : '错';
      }
      quiz.answers[quiz.idx] = { item, ok: ok2, answerText, picked };
      const cur = quiz.idx;
      renderQuiz();
      // 300ms+ 正误反馈后自动进入下一题
      quizTimer = setTimeout(() => {
        if (quiz && quiz.idx === cur && quiz.answers[cur]) {
          quiz.idx++;
          renderQuiz();
        }
      }, 550);
    });
    quizBody.querySelectorAll('#qerr .err-chip').forEach(c => c.onclick = () => {

  // ---------- 诊断辅助（说一说 / 上次诊断记录） ----------
  function lastDiag() {
    try { return JSON.parse(localStorage.getItem('cnk12_lastdiag') || 'null'); } catch (e) { return null; }
  }
  const SAY_EXAMPLES = ['文言文翻译老丢分', '作文总写跑题', '分数应用题不会', '古诗背了就忘'];
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;
  // 本地 2-gram 匹配：topics 的 name/description + coaching 的 ask/pattern，name 命中权重最高
  function sayMatch(q) {
    const s = q.replace(/[\s，。、！？,.!?「」『』“”"'：:；;（）()]/g, '');
    if (s.length < 2) return [];
    const grams = new Set();
    for (let i = 0; i < s.length - 1; i++) grams.add(s.slice(i, i + 2));
    const scored = [];
    for (const t of topics) {
      const c = coaching[t.id];
      const aux = c ? `${c.ask || ''} ${c.pattern || ''}` : '';
      let score = 0;
      for (const g of grams) {
        if (t.name.includes(g)) score += 3;
        else if (aux.includes(g)) score += 2;
        else if (t.description.includes(g)) score += 1;
      }
      if (score > 0) scored.push({ t, score });
    }
    scored.sort((a, b) => b.score - a.score || a.t.gradeRangeStart - b.t.gradeRangeStart);
    return scored.slice(0, 5).map(x => x.t);
  }

  function weakestNode() {

  function recallQueue() {
    const now = Date.now(), weak = [], stale = [];
    for (const t of topics) {

      if (v < 0.34) weak.push(t);                       // 还没消化，优先回忆
      else if (v >= 0.67) {
        const meta = masteryMeta[t.id];
        if (meta && meta.ts && now - meta.ts > 86400000) stale.push(t);   // 超 1 天没碰，防遗忘
      }
    }
    weak.sort((a, b) => mv(a.id) - mv(b.id));
    stale.sort((a, b) => (masteryMeta[a.id].ts || 0) - (masteryMeta[b.id].ts || 0));
    return weak.concat(stale).slice(0, 2);
  }

    if (!canvas) return;

    const valid = pts.filter(v => v !== null);
    if (valid.length < 2) return;
    const dpr = window.devicePixelRatio || 1;
    const W = 640, H = 200, padL = 34, padR = 12, padT = 14, padB = 22;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);
    const xs = i => padL + (W - padL - padR) * i / (days.length - 1);
    const ys = v => padT + (H - padT - padB) * (1 - v / 100);
    ctx.strokeStyle = 'rgba(20,24,38,.08)'; ctx.lineWidth = 1;
    for (const gv of [0, 50, 100]) {
      ctx.beginPath(); ctx.moveTo(padL, ys(gv)); ctx.lineTo(W - padR, ys(gv)); ctx.stroke();
      ctx.fillStyle = 'rgba(20,24,38,.4)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(gv + '%', padL - 5, ys(gv) + 3);
    }
    ctx.beginPath();
    let started = false;
    pts.forEach((v, i) => {
      if (v === null) return;
      if (!started) { ctx.moveTo(xs(i), ys(v)); started = true; } else ctx.lineTo(xs(i), ys(v));
    });
    ctx.strokeStyle = '#0e9f8a'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    });

    ctx.fillText(days[0].slice(5), xs(0), H - 6);
    ctx.fillText(days[days.length - 1].slice(5), xs(days.length - 1), H - 6);
  }

  // 拓扑排序：前置没掌握的排前面（Kahn，同层按年级从低到高）
  function buildPlanIds() {
    const weak = Object.keys(mastery).filter(id => topicById.has(id) && mState(id) === 'no');
    if (!weak.length) return [];
    const inPlan = new Set(weak);
    for (const id of weak) {
      const chain = collectChain(id, prereqsOf);
      for (const pid of chain.keys()) if (mState(pid) !== 'yes') inPlan.add(pid);
    }
    const indeg = new Map(), adj = new Map();
    for (const id of inPlan) indeg.set(id, 0);
    for (const d of deps) {
      if (inPlan.has(d.topicId) && inPlan.has(d.prerequisiteId)) {
        indeg.set(d.topicId, indeg.get(d.topicId) + 1);
        if (!adj.has(d.prerequisiteId)) adj.set(d.prerequisiteId, []);
        adj.get(d.prerequisiteId).push(d.topicId);
      }
    }
    const byGrade = (a, b) => {
      const ta = topicById.get(a), tb = topicById.get(b);
      return ta.gradeRangeStart - tb.gradeRangeStart || a.localeCompare(b);
    };
    const avail = [...inPlan].filter(id => indeg.get(id) === 0).sort(byGrade);
    const out = [];
    while (avail.length) {
      const id = avail.shift();
      out.push(id);
      for (const nx of (adj.get(id) || [])) {
        indeg.set(nx, indeg.get(nx) - 1);
        if (indeg.get(nx) === 0) { avail.push(nx); avail.sort(byGrade); }
      }
    }
    for (const id of inPlan) if (!out.includes(id)) out.push(id);
    return out;
  }
  // 计划项：动作 + 预计分钟 + 验收标准 + 关联资源
  const PLAN_CAP = 8;   // 一次只做一件事：今日清单最多 8 项
  function toPlanItem(id) {
    const t = topicById.get(id);

    const coach = coaching[id];

    const drillsN = coach && Array.isArray(coach.drills) ? coach.drills.length : 0;

    if (hasQuiz) criteria = '测一测全部答对';

    else if (t.evidence && t.evidence.length) criteria = '能做到：' + t.evidence[0];
    else criteria = '能用自己的话给家长讲明白';
    // 有变式训练的知识点：动作直接落到"完成 N 道变式训练"（题在图谱节点详情的 coaching 卡里）
    const action = drillsN
      ? `学习「${t.name}」并完成 ${drillsN} 道变式训练`
      : `学习「${t.name}」`;
    return { id, action, minutes, criteria, done: false };

  function buildTodayPlan(ids) {
    const capped = ids.slice(0, PLAN_CAP);
    plan2 = { date: todayStr(), items: capped.map(toPlanItem) };
    savePlan2();
    if (ids.length > PLAN_CAP) toast(`今日清单已生成 ${PLAN_CAP} 项；其余 ${ids.length - PLAN_CAP} 个已排队，明天继续`);
    else toast(`今日清单已生成：${capped.length} 项，做完一项勾一项`);
  }
  // R3b 抽屉「安排补」：把该节点 + 未掌握先修闭包拓扑排序后并入今日清单（去重，不超 PLAN_CAP）
  function addToTodayPlan(id) {
    if (!topicById.has(id)) return;
    const inPlan = new Set([id]);
    const chain = collectChain(id, prereqsOf);
    for (const pid of chain.keys()) if (mState(pid) !== 'yes') inPlan.add(pid);
    const indeg = new Map(), adj = new Map();
    for (const x of inPlan) indeg.set(x, 0);
    for (const d of deps) {
      if (inPlan.has(d.topicId) && inPlan.has(d.prerequisiteId)) {
        indeg.set(d.topicId, indeg.get(d.topicId) + 1);
        if (!adj.has(d.prerequisiteId)) adj.set(d.prerequisiteId, []);
        adj.get(d.prerequisiteId).push(d.topicId);
      }
    }
    const byGrade = (a, b) => {
      const ta = topicById.get(a), tb = topicById.get(b);
      return ta.gradeRangeStart - tb.gradeRangeStart || a.localeCompare(b);
    };
    const avail = [...inPlan].filter(x => indeg.get(x) === 0).sort(byGrade);
    const ordered = [];
    while (avail.length) {
      const x = avail.shift();
      ordered.push(x);
      for (const nx of (adj.get(x) || [])) {
        indeg.set(nx, indeg.get(nx) - 1);
        if (indeg.get(nx) === 0) { avail.push(nx); avail.sort(byGrade); }
      }
    }
    for (const x of inPlan) if (!ordered.includes(x)) ordered.push(x);
    const today = todayStr();
    const items = (plan2 && plan2.date === today && Array.isArray(plan2.items)) ? plan2.items.slice() : [];
    const have = new Set(items.map(it => it.id));
    const fresh = ordered.filter(x => !have.has(x));
    if (!fresh.length) { toast('这条先修链已在今日清单里'); switchTab('today'); return; }
    const room = Math.max(0, PLAN_CAP - items.length);
    const add = fresh.slice(0, room);
    if (!add.length) { toast('今日清单已满 8 项，先完成几项再来'); switchTab('today'); return; }
    plan2 = { date: today, items: items.concat(add.map(toPlanItem)) };
    savePlan2();
    toast(`已加入今日清单 ${add.length} 项（含没掌握的先修）${fresh.length > add.length ? `，其余 ${fresh.length - add.length} 个明天继续` : ''}`);
    switchTab('today');
  }

  function fmtDur(d) {   // ISO8601 PT15M20S → 15分20秒
    const m = /^PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/.exec(d || '');
    if (!m) return '';
    return (m[1] ? m[1] + '时' : '') + (m[2] ? m[2] + '分' : '') + (m[3] ? m[3] + '秒' : '');
  }
  function fmtSize(b) {
    if (!b) return '';
    return b >= 1048576 ? (b / 1048576).toFixed(0) + 'MB' : Math.max(1, Math.round(b / 1024)) + 'KB';
  }

        <div class="ob-sub">诊断和每天的会话都按年级编排，学科不用选——断点在哪科就补哪科。</div>
        <div class="ob-grades">${[1,2,3,4,5,6,7,8,9].map(g =>
          `<button data-grade="${g}">${g} 年级</button>`).join('')}</div>
        <button class="ob-close" id="ob-skip">先随便看看 ›</button>`;
      obBox.querySelectorAll('.ob-grades button').forEach(b => b.onclick = () => {
        obState.grade = +b.dataset.grade; obState.step = 2; renderOnboard();
      });
      obBox.querySelector('#ob-skip').onclick = skipOnboard;
    } else {
      const modeName = s.grade <= 3 ? '亲子模式（爸妈读题孩子答，约 8 分钟）' : s.grade <= 6 ? '陪伴模式（孩子自己答，约 12 分钟）' : '自主模式（孩子独立完成，约 15 分钟）';
      obBox.innerHTML = `
        <div class="ob-step-tag">第 2 步 / 共 2 步</div>
        <div class="ob-title">准备就绪</div>
        <div class="ob-summary">
          年级：<b>${s.grade} 年级</b><br>
          每天会话：<b>${modeName}</b>
        </div>
        <button class="ob-close ob-enter" id="ob-enter">开始第一次诊断 ✓</button>
        <button class="ob-back" id="ob-back">‹ 上一步</button>`;
      obBox.querySelector('#ob-enter').onclick = applyOnboard;
      obBox.querySelector('#ob-back').onclick = () => { obState.step = 1; renderOnboard(); };
    }
  }
  function openOnboard() {
    obState = { step: 1, grade: profile ? profile.grade : null };
    renderOnboard();
    onboard.classList.add('show');
  }

  // ---------- 桌面端面板拖拽调宽 ----------
  const PANEL_W_KEY = 'cnk12_panel_w';
  const resizer = document.getElementById('panel-resizer');
  let panelW = 420;
  try { panelW = Math.min(600, Math.max(280, parseInt(localStorage.getItem(PANEL_W_KEY), 10) || 420)); } catch (e) {}
  function applyPanelW() { panel.style.setProperty('--pw', panelW + 'px'); }
  applyPanelW();
  let rzDrag = null;
  resizer.addEventListener('pointerdown', (e) => {
    if (window.innerWidth <= 860) return;
    try { resizer.setPointerCapture(e.pointerId); } catch (err) {}
    rzDrag = { x: e.clientX, w: panelW };
    resizer.classList.add('active');
    e.preventDefault();
  });
  resizer.addEventListener('pointermove', (e) => {
    if (!rzDrag) return;
    panelW = Math.min(600, Math.max(280, rzDrag.w + (rzDrag.x - e.clientX)));
    applyPanelW();
  });
  function endRzDrag() {
    if (!rzDrag) return;
    rzDrag = null;
    resizer.classList.remove('active');
    try { localStorage.setItem(PANEL_W_KEY, String(panelW)); } catch (e) {}
  }
  resizer.addEventListener('pointerup', endRzDrag);
  resizer.addEventListener('pointercancel', endRzDrag);

  // ---------- 轻提示 ----------
  let toastTimer = null;
  // 品牌小圆标 → 我的 tab（关于）
  document.getElementById('brand-dot').onclick = () => switchTab('me');

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2600);
  }

  // ================= Loop B：分享海报生成器（750×1334 竖版，canvas 离屏绘制，长按保存） =================
  const POSTER_W = 750, POSTER_H = 1334;
  const POSTER_FONT = '"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function wrapPosterText(ctx, text, maxW) {
    const lines = [];
    let line = '';
    for (const ch of text) {
      if (ch === '\n') { lines.push(line); line = ''; continue; }
      if (ctx.measureText(line + ch).width > maxW && line) { lines.push(line); line = ch; }
      else line += ch;
    }
    if (line) lines.push(line);
    return lines;
  }
  function ellipsize(ctx, text, maxW) {
    if (ctx.measureText(text).width <= maxW) return text;
    let s = text;
    while (s.length > 1 && ctx.measureText(s + '…').width > maxW) s = s.slice(0, -1);
    return s + '…';
  }
  // 海报骨架：暖白底 + 顶部品牌行 + 底部品牌条；T() 记录所有绘制文案（测试断言用）
  function posterBase(eyebrow) {
    const c = document.createElement('canvas');
    c.width = POSTER_W; c.height = POSTER_H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#FAF7F2';
    ctx.fillRect(0, 0, POSTER_W, POSTER_H);
    const texts = [];
    const T = (txt, x, y, size, color, weight, align) => {
      ctx.font = `${weight || 400} ${size}px ${POSTER_FONT}`;
      ctx.fillStyle = color;
      ctx.textAlign = align || 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(txt, x, y);
      texts.push(txt);
    };
    // 顶部品牌行：青绿圆标「满」+ 小满伴学 + 右侧胶囊标签
    ctx.beginPath(); ctx.arc(90, 88, 26, 0, Math.PI * 2);
    ctx.fillStyle = '#16C7B7'; ctx.fill();
    ctx.font = `700 26px ${POSTER_FONT}`; ctx.fillStyle = '#fff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('满', 90, 91);
    T('小满伴学', 128, 98, 30, '#101828', 700);
    if (eyebrow) {
      ctx.font = `600 22px ${POSTER_FONT}`;
      const w = ctx.measureText(eyebrow).width + 40;
      roundRectPath(ctx, POSTER_W - 64 - w, 66, w, 44, 22);
      ctx.fillStyle = '#DFF7F4'; ctx.fill();
      T(eyebrow, POSTER_W - 64 - w / 2, 95, 22, '#0E9C8F', 600, 'center');
    }
    const card = (x, y, w, h) => {
      ctx.save();
      ctx.shadowColor = 'rgba(16,24,40,.08)'; ctx.shadowBlur = 24; ctx.shadowOffsetY = 8;
      roundRectPath(ctx, x, y, w, h, 28);
      ctx.fillStyle = '#FFFFFF'; ctx.fill();
      ctx.restore();
    };
    const footer = () => {
      const dots = ['#16C7B7', '#F5C542', '#EC5A32'];
      dots.forEach((col, i) => {
        ctx.beginPath(); ctx.arc(POSTER_W / 2 - 30 + i * 30, POSTER_H - 172, 8, 0, Math.PI * 2);
        ctx.fillStyle = col; ctx.fill();
      });
      T('小满伴学', POSTER_W / 2, POSTER_H - 122, 30, '#101828', 700, 'center');
      T('孩子卡在哪，今天干什么，一看就懂', POSTER_W / 2, POSTER_H - 78, 24, '#667085', 400, 'center');
    };
    return { c, ctx, texts, T, card, footer };
  }

  // ① 诊断报告海报：年级 + 测了 N 个知识点 + 薄弱 TOP3 + 人话结论（无分数、无排名、不制造焦虑）
  function drawDiagPoster(data) {
    const { ctx, texts, T, card, footer, c } = posterBase('体检报告');
    const weak = (data.weak || []).slice(0, 3);
    T('学 习 体 检 报 告', 64, 192, 26, '#0E9C8F', 700);
    T(`${data.grade} 年级 · 测了 ${data.tested} 个知识点`, 64, 258, 50, '#101828', 800);
    const now = new Date();
    T(`${now.getMonth() + 1} 月 ${now.getDate()} 日 · ${data.allClear ? '这次没有发现断点' : `找出 ${weak.length} 个主要断点`}`, 64, 308, 26, '#667085');
    let y = 348;
    if (data.allClear) {
      card(64, y, POSTER_W - 128, 220);
      ctx.beginPath(); ctx.arc(POSTER_W / 2, y + 84, 40, 0, Math.PI * 2);
      ctx.fillStyle = '#16C7B7'; ctx.fill();
      T('✓', POSTER_W / 2, y + 99, 44, '#fff', 700, 'center');
      T('这次测的知识点全部拿下', POSTER_W / 2, y + 168, 32, '#101828', 700, 'center');
      y += 220;
    } else {
      const rowH = 92, cardH = 96 + weak.length * rowH + 8;
      card(64, y, POSTER_W - 128, cardH);
      T('断点在哪环', 96, y + 58, 30, '#101828', 700);
      weak.forEach((wk, i) => {
        const ry = y + 96 + i * rowH;
        // 红橙序号块
        roundRectPath(ctx, 96, ry, 52, 52, 12);
        ctx.fillStyle = '#EC5A32'; ctx.fill();
        T(String(i + 1), 96 + 26, ry + 36, 26, '#fff', 700, 'center');
        ctx.font = `700 30px ${POSTER_FONT}`;
        T(ellipsize(ctx, wk.name, 330), 168, ry + 37, 30, '#101828', 700);
        // 学科胶囊
        const sc = COLORS[wk.subject] || '#667085';
        ctx.font = `600 20px ${POSTER_FONT}`;
        const pw = ctx.measureText(wk.subject).width + 28;
        ctx.save(); ctx.globalAlpha = 0.12;
        roundRectPath(ctx, POSTER_W - 96 - pw, ry + 8, pw, 36, 18);
        ctx.fillStyle = sc; ctx.fill();
        ctx.restore();
        T(wk.subject, POSTER_W - 96 - pw / 2, ry + 34, 20, sc, 600, 'center');
      });
      y += cardH;
    }
    // 结论卡：金左条 + 人话
    y += 32;
    const concl = data.allClear
      ? '基础很扎实。去知识星图挑战新内容，一天 15 分钟，保持手感。'
      : '卡住的不是孩子，是这几个知识点。每个断点都配好了补法：一天 15 分钟，断哪环补哪环。';
    ctx.font = `400 28px ${POSTER_FONT}`;
    const lines = wrapPosterText(ctx, concl, POSTER_W - 128 - 72);
    const cH = 56 + lines.length * 44;
    card(64, y, POSTER_W - 128, cH);
    roundRectPath(ctx, 64, y + 16, 6, cH - 32, 3);
    ctx.fillStyle = '#F5C542'; ctx.fill();
    lines.forEach((ln, i) => T(ln, 96, y + 62 + i * 44, 28, '#101828'));
    footer();
    return { dataUrl: c.toDataURL('image/png'), texts, width: POSTER_W, height: POSTER_H };
  }

  // ② 进步海报：streak + 忆/学/练 + 本周断点（无分数）
  function drawProgressPoster(data) {
    const { ctx, texts, T, card, footer, c } = posterBase('每日 15 分钟');
    T('今 日 完 成', 64, 192, 26, '#0E9C8F', 700);
    // streak 区：麦黄火焰 + 大数字
    T('🔥', 64, 288, 64, '#101828', 400);
    const streakTxt = data.streak > 1 ? `连续打卡 ${data.streak} 天` : '打卡第 1 天';
    T(streakTxt, 156, 280, 52, '#B98A1D', 800);
    T('一天 15 分钟，断哪环补哪环', 156, 326, 26, '#667085');
    let y = 376;
    // 忆/学/练 三格（有会话数据才画）
    if (data.quiz) {
      card(64, y, POSTER_W - 128, 168);
      const cols = [
        ['忆 · 复习', data.quiz.recallN, '题'],
        ['学 · 新知', data.quiz.learnN, '个'],
        ['练 · 变式', data.quiz.practiceN, '题'],
      ];
      const cw = (POSTER_W - 128) / 3;
      cols.forEach(([label, n, unit], i) => {
        const cx = 64 + cw * i + cw / 2;
        ctx.font = `800 48px ${POSTER_FONT}`;
        const nw = ctx.measureText(String(n)).width;
        ctx.font = `400 22px ${POSTER_FONT}`;
        const uw = ctx.measureText(unit).width + 4;
        T(String(n), cx - uw / 2, y + 84, 48, '#0E9C8F', 800, 'center');
        T(unit, cx - uw / 2 + nw / 2 + 4, y + 84, 22, '#667085', 400, 'left');
        T(label, cx, y + 128, 22, '#667085', 400, 'center');
      });
      y += 168 + 32;
    }
    // 本周断点卡
    const wins = data.week || { count: 0, names: [] };
    const rows = wins.names.slice(0, 3);
    const cardH = 96 + (rows.length ? rows.length * 60 : 44) + 12;
    card(64, y, POSTER_W - 128, cardH);
    T(wins.count ? `本周拿下 ${wins.count} 个断点` : '本周战报', 96, y + 58, 30, '#101828', 700);
    if (rows.length) {
      rows.forEach((nm, i) => {
        const ry = y + 96 + i * 60;
        ctx.beginPath(); ctx.arc(96 + 18, ry + 18, 18, 0, Math.PI * 2);
        ctx.fillStyle = '#16C7B7'; ctx.fill();
        T('✓', 96 + 18, ry + 26, 22, '#fff', 700, 'center');
        ctx.font = `700 28px ${POSTER_FONT}`;
        T(ellipsize(ctx, nm, POSTER_W - 128 - 130), 96 + 52, ry + 28, 28, '#101828', 700);
      });
    } else {
      T('继续保持，断点一个个来', 96, y + 116, 26, '#667085');
    }
    footer();
    return { dataUrl: c.toDataURL('image/png'), texts, width: POSTER_W, height: POSTER_H };
  }

  // 近 7 天新拿下的断点（掌握度升到已掌握的节点）
  function weekWins() {
    const weekAgo = Date.now() - 7 * 86400000;
    const names = [];
    for (const [id, meta] of Object.entries(masteryMeta)) {
      if (!meta || !meta.ts || meta.ts < weekAgo) continue;
      if (mState(id) !== 'yes') continue;
      const t = topicById.get(id);
      if (t) names.push(t.name);
    }
    return { count: names.length, names: names.slice(0, 3) };
  }
  function progressPosterData(s) {
    return {
      streak: streakInfo().count,
      quiz: s ? { recallN: s.recall.length, learnN: s.learnTopicId ? 1 : 0, practiceN: s.practice.length } : null,
      week: weekWins(),
    };
  }

  // 预览层：全屏展示 + 长按保存引导（微信 H5 无法直接触发分享）
  const posterModal = document.getElementById('poster-modal');
  const posterImg = document.getElementById('poster-img');
  function showPoster(dataUrl) {
    posterImg.src = dataUrl;
    posterModal.classList.add('show');
  }
  document.getElementById('poster-close').onclick = () => posterModal.classList.remove('show');
  posterModal.addEventListener('click', (e) => { if (e.target === posterModal) posterModal.classList.remove('show'); });

  // ---------- 启动 ----------
  let mapInited = false;  function initMapView() {
    mapInited = true;
    if (window.innerWidth < 860 && !isMobile()) panel.classList.add('hidden');
    if (isMobile()) {
      sheetState = 'collapsed'; panel.classList.remove('hidden');
      // 移动端单学科模式：默认第一个学科（v60 去学科导航，图谱仅作探索工具），chips 单选切换
      mobileSubject = subjects[0];
      activeSubjects.clear();
      activeSubjects.add(mobileSubject);
      syncChips();
      rotAngle = 0;
    }
    resize();
    if (isMobile()) fitSubjectMobile(mobileSubject);
    else if (profile && profile.grade) focusGradeSubject(profile.grade, profile.subject);
    else fitView();
    enterT0 = performance.now(); enterDone = false;   // 入场生长动画
  }
  updateStats();
  if (!profile || FROM_VIDEO) {   // v50 新客/视频落地：全屏流程，无 tab 栏
    enterGuestMode();
    startFirst3();
  } else {
    switchTab('today');   // 主入口 = 今日（教练任务页）
  }

  // 自动化验收辅助
  window.__cnkTest = {
    posOf: (id) => {   // 返回视口坐标（含 canvas 在页面中的偏移，便于自动化点按）
      const t = topicById.get(id);
      if (!t) return null;
      topicScreen(t);
      const r = canvas.getBoundingClientRect();
      return [t._sx + r.left, t._sy + r.top];
    },
    quiz: () => quiz,
    isMember,
    switchTab,
    selectTopic,
    openCourse,
    plan: () => plan2,
    coaching: () => coaching,
    pack: (id) => resPackByTopic.get(id),
    supplyPack: (id) => packByTopic.get(id),
    visibleSubjects: () => [...activeSubjects],
    mobileSubject: () => mobileSubject,
    viewSize: () => [W, H],
    scale: () => scale,
    rotAngle: () => rotAngle,
    currentTab: () => currentTab,
    startQuickQuiz,
    openMap,
    closeMap,
    isGuest,
    startSession,
    closeSession,
    session: () => session,
    sessionNext,
    sessionModeKey,
    buildSession,
    openOnboard,
    startNodeQuiz,
    addToTodayPlan,
    drawOf: (id) => { const t = topicById.get(id); return t ? [t._dr || 0, t._da == null ? 1 : t._da, t._de == null ? 1 : t._de] : null; },
    drawDiagPoster,
    drawProgressPoster,
    progressPosterData,
    weekWins,
    showPoster,
    renderSession,
  };
})();
</script>

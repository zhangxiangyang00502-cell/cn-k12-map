<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%2316C7B7'/></svg>">
<title>小满伴学</title>
<style>
  :root {
    /* ---------- 设计令牌 v51（Loop A 第二轮定稿） ---------- */
    /* 色板 */
    --bg: #FAF7F2;            /* 暖白底 */
    --panel: #FFFFFF;         /* 纯白卡 */
    --accent: #16C7B7;        /* 青绿主色 */
    --accent-deep: #0E9C8F;
    --gold: #F5C542;          /* 麦黄点缀 */
    --text: #101828;          /* 正文 */
    --text-dim: #667085;      /* 辅助 */
    --green: #16a34a;         /* 成功 */
    --green-bright: #16a34a;
    --bad: #dc2626;           /* 警示 */
    /* 字阶（大标题 24/28 · 卡题 17/24 · 正文 15/24 · 辅助 13/20；display 为 hero 特档） */
    --fs-display: 28px; --lh-display: 36px;
    --fs-quote: 20px;  --lh-quote: 34px;   /* 教练话术 / 击中人的话（display 级引文） */
    --fs-title: 24px;  --lh-title: 28px;
    --fs-card: 17px;   --lh-card: 24px;
    --fs-body: 15px;   --lh-body: 24px;
    --fs-aux: 13px;    --lh-aux: 20px;
    /* 间距：4 的倍数（4/8/12/16/24/32） */
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-6: 24px; --sp-8: 32px;
    /* 圆角：卡片 18 · 按钮 14 · 小标签 8 */
    --r-card: 18px; --r-btn: 14px; --r-tag: 8px;
    /* 阴影：卡片弥散 / 悬浮 */
    --card-shadow: 0 8px 24px rgba(16,24,40,.06);
    --float-shadow: 0 12px 32px rgba(16,24,40,.12);
    --gold-shadow: 0 12px 32px rgba(16,24,40,.10);
    /* 派生语义色 */
    --panel-2: #F7F3EC;
    --panel-border: #F0E7DA;
    --tabbar-h: 58px;
    --input-bg: #F7F3EC;
    --hover-bg: #F4F0E8;
    --teal-soft: #DFF7F4; --teal-soft-border: #B2E8E1; --teal-text: #0E9C8F;
    --green-soft: #E7F4E9; --green-soft-border: #BFE3C8;
    --red-soft: #FDECEA; --red-soft-border: #F3C2BE;
    --gold-soft: #FDF3D7; --gold-soft-border: #EAD9A8; --gold-text: #B98A1D;
    --card-inset: #FBF8F2; --line-soft: #F0E7D8;
    --hint-blue: #3E6E8E;
    --purple: #8A5CB8; --purple-soft: #F6F1FA; --purple-border: #E2D3F0;
    --coach-a: #FFF8E6; --coach-b: #FFFFFF;
    --tabbar-bg: rgba(255,255,255,.94);
  }
  /* ---------- 图谱浅底星图（v51：与全站同 skin，仅背景光晕不同） ---------- */
  body[data-tab="map"] {
    /* 令牌与默认皮肤一致，不再翻转 */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }
  /* R3b：全局页头砍掉，品牌缩成角落小圆标（点击进「我的→关于」） */
  #brand-dot { position: fixed; left: 10px; bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px) + 10px);
    width: 34px; height: 34px; border-radius: 50%; border: none; z-index: 25; cursor: pointer;
    background: linear-gradient(135deg, #16C7B7, #0E9C8F); color: #fff; font-size: 15px; font-weight: 700;
    font-family: inherit; box-shadow: 0 2px 8px rgba(14,156,143,.35); opacity: .85;
    display: flex; align-items: center; justify-content: center; padding: 0; }
  #brand-dot:active { transform: scale(.94); }
  body[data-tab="map"] #brand-dot, body.in-session #brand-dot { display: none; }

  /* ---------- 视图容器 ---------- */
  #views { flex: 1; min-height: 0; position: relative; }
  .view { position: absolute; inset: 0; display: none; }
  .view.active { display: block; }
  #view-map.active { display: flex; flex-direction: column; }
  .scroll-view { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 28px; overscroll-behavior: contain; }
  .scroll-inner { max-width: 680px; margin: 0 auto; }

  /* ---------- 底部五 tab（浅色页白底 / 图谱页深蓝底，自动跟随） ---------- */
  #tabbar { flex: 0 0 auto; display: flex; border-top: 1px solid var(--panel-border);
    background: var(--tabbar-bg); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 30; transition: background .2s ease; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; min-height: var(--tabbar-h); background: none; border: none; color: var(--text-dim);
    font-size: 11px; font-weight: 600; cursor: pointer; position: relative; font-family: inherit;
    transition: color .2s ease; }
  .tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7;
    stroke-linecap: round; stroke-linejoin: round; }
  .tab-btn.active { color: var(--accent-deep); }
  body[data-tab="map"] .tab-btn.active svg { filter: drop-shadow(0 0 6px rgba(22,199,183,.7)); }
  .tab-badge { position: absolute; top: 6px; left: calc(50% + 8px); min-width: 17px; height: 17px;
    border-radius: 999px; background: var(--bad); color: #fff; font-size: 10.5px; font-weight: 700;
    display: none; align-items: center; justify-content: center; padding: 0 4px; }
  .tab-badge.show { display: inline-flex; }

  /* ---------- 图谱视图 ---------- */
  /* R3b：工具栏一行化 = 返回 + 学科下拉 + 搜索图标 */
  #map-toolbar { display: flex; flex-wrap: nowrap; gap: 8px; align-items: center; padding: 8px 12px;
    border-bottom: 1px solid var(--panel-border); background: var(--panel); flex: 0 0 auto; }
  #search { flex: 0 0 auto; width: 0; padding: 6px 0; opacity: 0; border-radius: var(--r-tag);
    border: 1px solid transparent; background: var(--input-bg); color: var(--text); font-size: 13px;
    outline: none; min-height: 32px; transition: width .2s ease, opacity .2s ease, padding .2s ease; }
  #map-toolbar.search-open #search { width: 180px; padding: 6px 10px; opacity: 1; border-color: var(--panel-border); }
  #search:focus { border-color: var(--accent); }
  #subject-select { padding: 6px 8px; border-radius: var(--r-btn); border: 1px solid var(--panel-border);
    background: var(--hover-bg); color: var(--text); font-size: 12.5px; font-family: inherit;
    min-height: 32px; max-width: 46vw; cursor: pointer; outline: none; }
  #search-toggle { margin-left: auto; width: 32px; height: 32px; border-radius: var(--r-btn);
    border: 1px solid var(--panel-border); background: var(--hover-bg); color: var(--text);
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  #map-toolbar.search-open #search-toggle { border-color: var(--accent); color: var(--accent-deep); }
  .tbtn { padding: 6px 12px; border-radius: var(--r-btn); border: 1px solid var(--panel-border); background: var(--hover-bg);
    color: var(--text); font-size: 12.5px; cursor: pointer; min-height: 32px; white-space: nowrap; }
  .tbtn:hover { border-color: var(--accent); }
  .tbtn:active { transform: translateY(1px); }
  #mastery-stats { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  #mastery-stats b { font-weight: 700; }
  #mastery-stats .s-yes { color: var(--green-bright); }
  #mastery-stats .s-no { color: var(--bad); }
  @media (max-width: 767px) {
    #map-toolbar { gap: 5px; padding: 5px 8px; }
    #map-toolbar .tbtn { min-height: 30px; padding: 5px 9px; font-size: 12px; }
    #subject-select { font-size: 12px; min-height: 30px; max-width: 40vw; }
    #map-toolbar.search-open #search { width: 120px; font-size: 12px; min-height: 30px; }
    #legend { padding: 5px 9px; }
    #legend .lg-body { display: none; }
    #legend.open .lg-body { display: block; margin-top: 6px; }
    #legend-toggle { display: inline; }
  }
  #map-main { flex: 1; display: flex; min-height: 0; position: relative; }
  #canvas-wrap { flex: 1; position: relative; min-width: 0; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
  canvas.dragging { cursor: grabbing; }
  #tooltip { position: absolute; pointer-events: none; background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: var(--r-tag); padding: 6px 10px; font-size: 12px; max-width: 280px; display: none; z-index: 10;
    box-shadow: var(--card-shadow); color: var(--text); }
  #tooltip .tt-name { font-weight: 600; }
  #tooltip .tt-meta { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
  #legend { position: absolute; left: 12px; bottom: 12px; font-size: 11px; color: var(--text-dim);
    background: rgba(255,255,255,.92); padding: 8px 10px; border-radius: var(--r-tag); border: 1px solid var(--panel-border);
    line-height: 1.8; max-width: calc(100% - 24px); z-index: 8; box-shadow: var(--card-shadow); }
  #legend .lg-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; vertical-align: -1px; }
  #legend-toggle { display: none; background: none; border: none; color: var(--accent); font-size: 11px;
    cursor: pointer; padding: 0; font-family: inherit; }
  #search-results { position: absolute; top: 6px; left: 12px; z-index: 20; background: var(--panel);
    border: 1px solid var(--panel-border); border-radius: 8px; max-height: 260px; overflow-y: auto; display: none; min-width: 280px; }
  .sr-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--panel-border); }
  .sr-item:hover { background: var(--hover-bg); }
  .sr-item .m { color: var(--text-dim); font-size: 11px; }
  #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 14px; z-index: 30; background: var(--bg); }

  /* ---------- 图谱详情面板（桌面右侧 / 移动底部抽屉） ---------- */
  #panel { width: var(--pw, 420px); flex: 0 0 var(--pw, 420px); border-left: 1px solid var(--panel-border); background: var(--panel);
    overflow-y: auto; padding: 16px; transition: margin-right .2s; -webkit-overflow-scrolling: touch; position: relative; }
  #panel.hidden { margin-right: calc(-1 * var(--pw, 420px)); }
  /* R3b 抽屉第二层：课标/资源/先修名单，从底部上滑覆盖 */
  #panel-more { position: absolute; inset: 0; z-index: 6; background: var(--panel); overflow-y: auto;
    -webkit-overflow-scrolling: touch; padding: 12px 16px 20px; transform: translateY(102%);
    transition: transform .25s ease; visibility: hidden; }
  #panel-more.open { transform: translateY(0); visibility: visible; }
  #panel-more .pm-back { background: none; border: none; color: var(--accent-deep); font-size: 13px;
    font-weight: 600; cursor: pointer; padding: 6px 0; font-family: inherit; }
  /* R3b 抽屉家长化：单一主动作 + 次要文字链 */
  .act-primary { display: block; width: 100%; min-height: 48px; border: none; border-radius: var(--r-btn);
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; margin: 10px 0 4px; box-shadow: 0 3px 10px rgba(14,156,143,.3); }
  .act-primary:active { transform: translateY(1px); }
  .act-sub { font-size: 11.5px; color: var(--text-dim); margin: 0 2px 8px; line-height: 1.5; }
  .act-row { display: flex; flex-wrap: wrap; gap: 4px 14px; margin: 6px 0 4px; }
  .act-link { background: none; border: none; color: var(--accent-deep); font-size: 13px; font-weight: 600;
    cursor: pointer; padding: 6px 0; font-family: inherit; min-height: 32px; }
  .act-link.plain { color: var(--text-dim); font-weight: 500; }
  .more-toggle { display: block; width: 100%; margin-top: 14px; padding: 10px 12px; border-radius: var(--r-btn);
    border: 1px dashed var(--panel-border); background: var(--input-bg); color: var(--text-dim);
    font-size: 12.5px; cursor: pointer; font-family: inherit; text-align: center; min-height: 40px; }
  #panel-resizer { display: none; width: 8px; flex: 0 0 8px; cursor: col-resize; background: transparent;
    border-left: 1px solid transparent; touch-action: none; }
  #panel-resizer:hover, #panel-resizer.active { background: rgba(22,199,183,0.18); border-left-color: var(--accent); }
  @media (min-width: 861px) { #panel-resizer { display: block; } }
  @media (max-width: 860px) {
    #panel { position: absolute; right: 0; top: 0; bottom: 0; z-index: 15; box-shadow: -8px 0 24px rgba(16,24,40,0.18);
      max-width: 94vw; }
  }
  #panel-handle { display: none; }
  /* 移动端抽屉遮罩：固定全屏半透明，点击关闭抽屉 */
  #drawer-mask { display: none; }
  @media (max-width: 767px) {
    #drawer-mask { display: block; position: fixed; inset: 0; z-index: 38;
      background: rgba(16,24,40,0.38); backdrop-filter: blur(1.5px); -webkit-backdrop-filter: blur(1.5px);
      opacity: 0; pointer-events: none; transition: opacity .2s ease; }
    #drawer-mask.show { opacity: 1; pointer-events: auto; }
    #panel { position: fixed; left: 0; right: 0; top: auto; bottom: 0; width: auto; flex: none; max-width: none;
      height: 55vh; height: 55dvh; z-index: 40; border-left: none; border-top: 1px solid var(--panel-border);
      border-radius: 18px 18px 0 0; box-shadow: 0 -12px 32px rgba(16,24,40,0.16);
      padding: 0 calc(16px + env(safe-area-inset-right, 0px)) calc(16px + env(safe-area-inset-bottom, 0px)) calc(16px + env(safe-area-inset-left, 0px));
      transform: translateY(105%); transition: transform .2s ease;
      display: flex; flex-direction: column; overflow: hidden; }
    #panel.hidden { margin-right: 0; }
    #panel.sheet-open { transform: translateY(0); }
    #panel.dragging { transition: none; }
    #panel-body { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    #panel-handle { display: flex; align-items: center; justify-content: center; height: 34px; flex: 0 0 34px;
      cursor: grab; touch-action: none; margin: 0 -16px; }
    #panel-handle .grip { width: 44px; height: 5px; border-radius: 3px; background: var(--panel-border); }
  }
  #panel h2 { font-size: var(--fs-card); line-height: var(--lh-card); margin-bottom: 6px; }
  #panel h3 { font-size: 13px; color: var(--text-dim); margin: 16px 0 8px; border-top: 1px solid var(--panel-border); padding-top: 12px; }
  #panel .desc { font-size: 13px; line-height: 1.7; color: var(--text); margin: 10px 0; }
  #panel ul { padding-left: 18px; font-size: 12.5px; line-height: 1.8; }
  .badges { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--panel-border); color: var(--text-dim); }
  .badge.skeleton { color: var(--gold-text); border-color: var(--gold-soft-border); }
  .badge.type { color: var(--teal-text); border-color: var(--teal-soft-border); }
  .badge.grade { color: var(--green-bright); border-color: var(--green-soft-border); }
  .badge.m-yes { color: var(--green-bright); border-color: var(--green-soft-border); }
  .badge.m-mid { color: var(--gold-text); border-color: var(--gold-soft-border); }
  .badge.m-no { color: var(--bad); border-color: var(--red-soft-border); }
  #panel-close { float: right; background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer;
    min-width: 44px; min-height: 44px; margin: -8px -10px 0 0; }
  #empty-hint { color: var(--text-dim); font-size: 13px; line-height: 2; }
  /* 追溯统计条 */
  .trace-stats { display: flex; gap: 8px; margin: 10px 0; }
  .trace-stat { flex: 1; background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: var(--r-tag);
    padding: 8px 6px; text-align: center; }
  .trace-stat .n { font-size: 18px; font-weight: 800; color: var(--accent); }
  .trace-stat .l { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }
  /* coaching ask 卡 */
  .ask-card { background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--r-card); padding: 16px; margin-top: 12px; }
  .ask-card .ask-tag { font-size: 11px; color: var(--teal-text); font-weight: 700; margin-bottom: 5px; }
  .ask-card .ask-q { font-size: 13.5px; line-height: 1.7; font-weight: 600; }
  .ask-card .ask-pattern { font-size: 12px; color: var(--text-dim); line-height: 1.7; margin-top: 8px;
    border-top: 1px dashed var(--line-soft); padding-top: 8px; }
  .ask-cta { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .ask-mv { font-size: 12px; color: var(--text-dim); }
  .ask-mv.yes { color: var(--green-bright); }
  .ask-mv.mid { color: var(--gold-text); }
  .ask-mv.no { color: var(--bad); }
  .ask-quiz-btn { flex: 1; min-width: 150px; min-height: 40px; border-color: var(--accent); color: var(--accent); }
  .ask-card .ask-sec { font-size: 11px; color: var(--teal-text); font-weight: 700; margin: 12px 0 6px;
    border-top: 1px dashed var(--line-soft); padding-top: 10px; }
  .var-item { background: var(--card-inset); border: 1px solid var(--line-soft); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
  .var-item .v-t { font-size: 12.5px; line-height: 1.7; font-weight: 600; }
  .var-item .v-e { font-size: 11.5px; color: var(--text-dim); line-height: 1.7; margin-top: 4px; }
  .drill-item { background: var(--card-inset); border: 1px solid var(--line-soft); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
  .drill-item .d-q { font-size: 12.5px; line-height: 1.7; font-weight: 600; }
  .drill-item .d-hint { font-size: 11.5px; color: var(--hint-blue); line-height: 1.7; margin-top: 5px; }
  .drill-item .d-hint b { color: var(--teal-text); }
  .drill-ans-btn { margin-top: 8px; min-height: 32px; padding: 4px 12px; border-radius: var(--r-btn);
    border: 1px dashed var(--teal-soft-border); background: none; color: var(--teal-text); font-size: 11.5px; cursor: pointer; }
  .drill-ans { display: none; font-size: 12px; line-height: 1.7; margin-top: 6px;
    border-top: 1px dashed var(--line-soft); padding-top: 6px; color: var(--text-dim); }
  .drill-ans b { color: var(--green-bright); }
  .drill-item.open .drill-ans { display: block; }
  /* 补给包 */
  .pack-card { background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--r-card); padding: 16px; margin-top: 4px; }
  .pack-guide { background: var(--card-inset); border: 1px solid var(--line-soft); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .pg-tag { font-size: 11px; color: var(--gold-text); font-weight: 700; margin-bottom: 4px; }
  .pg-sec { font-size: 12.5px; line-height: 1.7; margin-top: 8px; }
  .pg-sec:first-of-type { margin-top: 2px; }
  .pg-sec b { color: var(--hint-blue); display: block; margin-bottom: 2px; }
  .pack-src { font-size: 11px; color: var(--text-dim); margin-top: 10px; border-top: 1px dashed var(--line-soft); padding-top: 8px; }
  /* 知识漫画（v64 少年有梦切片） */
  .comic-card { border-radius: var(--r-card); overflow: hidden; border: 1px solid var(--line-soft); background: var(--card-inset); margin: 4px 0 10px; }
  .comic-img { display: block; width: 100%; height: auto; }
  .comic-cap { padding: 8px 12px 10px; font-size: 13px; line-height: 1.55; }
  .comic-cap b { display: block; font-size: 14px; margin-bottom: 2px; }
  .comic-cap span { color: var(--text-dim); }
  .comic-material { margin: 0 0 10px; border-radius: var(--r-card); overflow: hidden; border: 1px solid var(--line-soft); background: var(--card-inset); }
  .comic-scene { padding: 6px 12px 8px; font-size: 12px; color: var(--text-dim); }
  .pack-output { background: var(--card-inset); border: 1px solid var(--green-soft-border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .po-text { font-size: 12.5px; line-height: 1.7; font-weight: 600; }
  .po-when { font-size: 12px; line-height: 1.7; color: var(--text-dim); margin-top: 6px; }
  .po-when b { color: var(--hint-blue); }
  .po-done { width: 100%; min-height: 40px; margin-top: 8px; border-color: var(--green-bright); color: var(--green-bright); }
  .po-done.done { background: var(--green-soft); }
  /* 回忆卡翻面 */
  .flip-card { perspective: 800px; cursor: pointer; margin-bottom: 6px; }
  .flip-inner { position: relative; transform-style: preserve-3d; transition: transform .45s; }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-face { backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: var(--card-inset); border: 1px solid var(--line-soft); border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; min-height: 110px; }

  .quiz-fb.ok { color: var(--green-bright); }
  .quiz-fb.bad { color: var(--bad); }

  .err-row { font-size: 12px; color: var(--text-dim); margin-top: 8px; line-height: 2; }

  .quiz-explain { font-size: 12.5px; color: var(--text-dim); line-height: 1.7; background: var(--input-bg);

  .quiz-next { width: 100%; min-height: 46px; margin-top: 12px; border-color: var(--accent); color: var(--accent);

  .quiz-wr .wr-q { font-weight: 600; margin-bottom: 4px; }
  .quiz-wr .wr-a { color: var(--green-bright); }
  .quiz-wr .wr-e { color: var(--text-dim); margin-top: 4px; font-size: 12px; }
  .qd-group-t { font-size: 13px; font-weight: 700; margin: 14px 0 6px; }
  .qd-group-t.ok { color: var(--green-bright); }
  .qd-group-t.bad { color: var(--bad); }

  /* ---------- 站内看课（iframe 全屏层） ---------- */
  #course-screen { position: fixed; inset: 0; z-index: 44; background: var(--bg); display: none;
    flex-direction: column; }
  #course-screen.show { display: flex; }
  .cs-top { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--panel);
    border-bottom: 1px solid var(--panel-border); flex: 0 0 auto; }
  #cs-back { min-height: 40px; padding: 4px 12px; border-radius: var(--r-btn); border: 1px solid var(--panel-border);
    background: var(--input-bg); color: var(--text); font-size: 14px; cursor: pointer; flex: 0 0 auto; }
  .cs-title { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 原生课程页（L4：平台反嵌套，不嵌 iframe） */
  .cs-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px 20px; min-height: 0; }
  .cs-cover { position: relative; border-radius: var(--r-card); overflow: hidden; background: #101725;
    border: 1px solid #23406b; min-height: 150px; display: flex; align-items: flex-end; cursor: pointer; }
  .cs-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }
  .cs-play { position: relative; width: 100%; border: none; background: linear-gradient(transparent, rgba(8,12,22,0.92) 45%);

  .cs-play span { display: block; font-size: 11px; font-weight: 400; color: var(--text-dim); margin-top: 3px; }
  .cs-meta { margin: 12px 2px 4px; }
  .cs-meta-t { font-size: var(--fs-card); line-height: var(--lh-card); font-weight: 800; }
  .cs-meta-s { font-size: 11.5px; color: var(--text-dim); margin-top: 4px; line-height: 1.6; }
  .cs-pack-t { font-size: 12px; font-weight: 700; color: var(--teal-text); margin: 16px 2px 8px; }
  .cs-pk { display: flex; align-items: center; gap: 10px; background: var(--panel);
    border: 1px solid var(--panel-border); border-radius: var(--r-card); padding: 12px; margin-bottom: 8px; }
  .cs-pk-label { flex: 0 0 auto; font-size: 10.5px; font-weight: 700; color: var(--teal-text); background: var(--teal-soft);
    border: 1px solid var(--teal-soft-border); border-radius: 999px; padding: 3px 8px; }
  .cs-pk-m { flex: 1; min-width: 0; }
  .cs-pk-t { font-size: 13px; font-weight: 600; line-height: 1.5; }
  .cs-pk-f { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }
  .cs-pk-open { flex: 0 0 auto; min-height: 38px; border-color: var(--teal-soft-border); color: var(--teal-text); background: var(--teal-soft); }
  .cs-tip { font-size: 11.5px; color: var(--text-dim); line-height: 1.7; background: var(--input-bg);
    border: 1px dashed var(--panel-border); border-radius: var(--r-card); padding: 12px; margin-top: 12px; }
  /* 答题导航（上一题/下一题） */
  .quiz-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; }
  .quiz-nav .quiz-next { width: auto; flex: 1; margin-top: 0; }
  .quiz-prev { min-height: 46px; padding: 6px 16px; }
  .quiz-auto { font-size: 11px; color: var(--text-dim); }
  /* 诊断结果悬浮按钮 */
  .float-cta { position: fixed; left: 14px; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    z-index: 46; max-width: 612px; margin: 0 auto; box-shadow: var(--float-shadow); }
  .cs-bottom { display: flex; gap: 10px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    background: var(--panel); border-top: 1px solid var(--panel-border); flex: 0 0 auto; }
  .cs-bottom .tbtn { flex: 1; min-height: 46px; font-size: 14px; font-weight: 700; }
  #cs-checkin { border-color: var(--green-soft-border); color: var(--green-bright); background: var(--green-soft); }
  #cs-checkin.done { opacity: 0.6; }

  /* ---------- 会员弹层 / 引导 / 提示 ---------- */
  #member-modal, #onboard { position: fixed; inset: 0; z-index: 65; background: rgba(16,24,40,0.48); display: none;
    align-items: flex-end; justify-content: center; }
  #member-modal.show, #onboard.show { display: flex; }
  .ob-box { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px 18px 0 0;
    width: 100%; max-width: 560px; padding: 24px 20px calc(20px + env(safe-area-inset-bottom, 0px)); }
  @media (min-width: 768px) {
    #member-modal, #onboard { align-items: center; }

  }
  .ob-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .ob-sub { font-size: 12.5px; color: var(--text-dim); margin-bottom: 14px; line-height: 1.6; }
  .ob-grades { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .ob-grades button { min-height: 44px; min-width: 0; border-radius: var(--r-btn); font-size: 14px; cursor: pointer;
    border: 1px solid var(--panel-border); background: var(--input-bg); color: var(--text); }
  @media (max-width: 767px) { .ob-grades { grid-template-columns: repeat(4, 1fr); } }
  .ob-grades button:hover { border-color: var(--accent); }
  .ob-close { width: 100%; margin-top: 12px; min-height: 40px; border-radius: var(--r-btn); border: none;
    background: none; color: var(--text-dim); font-size: 12.5px; cursor: pointer; }
  .ob-step-tag { font-size: 11.5px; color: var(--accent); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
  .ob-back { width: 100%; min-height: 38px; margin-top: 8px; border: none; background: none;
    color: var(--text-dim); font-size: 12.5px; cursor: pointer; }
  .ob-subjects { display: flex; gap: 10px; }
  .ob-subjects button { flex: 1; min-height: 56px; border-radius: var(--r-btn); font-size: 15px; font-weight: 700;
    cursor: pointer; border: 1.5px solid var(--panel-border); background: var(--input-bg); color: var(--text); }
  .ob-subjects button:hover, .ob-subjects button.active { border-color: var(--accent); color: var(--accent); background: var(--teal-soft); }
  .ob-summary { font-size: 13.5px; line-height: 2; background: var(--input-bg); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
  .ob-summary b { color: var(--accent); }
  .ob-enter { width: 100%; min-height: 48px; border-radius: 10px; border: none; background: var(--accent);
    color: #FFFFFF; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 4px; }
  .member-benefits { list-style: none; margin-bottom: 14px; }
  .member-benefits li { font-size: 13px; line-height: 1.6; padding: 8px 10px; margin-bottom: 6px;
    background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: 8px; }
  .member-benefits li b { color: var(--teal-text); }
  .member-act { display: flex; gap: 8px; }
  .member-act input { flex: 1; min-height: 44px; min-width: 0; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--panel-border); background: var(--input-bg); color: var(--text); font-size: 14px; outline: none; }
  .member-act input:focus { border-color: var(--accent); }
  .member-act button { min-height: 44px; padding: 0 22px; border-radius: var(--r-btn); border: 1.5px solid var(--accent);
    background: var(--teal-soft); color: var(--accent); font-size: 14.5px; font-weight: 700; cursor: pointer; }
  .member-note { font-size: 11.5px; color: var(--text-dim); margin-top: 8px; }
  .member-err { font-size: 12.5px; color: var(--bad); min-height: 18px; margin-top: 4px; }
  #toast { position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%); z-index: 70;
    background: rgba(24,30,40,0.96); border: 1px solid var(--accent); color: var(--text);
    padding: 10px 18px; border-radius: 999px; font-size: 13.5px; display: none; max-width: 88vw; text-align: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5); pointer-events: none; }
  #toast { color: #F6F8FB; }

  /* ---------- Loop B：海报预览层（长按保存引导） ---------- */
  #poster-modal { position: fixed; inset: 0; z-index: 90; background: rgba(16,24,40,.62);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    padding: 24px; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
  #poster-modal.show { display: flex; }
  #poster-img { max-width: min(84vw, 400px); max-height: 72vh; border-radius: 18px;
    box-shadow: 0 16px 48px rgba(0,0,0,.35); display: block; }
  #poster-modal .pm-hint { color: #fff; font-size: 14px; font-weight: 600; letter-spacing: .5px;
    background: rgba(255,255,255,.14); padding: 8px 18px; border-radius: 999px; }
  #poster-close { position: absolute; top: calc(14px + env(safe-area-inset-top, 0px)); right: 16px;
    width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,.16);
    color: #fff; font-size: 22px; cursor: pointer; line-height: 1; }

  /* ================= v40 皮肤层：小满暖白质感 + 星空图谱 + 切换过渡 ================= */
  body { transition: background-color .2s ease; }
  body[data-tab="map"] {
    background-color: #FAF7F2;
    background-image:
      radial-gradient(640px 460px at 85% -8%, rgba(245,197,66,.03), transparent 62%),
      radial-gradient(720px 540px at -12% 16%, rgba(22,199,183,.03), transparent 60%);
    background-attachment: fixed;
  }
  .view.active { animation: viewIn .2s ease; }
  @keyframes viewIn { from { opacity: 0; } to { opacity: 1; } }

  /* 暖白质感：大圆角 + 弥散阴影（照抄 v1） */
  .card, .todo, .say-hit, .hero, .hero-mini, .td-empty {
    border-radius: 18px; box-shadow: var(--card-shadow);
  }
  .hero { box-shadow: var(--gold-shadow); }
  .entry-card { border-radius: var(--r-card); }
  .quiz-opt { border-radius: var(--r-btn); }
  .ob-box { border-radius: var(--r-card) var(--r-card) 0 0; }
  @media (min-width: 768px) { .ob-box { border-radius: var(--r-card); } }
  .coach-line { border-radius: var(--r-card); box-shadow: var(--gold-shadow); border-color: #F5E7C0; }
  body[data-tab="map"] .coach-line { border-color: var(--line-soft); }
  /* 主按钮：青绿渐变 + 光晕（照抄 v1 hot 按钮） */
  .big-cta, .say-go, .ob-enter {
    background: linear-gradient(135deg, #16C7B7, #12B0A1); color: #fff;
    box-shadow: 0 4px 12px rgba(22,199,183,.35); border: none; border-radius: var(--r-btn);
  }
  .big-cta:active, .say-go:active, .ob-enter:active { transform: translateY(1px); }
  .price-now { color: var(--accent-deep); }
  .price-tag { background: linear-gradient(135deg, #16C7B7, #12B0A1); }
  header h1 { font-weight: 800; letter-spacing: .5px; }

  /* ---------- 今日页：问候 + streak 火焰 ---------- */
  .td-hello { padding: 4px 2px 14px; }
  .td-hi { font-size: 24px; font-weight: 800; letter-spacing: .5px; }
  .td-streak { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
    font-size: 13px; color: #8A6D1F; background: #FDF3D7; border-radius: 999px; padding: 5px 12px; font-weight: 600; }
  .td-streak.broken { color: #9A5B3C; background: #FDECE5; }
  .td-streak.fresh { color: #0E9C8F; background: #DFF7F4; }
  /* 今日页掌握度小卡（v1 同款） */
  .td-mastery-card { background: var(--panel); border-radius: 18px; padding: 16px 18px; margin-bottom: 14px;
    box-shadow: var(--card-shadow); border: 1px solid #F5EEE2; }
  body[data-tab="map"] .td-mastery-card { border-color: var(--panel-border); }
  .td-mastery-card .row { display: flex; align-items: baseline; justify-content: space-between; }
  .td-mastery-card .subj { font-size: 14px; font-weight: 700; color: var(--text-dim); }
  .td-mastery-card .pct { font-size: 28px; font-weight: 800; color: var(--accent-deep); letter-spacing: .5px; }
  .td-mastery-card .pct small { font-size: 13px; font-weight: 700; color: var(--text-dim); margin-left: 3px; }
  .td-mastery-card .bar { height: 9px; border-radius: 999px; background: var(--input-bg); margin-top: 12px; overflow: hidden; }
  .td-mastery-card .bar i { display: block; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #16C7B7 0%, #F5C542 100%); transition: width .5s ease; }
  .td-mastery-card .note { font-size: 12px; color: var(--text-dim); margin-top: 9px; }
  .td-mastery-card .note b { color: var(--gold-text); font-weight: 700; }

  /* ---------- 掌握度数值滚动 ---------- */
  .mastery-roll { display: inline-block; font-variant-numeric: tabular-nums; }

  /* ---------- 打卡彩带（不挡操作） ---------- */
  #fx-confetti { position: fixed; inset: 0; z-index: 80; pointer-events: none; display: none; }

  /* ---------- 快诊断落地（3 题） ---------- */
  .fq-change { display: inline-block; margin-top: 2px; border: none; background: none; cursor: pointer;
    color: var(--text-dim); font-size: 11.5px; text-decoration: underline; text-underline-offset: 3px;
    font-family: inherit; padding: 4px 0; min-height: 28px; }
  .fq-change:hover { color: var(--accent-deep); }
  .fq-punch { font-size: var(--fs-quote); font-weight: 800; line-height: 1.65; margin: 14px 0 4px; }
  .fq-punch b { color: var(--accent-deep); }
  .fq-bp { background: var(--panel); border: 1px solid var(--panel-border); border-radius: var(--r-card);
    padding: 14px; margin-top: 12px; box-shadow: var(--card-shadow); }
  .fq-bp .bp-t { font-size: 12px; font-weight: 700; color: var(--gold-text); letter-spacing: 1px; margin-bottom: 8px; }
  .fq-bp .bp-row { display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 0; border-bottom: 1px dashed var(--panel-border); font-size: 13.5px; }
  .fq-bp .bp-row:last-child { border-bottom: none; }
  .fq-bp .bp-name { font-weight: 700; }
  .fq-bp .bp-meta { font-size: 11.5px; color: var(--text-dim); white-space: nowrap; }

  /* ---------- 体检报告（完整诊断结果页） ---------- */
  .rp-block { background: var(--panel); border: 1px solid var(--panel-border); border-radius: var(--r-card);
    padding: 16px; margin-top: 12px; box-shadow: var(--card-shadow); }
  .rp-block .rp-t { font-size: 12px; font-weight: 800; color: var(--gold-text); letter-spacing: 1.5px; margin-bottom: 8px; }
  .rp-portrait { font-size: 15px; line-height: 1.9; }
  .rp-portrait b { color: var(--accent-deep); }
  .rp-portrait .weak b { color: var(--bad); }
  .rp-ov-nums { display: flex; gap: 8px; margin: 4px 0 10px; }
  .rp-ov-num { flex: 1; text-align: center; background: var(--input-bg); border-radius: var(--r-tag); padding: 8px 4px; }
  .rp-ov-num .n { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .rp-ov-num .l { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }
  .rp-ov-num.ok .n { color: var(--green-bright); }
  .rp-ov-num.mid .n { color: var(--gold-text); }
  .rp-ov-num.bad .n { color: var(--bad); }
  .rp-ov-bar { display: flex; height: 9px; border-radius: 999px; overflow: hidden; background: var(--input-bg); }
  .rp-ov-bar i { display: block; height: 100%; }
  .rp-ov-bar .b-ok { background: var(--green-bright); }
  .rp-ov-bar .b-mid { background: var(--gold); }
  .rp-ov-bar .b-bad { background: var(--bad); }
  .bp-chain { background: var(--card-inset); border: 1px solid var(--line-soft); border-radius: var(--r-tag);
    padding: 12px; margin-top: 10px; }
  .bp-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 12.5px; }
  .bp-node { border-radius: 999px; padding: 4px 11px; font-weight: 700; font-size: 12px;
    background: var(--input-bg); color: var(--text-dim); border: 1.5px solid var(--panel-border); }
  .bp-node.broken { background: var(--red-soft); color: var(--bad); border-color: var(--red-soft-border); }
  .bp-node.ok { background: var(--green-soft); color: var(--green-bright); border-color: var(--green-soft-border); }
  .bp-arrow { color: var(--text-dim); font-size: 12px; }
  .bp-fix { margin-top: 10px; width: 100%; min-height: 42px; font-weight: 700; }
  .rp-member { text-align: center; border: 1.5px dashed var(--gold-soft-border); background: var(--gold-soft); }
  .rp-member .m-t { font-size: 15px; font-weight: 800; }
  .rp-member .m-t b { color: var(--gold-text); }
  .rp-member .m-s { font-size: 12px; color: var(--text-dim); margin: 6px 0 10px; line-height: 1.6; }

  /* ================= v50 结构层：三 tab / 沉浸流 / 成长页 / 新客全屏 ================= */
  /* 新客全屏流程：隐藏整个 app chrome（tab 栏、header），只留全屏流程层 */
  body.guest #app { display: none; }
  /* 图谱全屏打开（非 tab）：隐藏 tab 栏，返回按钮在图谱工具栏里 */
  body[data-tab="map"] #tabbar { display: none; }
  #map-back { flex: 0 0 auto; font-weight: 700; }
  /* 今日页顶部 2px 细进度条，随滚动前进 */
  #td-progress { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 60;
    background: transparent; pointer-events: none; display: none; }
  body[data-tab="today"]:not(.guest) #td-progress { display: block; }
  #td-progress i { display: block; height: 100%; width: 0;
    background: linear-gradient(90deg, #16C7B7, #F5C542); transition: width .15s ease-out; }
  /* 焦点：触屏不出"默认选中框"，仅键盘导航 :focus-visible 显示聚焦样式 */
  button:focus { outline: none; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- 今日沉浸流 ---------- */
  .td-hero { min-height: 40vh; display: flex; flex-direction: column; justify-content: center; padding: 16px 2px 10px; }
  .td-hero .td-hi { font-size: var(--fs-display); font-weight: 800; letter-spacing: .5px; }
  .td-hero .td-streak { margin-top: 10px; }
  .coach-big { font-size: var(--fs-quote); line-height: 1.7; font-weight: 800; letter-spacing: .3px; margin-top: 18px; }
  .coach-big b { color: var(--accent-deep); }
  .td-sec-title { display: flex; align-items: baseline; justify-content: space-between; padding: 26px 2px 12px; }
  .td-sec-title h2 { font-size: 17px; font-weight: 800; letter-spacing: .3px; }
  .td-sec-title span { font-size: 12px; color: var(--text-dim); }
  .todo-overdue { font-size: 10px; color: var(--bad); border: 1px solid var(--red-soft-border);
    background: var(--red-soft); border-radius: 999px; padding: 1px 7px; margin-left: 6px; font-weight: 700; }
  .td-settle { text-align: center; padding: 38px 18px 34px;
    background: radial-gradient(420px 260px at 50% 28%, rgba(245,197,66,.12), transparent 70%); }
  .td-settle .st-label { font-size: 12px; font-weight: 700; color: var(--gold-text); letter-spacing: 3px; }
  .td-settle .st-pct { font-size: 46px; font-weight: 800; color: var(--accent-deep); margin-top: 8px;
    font-variant-numeric: tabular-nums; text-shadow: 0 6px 28px rgba(22,199,183,.22); }
  .td-settle .st-pct small { font-size: 18px; color: var(--text-dim); }
  .td-settle .st-flame { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px;

  .text-link { background: none; border: none; color: var(--text-dim); font-size: 13px; cursor: pointer;
    text-decoration: underline; text-underline-offset: 3px; font-family: inherit; padding: 8px; min-height: 36px; }
  .text-link:hover { color: var(--accent-deep); }

  /* ---------- 成长页 ---------- */
  .gr-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px;
    padding: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); }

  .gr-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
  .gr-row .s { flex: 0 0 72px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gr-row .bar { flex: 1; display: flex; height: 8px; border-radius: 4px; overflow: hidden; background: var(--input-bg); }
  .gr-row .bar i { display: block; height: 100%; }
  .gr-row .n { flex: 0 0 auto; font-size: 11.5px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .gr-curve { width: 100%; height: 150px; display: block; }
  .gr-cal { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 4px; }
  .gr-cal i { aspect-ratio: 1; border-radius: var(--r-tag); background: var(--input-bg); display: block; }
  .gr-cal i.on { background: linear-gradient(135deg, #16C7B7, #12B0A1); box-shadow: 0 2px 6px rgba(22,199,183,.3); }
  .gr-cal i.today { outline: 2px solid var(--gold); outline-offset: 1px; }
  .gr-star { display: block; width: 100%; text-align: left; cursor: pointer; font-family: inherit;
    background: radial-gradient(220px 130px at 10% 0%, rgba(22,199,183,.09), transparent 70%),
      radial-gradient(200px 120px at 94% 100%, rgba(245,197,66,.12), transparent 70%), var(--panel);
    color: var(--text); border: 1px solid var(--panel-border); border-radius: var(--r-card);
    padding: 18px; margin-bottom: 12px; box-shadow: var(--card-shadow); transition: transform .12s ease; }
  .gr-star:active { transform: scale(.985); }
  .gr-star .gs-t { font-size: 17px; font-weight: 800; letter-spacing: .5px; }
  .gr-star .gs-s { font-size: 13px; color: var(--text-dim); margin-top: 5px; line-height: 1.6; }
  .gr-week { display: flex; gap: 8px; margin-bottom: 4px; }
  .gr-week .w { flex: 1; background: var(--input-bg); border-radius: var(--r-tag); padding: 9px 4px; text-align: center; }
  .gr-week .n { font-size: 19px; font-weight: 800; color: var(--accent-deep); font-variant-numeric: tabular-nums; }
  .gr-week .l { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }

  /* ================= v60 会话流：沙发上的 15 分钟（忆→学→练→结算，全屏无 tab） ================= */
  body.in-session #td-progress { display: none; }
  #session-screen { position: fixed; inset: 0; z-index: 46; background: var(--bg); display: none;
    overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #session-screen.show { display: block; }
  .ss-top { position: sticky; top: 0; z-index: 6; padding: 10px 16px 12px;
    background: linear-gradient(var(--bg) 80%, rgba(250,247,242,0)); }
  .ss-toprow { display: flex; align-items: center; justify-content: space-between; max-width: 640px; margin: 0 auto; }
  .ss-close { width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--panel-border); background: var(--panel);
    color: var(--text-dim); font-size: 20px; line-height: 1; cursor: pointer; flex: 0 0 auto; }
  .ss-stage { font-size: 12px; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; }
  .ss-progress { height: 2px; background: var(--input-bg); border-radius: 999px; max-width: 640px; margin: 8px auto 0; overflow: hidden; }
  .ss-progress i { display: block; height: 100%; background: linear-gradient(90deg, #16C7B7, #F5C542); border-radius: 999px; transition: width .3s ease; }
  #session-body { max-width: 640px; margin: 0 auto; padding: 4px 16px calc(44px + env(safe-area-inset-bottom, 0px)); }
  .ss-speaker { display: inline-block; font-size: 12px; font-weight: 800; letter-spacing: 2px; color: #0D9488;
    background: var(--teal-soft); border-radius: 999px; padding: 4px 12px; margin: 12px 0 8px; }
  .ss-speaker.parent { color: #8A6D1F; background: #FDF3D7; }
  .ss-coach { font-size: var(--fs-body); line-height: var(--lh-body); font-weight: 600; margin-bottom: 14px; }
  .ss-hint { font-size: 13px; line-height: 20px; color: var(--text-dim); background: var(--input-bg);
    border-radius: var(--r-tag); padding: 8px 12px; margin: 8px 0 12px; }
  .me-mode-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .me-mode-chip.on { border-color: var(--accent); color: var(--accent-deep); background: var(--teal-soft); }
  .rp-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .rp-head h2 { flex: 1 1 auto; }
  .rp-share { flex: 0 0 40px; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--panel-border);
    background: var(--panel); color: var(--accent-deep); cursor: pointer; display: flex; align-items: center;
    justify-content: center; padding: 0; }
  .rp-share svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round; }
  .rp-links { display: flex; flex-wrap: wrap; gap: 4px 18px; justify-content: center; margin-top: 4px; }
  .ss-tag { font-size: var(--fs-aux); line-height: var(--lh-aux); color: var(--text-dim); margin: 2px 0 8px; }
  .ss-big-q { font-size: 17px; line-height: 1.8; font-weight: 600; margin-bottom: 14px; }
  .ss-big-q.child { font-size: 21px; line-height: 1.75; }
  .ss-opts-readonly .quiz-opt { cursor: default; }
  .ss-judge-btns { display: flex; gap: 12px; margin-top: 18px; }
  .ss-judge { flex: 1; min-height: 60px; border-radius: var(--r-btn); font-size: 17px; font-weight: 800; cursor: pointer; border: 1.5px solid; font-family: inherit; }
  .ss-judge.ok { background: var(--green-soft); border-color: var(--green-bright); color: var(--green-bright); }
  .ss-judge.bad { background: var(--red-soft); border-color: var(--bad); color: var(--bad); }

    padding: 12px; margin-top: 12px; font-size: 14px; line-height: 1.7; }

  .ss-intro h2 { font-size: var(--fs-display); line-height: var(--lh-display); font-weight: 800; margin: 8px 0 6px; }

    font-size: 13px; font-weight: 700; color: var(--text-dim); cursor: pointer; font-family: inherit; }
  .ss-mode-chip.on { border-color: var(--accent); color: var(--accent); background: var(--teal-soft); }
  .ss-plan-line { font-size: var(--fs-aux); color: var(--text-dim); margin: 12px 0 24px; }
  .td-start { margin-top: 6px; font-size: 17px; min-height: 56px; }
  #td-focus-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

  /* ---------- 减少动态效果：全部特效关闭 ---------- */
  @media (prefers-reduced-motion: reduce) {
    .view.active { animation: none; }
    body, #tabbar, .tab-btn, .td-mastery-card .bar i { transition: none !important; }
    #fx-confetti { display: none !important; }
  }

<script>
(async function () {
  const [topicsData, depsData, standardsData, clustersData, quizData, resourcesData] = await Promise.all([
    fetch('data/topics.json').then(r => r.json()),
    fetch('data/dependencies.json').then(r => r.json()),
    fetch('data/curriculum-standards.json').then(r => r.json()),
    fetch('data/clusters.json').then(r => r.json()),
    fetch('data/quiz.json').then(r => r.json()),
    fetch('data/resources.json').then(r => r.json()),
  ]);
  // coaching 数据（R4 内容原子，另一管线产出）：文件不存在或结构不符时优雅降级为空
  let coaching = {};
  try {
    const r = await fetch('data/coaching.json');
    if (r.ok) {
      const c = await r.json();
      // key 可能在顶层，也可能嵌在 coaching 字段下
      const raw = c && typeof c === 'object' && !Array.isArray(c)
        ? (c.coaching && typeof c.coaching === 'object' && !Array.isArray(c.coaching) ? c.coaching : c)
        : {};
      for (const k of Object.keys(raw)) {
        const v = raw[k];
        if (v && typeof v === 'object' && !Array.isArray(v)) coaching[k] = v;
      }
    }
  } catch (e) { coaching = {}; }
  // 五件套课程包（R5）：视频课程/课件/教学设计/学习任务单/课后练习，按 topicId 关联；缺失时优雅降级
  const resPackByTopic = new Map();
  try {
    const r = await fetch('data/resources_pack.json');
    if (r.ok) {
      const d = await r.json();
      const packs = d && (d.packs || d.resources);
      if (Array.isArray(packs)) {
        for (const p of packs) {
          if (p && p.topicId && Array.isArray(p.items)) resPackByTopic.set(p.topicId, p.items);
        }
      }
    }
  } catch (e) {}
  // 补给包（R6：导学卡/变式训练/回忆卡/产出任务）：packs_yw + packs_df 两文件合并；缺失时优雅降级为空
  const packByTopic = new Map();
  for (const url of ['data/packs_yw.json', 'data/packs_df.json', 'data/packs_zw.json']) {
    try {
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        const packs = d && d.packs;
        if (packs && typeof packs === 'object' && !Array.isArray(packs)) {
          for (const k of Object.keys(packs)) {
            const v = packs[k];
            if (v && typeof v === 'object' && !Array.isArray(v)) packByTopic.set(k, v);
          }
        }
      }
    } catch (e) {}
  }
  // 知识漫画 + 漫画材料题图（v64 少年有梦切片）：缺失时优雅降级为空
  const comicByTopic = new Map();
  const comicMaterialByKey = new Map();
  try {
    const r = await fetch('data/comics_df.json');
    if (r.ok) {
      const d = await r.json();
      for (const [k, v] of Object.entries((d && d.comics) || {})) if (v && v.image) comicByTopic.set(k, v);
      for (const [k, v] of Object.entries((d && d.materials) || {})) if (v && v.image) comicMaterialByKey.set(k, v);
    }
  } catch (e) {}
  document.getElementById('loading').remove();

  const topics = topicsData.topics;
  const deps = depsData.dependencies;
  const topicById = new Map(topics.map(t => [t.id, t]));
  const stdByKey = new Map();
  for (const c of standardsData.curricula) for (const s of c.standards) stdByKey.set(s.key, s);
  const clusterByKey = new Map(clustersData.clusters.map(c => [c.subject + '|' + c.domain, c]));

  // ---------- 题库与学习资源 ----------
  const quizByTopic = new Map();
  for (const q of quizData.questions) {
    if (!quizByTopic.has(q.topicId)) quizByTopic.set(q.topicId, []);
    quizByTopic.get(q.topicId).push(q);
  }
  const resByTopic = new Map(resourcesData.resources.map(r => [r.topicId, r.items]));
  const quizSubjects = new Set();
  for (const id of quizByTopic.keys()) {
    const t = topicById.get(id);
    if (t) quizSubjects.add(t.subject);
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // ---------- 布局：每学科一座螺旋塔（y=年级，黄金角盘旋上升，半径随高度收窄成塔） ----------
  const SUBJECT_ORDER = ['道德与法治','语文','数学','英语','科学','物理','化学','生物','历史','地理','思想政治','信息科技','体育与健康','艺术','劳动'];
  const COLORS = {
    '道德与法治':'#e0564b','语文':'#e8913a','数学':'#3a8ee8','英语':'#9a6ae8','科学':'#4cc38a',
    '物理':'#38b6d9','化学':'#d94f9e','生物':'#7bc043','历史':'#c98a4b','地理':'#4aa06a',
    '思想政治':'#d94f4f','信息科技':'#5a6ee0','体育与健康':'#e0c23a','艺术':'#e06ab0','劳动':'#8a8f6a'
  };
  const ROW_H = 78, GRADE_BASE = 0;
  const GOLDEN = Math.PI * (3 - Math.sqrt(5));   // 黄金角 ≈ 137.508°，螺旋不重叠
  const TOWER_R = 150;                            // 塔底半径（世界单位）
  const COL_W = 420;                              // 塔间距（桌面多塔并排）
  const subjects = SUBJECT_ORDER.filter(s => topics.some(t => t.subject === s));
  const subjX = new Map(subjects.map((s, i) => [s, i * COL_W + COL_W / 2]));

  const bySubjLayout = new Map();
  for (const t of topics) {
    if (!bySubjLayout.has(t.subject)) bySubjLayout.set(t.subject, []);
    bySubjLayout.get(t.subject).push(t);
  }
  for (const [subj, list] of bySubjLayout) {
    list.sort((a, b) => {
      const ga = (a.gradeRangeStart + a.gradeRangeEnd) / 2, gb = (b.gradeRangeStart + b.gradeRangeEnd) / 2;
      return ga - gb || a.domain.localeCompare(b.domain, 'zh') || a.name.localeCompare(b.name, 'zh');
    });
    const cx = subjX.get(subj);
    const phase = ((hashStr(subj) % 100) / 100) * Math.PI * 2;
    list.forEach((t, i) => {
      const gMid = (t.gradeRangeStart + t.gradeRangeEnd) / 2;
      const rand01 = (hashStr(t.id) % 1000) / 1000;
      const th = i * GOLDEN + phase;                          // 黄金角递增 → 螺旋
      const taper = 1 - 0.30 * ((gMid - 1) / 11);             // 塔形：年级越高越收窄
      const r = TOWER_R * taper * (0.82 + 0.36 * rand01);     // 少量错落，不死板
      t._cx = cx;                                             // 塔心 x（自转轴）
      t._lx = r * Math.cos(th);                               // 相对塔心的局部坐标
      t._lz = r * Math.sin(th);
      t._wy = GRADE_BASE + gMid * ROW_H + (rand01 - 0.5) * 16;
      t._color = COLORS[t.subject] || '#999';
      t._gMid = gMid;
    });
  }

  // ---------- 依赖图 ----------
  const prereqsOf = new Map();
  const unlocksOf = new Map();
  for (const d of deps) {
    if (!topicById.has(d.topicId) || !topicById.has(d.prerequisiteId)) continue;
    if (!prereqsOf.has(d.topicId)) prereqsOf.set(d.topicId, []);
    prereqsOf.get(d.topicId).push({ id: d.prerequisiteId, strength: d.strength, reason: d.reason });
    if (!unlocksOf.has(d.prerequisiteId)) unlocksOf.set(d.prerequisiteId, []);
    unlocksOf.get(d.prerequisiteId).push({ id: d.topicId, strength: d.strength, reason: d.reason });
  }
  // 传递闭包（BFS）
  function collectChain(startId, map) {
    const seen = new Map();
    const stack = [startId];
    while (stack.length) {
      const cur = stack.pop();
      for (const e of (map.get(cur) || [])) {
        if (!seen.has(e.id) && e.id !== startId) {
          seen.set(e.id, { ...e, from: cur });
          stack.push(e.id);
        }
      }
    }
    return seen;
  }

  // ---------- 节点半径 = 连接度 ----------
  (function sizeByDegree() {
    const deg = new Map();
    for (const d of deps) {

    for (const t of topics) {
      const dg = deg.get(t.id) || 0;

  })();

  // ---------- 掌握度（0-1 连续值 + 错因归因；旧两态数据自动迁移） ----------
  const MASTERY_KEY = 'cnk12_mastery';
  const MASTERY_META_KEY = 'cnk12_mastery_meta';
  const PROFILE_KEY = 'cnk12_profile';
  const ERR_CN = { concept: '概念性', transfer: '迁移性', careless: '粗心' };
  let mastery = {};
  try { mastery = JSON.parse(localStorage.getItem(MASTERY_KEY) || '{}') || {}; } catch (e) { mastery = {}; }
  // 旧版两态迁移：yes → 0.8，no → 0.1
  let migrated = false;
  for (const k of Object.keys(mastery)) {
    if (mastery[k] === 'yes') { mastery[k] = 0.8; migrated = true; }
    else if (mastery[k] === 'no') { mastery[k] = 0.1; migrated = true; }
  }
  let masteryMeta = {};   // { id: { ts, err, wrongs } }
  try { masteryMeta = JSON.parse(localStorage.getItem(MASTERY_META_KEY) || '{}') || {}; } catch (e) { masteryMeta = {}; }
  // 每日掌握度快照（成长页周曲线数据源；saveMastery 时顺带记录，同日覆盖）——必须在首次 saveMastery 调用前初始化
  const SNAPSHOT_KEY = 'cnk12_mastery_daily';
  let masterySnaps = {};
  try { masterySnaps = JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || '{}') || {}; } catch (e) { masterySnaps = {}; }
  function recordSnapshot() {
    let sum = 0, n = 0;
    for (const id of Object.keys(mastery)) {
      const v = mv(id);
      if (v !== null && topicById.has(id)) { sum += v; n++; }
    }
    if (!n) return;
    masterySnaps[todayStr()] = Math.round(sum / n * 100);
    try { localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(masterySnaps)); } catch (e) {}
  }
  let profile = null;
  try { profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null'); } catch (e) { profile = null; }
  function saveMastery() { try { localStorage.setItem(MASTERY_KEY, JSON.stringify(mastery)); } catch (e) {} recordSnapshot(); }
  function saveMasteryMeta() { try { localStorage.setItem(MASTERY_META_KEY, JSON.stringify(masteryMeta)); } catch (e) {} }
  if (migrated) saveMastery();
  function saveProfile() { try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch (e) {} }
  function mv(id) { const v = mastery[id]; return (typeof v === 'number' && isFinite(v)) ? v : null; }
  // 三档显示：≥0.67 已掌握 / 0.34-0.66 在进步 / <0.34 还不会
  function mState(id) { const v = mv(id); return v === null ? null : v >= 0.67 ? 'yes' : v >= 0.34 ? 'mid' : 'no'; }
  // 答题驱动：答对 +0.34 封顶 1，答错 -0.5 封底 0
  function applyAnswer(id, correct, err) {
    if (id == null || !topicById.has(id)) return;
    const prevState = mState(id);   // v40：点亮脉冲要前后对照
    const cur = mv(id);
    const v = cur === null ? (correct ? 0.34 : 0)
      : correct ? Math.min(1, cur + 0.34) : Math.max(0, cur - 0.5);
    mastery[id] = Math.round(v * 100) / 100;
    const meta = masteryMeta[id] || {};
    meta.ts = Date.now();
    if (!correct) { meta.err = err || meta.err || 'transfer'; meta.wrongs = (meta.wrongs || 0) + 1; }
    masteryMeta[id] = meta;
    saveMastery(); saveMasteryMeta();
    noteLit(id, prevState);
    updateStats();
    requestDraw();
  }
  function setErr(id, err) {
    if (!ERR_CN[err]) return;
    const meta = masteryMeta[id] || {};
    meta.err = err;
    masteryMeta[id] = meta;
    saveMasteryMeta();
  }
  function touchMeta(id) {
    const meta = masteryMeta[id] || {};
    meta.ts = Date.now();
    masteryMeta[id] = meta;
    saveMasteryMeta();
  }
  // 手动标记：'yes' → 0.8，'no' → 0.1；再点一次同档取消
  function setMastery(id, state) {
    if (id == null || !topicById.has(id)) return;
    const prevState = mState(id);
    if (state && mState(id) === state) delete mastery[id];
    else if (state) { mastery[id] = state === 'yes' ? 0.8 : 0.1; touchMeta(id); }
    else delete mastery[id];
    saveMastery();
    noteLit(id, prevState);
    updateStats();
    requestDraw();
  }
  function updateStats() {
    let yes = 0, no = 0, total = 0;
    for (const t of topics) {
      if (!visible(t)) continue;

  }

  // ================= v40 体验三件套：彩带 / 数值滚动 / streak / 节点点亮 =================
  const REDUCED_MOTION = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  // ① 打卡彩带：1.5s canvas 彩带，fixed 覆盖层 pointer-events:none，不挡操作
  const fxCanvas = document.getElementById('fx-confetti');
  function confetti() {
    if (REDUCED_MOTION || !fxCanvas) return;
    const d = window.devicePixelRatio || 1;
    fxCanvas.width = innerWidth * d; fxCanvas.height = innerHeight * d;
    fxCanvas.style.display = 'block';
    const fx = fxCanvas.getContext('2d');
    fx.setTransform(d, 0, 0, d, 0, 0);
    const colors = ['#16C7B7', '#F5C542', '#0E9C8F', '#4CE3D5', '#FFD98A', '#8BE3A8'];
    const parts = [];
    const cx = innerWidth / 2, cy = innerHeight * 0.42;
    for (let i = 0; i < 90; i++) {
      const a = Math.random() * Math.PI * 2, sp = 3 + Math.random() * 6.5;
      parts.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3.5,
        w: 4 + Math.random() * 5, h: 3 + Math.random() * 4, r: Math.random() * Math.PI,
        vr: (Math.random() - .5) * .3, c: colors[i % colors.length] });
    }
    const t0 = performance.now();
    (function frame(now) {
      const el = now - t0;
      if (el > 1500) { fxCanvas.style.display = 'none'; return; }
      fx.clearRect(0, 0, innerWidth, innerHeight);
      const fade = el > 1100 ? 1 - (el - 1100) / 400 : 1;
      for (const p of parts) {
        p.x += p.vx; p.y += p.vy; p.vy += 0.16; p.vx *= 0.99; p.r += p.vr;
        fx.save(); fx.translate(p.x, p.y); fx.rotate(p.r);
        fx.globalAlpha = fade; fx.fillStyle = p.c;

    })(t0);
  }
  // ② 掌握度数值滚动（旧值 → 新值，0.8s easeOutCubic）
  function rollNumber(el, fromPct, toPct) {
    if (!el) return;
    if (REDUCED_MOTION || Math.round(fromPct) === Math.round(toPct)) { el.textContent = Math.round(toPct); return; }
    const t0 = performance.now(), dur = 800;
    (function frame(now) {
      const p = Math.min(1, (now - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(fromPct + (toPct - fromPct) * e);
      if (p < 1) requestAnimationFrame(frame);
    })(t0);
  }
  // ③ streak：基于 localStorage 打卡日期计算连续天数
  const CHECKIN_DAYS_KEY = 'cnk12_checkin_days';
  let checkinDays = {};
  try { checkinDays = JSON.parse(localStorage.getItem(CHECKIN_DAYS_KEY) || '{}') || {}; } catch (e) { checkinDays = {}; }
  function markCheckinDay() {
    checkinDays[todayStr()] = Date.now();
    try { localStorage.setItem(CHECKIN_DAYS_KEY, JSON.stringify(checkinDays)); } catch (e) {}
  }
  function streakInfo() {
    const hadHistory = Object.keys(checkinDays).length > 0;
    const checkedToday = !!checkinDays[todayStr()];
    let count = 0;
    const cur = new Date();
    if (!checkedToday) cur.setDate(cur.getDate() - 1);   // 今天没打卡就从昨天往回数
    while (checkinDays[cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0') + '-' + String(cur.getDate()).padStart(2, '0')]) {
      count++;
      cur.setDate(cur.getDate() - 1);

    return { count, checkedToday, broken: hadHistory && !checkedToday && count === 0, hadHistory };
  }
  function streakHtml() {
    const s = streakInfo();
    if (s.broken) return `<div class="td-streak broken">💧 昨天断了，今天重新开始</div>`;
    if (!s.hadHistory) return `<div class="td-streak fresh">✨ 今天完成任意打卡，点亮第 1 天</div>`;
    if (s.checkedToday) return `<div class="td-streak">🔥 今天是连续打卡第 ${s.count} 天</div>`;

  }
  function helloHtml() {

  }
  // ④ 图谱节点完成时点亮脉冲一次（记录时间戳，draw 循环里画扩散环）
  const litPulse = new Map();   // id → t0
  function noteLit(id, prevState) {

  }
  // ⑥ 新客全屏流程：隐藏 tab 栏与 header，?from=video 直达（短视频引流）
  const FROM_VIDEO = new URLSearchParams(location.search).get('from') === 'video';
  function enterGuestMode() { document.body.classList.add('guest'); }
  function exitGuestMode() { document.body.classList.remove('guest'); }
  function isGuest() { return document.body.classList.contains('guest'); }
  const guestCtx = { grade: 7, subject: '语文', wrongIds: [], fixedId: null };

  // ---------- Tab 管理（v50：今日 / 成长 / 我的 三 tab；图谱改为全屏覆盖层，非 tab） ----------
  const TAB_NAMES = { today: '今日', growth: '成长', me: '我的' };
  let currentTab = null;
  let mapVisible = false;
  let mapReturnTab = 'growth';   // 图谱覆盖层返回去向
  function switchTab(name) {
    if (name === 'map') { openMap(); return; }   // 旧调用点全部兼容：图谱 = 全屏打开
    if (!TAB_NAMES[name]) return;

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  }
  function openMap() {

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  }
  function closeMap() { switchTab(mapReturnTab && TAB_NAMES[mapReturnTab] ? mapReturnTab : 'growth'); }
  document.getElementById('map-back').onclick = closeMap;
  document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => switchTab(b.dataset.tab));

  // ---------- Canvas（Marble 美学：深空底 + 慢速自转 + 生长入场） ----------
  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('map');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  let W = 0, H = 0, dpr = 1;
  let scale = 0.8, tx = 0, ty = 0;
  let rotAngle = 0;                    // 自转角度（弧度，绕屏幕中心）
  const ROT_SPEED = 0.006;             // rad/s，约 17 分钟一圈
  let hoverPause = false, touchPause = false;

  // 世界 → 屏幕：螺旋塔绕自身 Y 轴（高度轴）自转 + 透视投影，再仿射到屏幕
  const FOCAL = 760;                           // 透视焦距（世界单位），越小纵深越强
  function curRot() { return isMobile() ? 0 : rotAngle; }   // 移动端不自转（规则保留）
  function projectPoint(x, y, z) {             // 全局世界点（绕原点转，用于年级线/塔心）
    const a = curRot();
    const c = Math.cos(a), s = Math.sin(a);
    const xr = x * c + z * s;
    const zr = -x * s + z * c;                 // zr > 0 = 远离相机
    const persp = FOCAL / (FOCAL + zr);
    return [xr * persp, y * persp, persp, zr];
  }
  function projectTopic(t) {                   // 节点绕自己塔心转
    const a = curRot();
    const c = Math.cos(a), s = Math.sin(a);
    const xr = t._cx + (t._lx * c + t._lz * s);
    const zr = -t._lx * s + t._lz * c;
    const persp = FOCAL / (FOCAL + zr);
    return [xr * persp, t._wy * persp, persp, zr];
  }
  function worldToScreen(px, py) {             // 投影后的 2D 世界坐标 → 屏幕
    return [px * scale + tx, H - (py * scale + ty)];
  }
  function screenToWorld(sx, sy) {
    return [(sx - tx) / scale, (H - sy - ty) / scale];
  }
  function topicScreen(t) {                    // 节点屏幕坐标 + 透视系数（缓存供绘制/命中）
    const [px, py, persp, zr] = projectTopic(t);
    const [sx, sy] = worldToScreen(px, py);
    t._sx = sx; t._sy = sy; t._psr = persp; t._zr = zr;
    return [sx, sy];
  }

  function hexA(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }
  function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return Math.abs(h); }

  // ---- 离屏背景：暖白 #FAF7F2 + 极淡径向光晕（青绿 3% + 麦黄 3%）+ 极浅灰点（resize 时重渲染一次） ----
  const bgCanvas = document.createElement('canvas');
  function renderBackground() {
    bgCanvas.width = Math.max(1, Math.round(W * dpr));
    bgCanvas.height = Math.max(1, Math.round(H * dpr));
    const b = bgCanvas.getContext('2d');
    b.setTransform(dpr, 0, 0, dpr, 0, 0);
    b.fillStyle = '#FAF7F2';
    b.fillRect(0, 0, W, H);

      g.addColorStop(0, color); g.addColorStop(1, 'rgba(250,247,242,0)');
      b.fillStyle = g; b.fillRect(0, 0, W, H);
    };
    glow(W * 0.82, H * 0.10, Math.max(W, H) * 0.52, 'rgba(245,197,66,.03)');   // 麦黄 3%
    glow(W * 0.14, H * 0.30, Math.max(W, H) * 0.56, 'rgba(22,199,183,.03)');   // 青绿 3%
    glow(W * 0.55, H * 0.88, Math.max(W, H) * 0.48, 'rgba(22,199,183,.02)');
    // 极浅灰点（代替星点，几乎不可见，只给底面一点织感）
    let seed = 20240612;
    const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
    for (let i = 0; i < 150; i++) {
      const x = rnd() * W, y = rnd() * H, r = 0.4 + rnd() * 0.9, a = 0.025 + rnd() * 0.035;

  }

  // ---- 节点精灵（v51 浅底）：掌握态实心圆——已掌握=青绿+微光晕 / 在进步=麦黄 / 薄弱=红橙；未测不用精灵（空心描边，绘制时画） ----
  const SPR_SIZE = 128, SPR_CORE = 24, SPR_K = SPR_SIZE / (SPR_CORE * 2);
  function makeSolidSprite(color, glow) {
    const c = document.createElement('canvas');
    c.width = c.height = SPR_SIZE;
    const g2 = c.getContext('2d');
    const g = g2.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0, color);
    g.addColorStop(SPR_CORE / 64, color);                 // 实心色盘到核边缘，保持锐利

    g.addColorStop(0.60, hexA(color, 0.05));
    g.addColorStop(0.74, hexA(color, 0));
    g.addColorStop(1, hexA(color, 0));

    return c;
  }
  const spriteYes = makeSolidSprite('#16C7B7', 0.40);   // 已掌握：青绿实心 + 微光晕
  const spriteMid = makeSolidSprite('#F5C542', 0.22);   // 在进步：麦黄实心
  const spriteNo = makeSolidSprite('#EC5A32', 0.22);    // 薄弱：红橙实心

  // ---------- 渲染循环 ----------
  let rafId = null;
  let lastTick = 0;
  let enterT0 = -1, enterDone = false;
  let inertia = null;
  function rotActive() { return mapVisible && !isMobile() && !hoverPause && !touchPause && !focusTween && !inertia && selectedId == null; }
  function animActive() {
    return mapVisible && (!enterDone || !!inertia || !!focusTween || selectedId != null
      || highlightEdges.size > 0 || litPulse.size > 0 || rotActive());
  }
  function requestDraw() {

  }
  function tick(now) {
    rafId = null;
    window.__cnkFrames = (window.__cnkFrames || 0) + 1;
    const dt = lastTick ? Math.min(64, now - lastTick) : 16;
    lastTick = now;
    stepInertia(now);
    stepTween(now);
    if (rotActive()) rotAngle += ROT_SPEED * dt / 1000;

    if (animActive()) requestDraw();
    else lastTick = 0;
  }
  function stepInertia(now) {
    if (!inertia) return;

  // 点选节点 → 相机聚焦补间（按投影后的 2D 世界坐标）
  function startFocus(t) {
    if (!t) return;
    const [px, py] = projectTopic(t);
    const targetScale = Math.min(2.4, Math.max(1.15, scale));
    const syTarget = isMobile() ? H * 0.32 : H / 2;
    focusTween = {
      t0: performance.now(), dur: 620,
      from: { tx, ty, scale },

    };

  }

  let lastFitW = 0;
  function resize() {
    if (!mapVisible && !mapInited) return;

    if (!W || !H) return;

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    renderBackground();
    applySheetState();
    // 移动端：视口宽度变化（横竖屏切换）时重新 fit 当前学科，平移缩放不被 tab 切换重置
    if (isMobile() && mobileSubject && Math.abs(W - lastFitW) > 50) {

  }
  window.addEventListener('resize', () => { if (mapVisible) resize(); });

  function projectedBounds(list) {   // 投影后 2D 世界坐标的包围盒
    let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
    for (const t of list) {
      const [px, py] = projectTopic(t);
      if (px < minX) minX = px;
      if (px > maxX) maxX = px;
      if (py < minY) minY = py;

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%2316C7B7'/></svg>">
<title>小满伴学</title>
<style>
  :root {
    --bg: #07111F;
    --panel: #0B1220;
    --panel-2: #101a2c;
    --panel-border: #262c3b;
    --text: #F6F8FB;
    --text-dim: #667085;
    --accent: #16C7B7;
    --green: #3fae6a;
    --green-bright: #57d189;
    --bad: #ff6a3d;
    --tabbar-h: 58px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }
  header { padding: 10px 16px 8px; border-bottom: 1px solid var(--panel-border); background: var(--panel); flex: 0 0 auto; }
  header h1 { font-size: 17px; font-weight: 700; }
  header h1 .dot { color: var(--accent); }
  header .sub { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  @media (max-width: 767px) {
    header { padding: 8px 12px 6px; }
    header h1 { font-size: 15px; }
    header .sub { font-size: 10.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  }

  /* ---------- 视图容器 ---------- */
  #views { flex: 1; min-height: 0; position: relative; }
  .view { position: absolute; inset: 0; display: none; }
  .view.active { display: block; }
  #view-map.active { display: flex; flex-direction: column; }
  .scroll-view { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 28px; }
  .scroll-inner { max-width: 680px; margin: 0 auto; }

  /* ---------- 底部四 tab ---------- */
  #tabbar { flex: 0 0 auto; display: flex; border-top: 1px solid var(--panel-border);
    background: rgba(14,17,26,0.98); padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 30; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; min-height: var(--tabbar-h); background: none; border: none; color: var(--text-dim);
    font-size: 11px; cursor: pointer; position: relative; }
  .tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7;
    stroke-linecap: round; stroke-linejoin: round; }
  .tab-btn.active { color: var(--accent); }
  .tab-badge { position: absolute; top: 6px; left: calc(50% + 8px); min-width: 17px; height: 17px;
    border-radius: 999px; background: var(--bad); color: #fff; font-size: 10.5px; font-weight: 700;
    display: none; align-items: center; justify-content: center; padding: 0 4px; }
  .tab-badge.show { display: inline-flex; }

  /* ---------- 图谱视图 ---------- */
  #map-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 8px 12px;
    border-bottom: 1px solid var(--panel-border); background: var(--panel); flex: 0 0 auto; }
  #search { flex: 0 1 240px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--panel-border);
    background: #0d1017; color: var(--text); font-size: 13px; outline: none; min-height: 32px; }
  #search:focus { border-color: var(--accent); }
  #chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 4px 10px; border-radius: 999px; border: 1px solid var(--panel-border); background: #0d1017;
    color: var(--text-dim); font-size: 12px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 5px;
    white-space: nowrap; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; }
  .chip.on { color: var(--text); border-color: var(--chip-color, var(--accent)); background: #1a2230; }
  .chip.off { opacity: 0.45; }
  .tbtn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--panel-border); background: #1a2230;
    color: var(--text); font-size: 12.5px; cursor: pointer; min-height: 32px; white-space: nowrap; }
  .tbtn:hover { border-color: var(--accent); }
  #mastery-stats { font-size: 12px; color: var(--text-dim); padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--panel-border); background: #0d1017; white-space: nowrap; }
  #mastery-stats b { font-weight: 700; }
  #mastery-stats .s-yes { color: var(--green-bright); }
  #mastery-stats .s-no { color: var(--bad); }
  @media (max-width: 767px) {
    body[data-tab="map"] header { display: none; }   /* 图谱 tab 收起标题行，把高度让给 canvas */
    #chips { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; flex: 1 1 100%; max-width: 100%; padding-bottom: 2px;
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 26px), transparent 100%);
      mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 26px), transparent 100%); }
    #map-toolbar { gap: 5px; padding: 5px 8px; }
    #map-toolbar .tbtn { min-height: 30px; padding: 5px 9px; font-size: 12px; }
    #search { min-height: 30px; flex: 1 1 120px; font-size: 12px; }
    #mastery-stats { display: none; }
    #legend { padding: 5px 9px; }
    #legend .lg-body { display: none; }
    #legend.open .lg-body { display: block; margin-top: 6px; }
    #legend-toggle { display: inline; }
  }
  #map-main { flex: 1; display: flex; min-height: 0; position: relative; }
  #canvas-wrap { flex: 1; position: relative; min-width: 0; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
  canvas.dragging { cursor: grabbing; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(18,22,32,0.95); border: 1px solid var(--panel-border);
    border-radius: 6px; padding: 5px 9px; font-size: 12px; max-width: 280px; display: none; z-index: 10; }
  #tooltip .tt-name { font-weight: 600; }
  #tooltip .tt-meta { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
  #legend { position: absolute; left: 12px; bottom: 12px; font-size: 11px; color: var(--text-dim);
    background: rgba(14,17,26,0.85); padding: 8px 10px; border-radius: 8px; border: 1px solid var(--panel-border); line-height: 1.8;
    max-width: calc(100% - 24px); z-index: 8; }
  #legend .lg-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; vertical-align: -1px; }
  #legend-toggle { display: none; background: none; border: none; color: var(--accent); font-size: 11px;
    cursor: pointer; padding: 0; font-family: inherit; }
  #search-results { position: absolute; top: 6px; left: 12px; z-index: 20; background: var(--panel);
    border: 1px solid var(--panel-border); border-radius: 8px; max-height: 260px; overflow-y: auto; display: none; min-width: 280px; }
  .sr-item { padding: 7px 12px; font-size: 12.5px; cursor: pointer; border-bottom: 1px solid #1e222b; }
  .sr-item:hover { background: #1a2230; }
  .sr-item .m { color: var(--text-dim); font-size: 11px; }
  #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 14px; z-index: 30; background: var(--bg); }

  /* ---------- 图谱详情面板（桌面右侧 / 移动底部抽屉） ---------- */
  #panel { width: var(--pw, 420px); flex: 0 0 var(--pw, 420px); border-left: 1px solid var(--panel-border); background: var(--panel);
    overflow-y: auto; padding: 16px; transition: margin-right .2s; -webkit-overflow-scrolling: touch; }
  #panel.hidden { margin-right: calc(-1 * var(--pw, 420px)); }
  #panel-resizer { display: none; width: 8px; flex: 0 0 8px; cursor: col-resize; background: transparent;
    border-left: 1px solid transparent; touch-action: none; }
  #panel-resizer:hover, #panel-resizer.active { background: rgba(22,199,183,0.18); border-left-color: var(--accent); }
  @media (min-width: 861px) { #panel-resizer { display: block; } }
  @media (max-width: 860px) {
    #panel { position: absolute; right: 0; top: 0; bottom: 0; z-index: 15; box-shadow: -8px 0 24px rgba(0,0,0,0.55);
      max-width: 94vw; }
  }
  #panel-handle { display: none; }
  /* 移动端抽屉遮罩：固定全屏半透明，点击关闭抽屉 */
  #drawer-mask { display: none; }
  @media (max-width: 767px) {
    #drawer-mask { display: block; position: fixed; inset: 0; z-index: 38;
      background: rgba(4, 6, 12, 0.55); backdrop-filter: blur(1.5px); -webkit-backdrop-filter: blur(1.5px);
      opacity: 0; pointer-events: none; transition: opacity .2s ease; }
    #drawer-mask.show { opacity: 1; pointer-events: auto; }
    #panel { position: fixed; left: 0; right: 0; top: auto; bottom: 0; width: auto; flex: none; max-width: none;
      height: 55vh; height: 55dvh; z-index: 40; border-left: none; border-top: 1px solid var(--panel-border);
      border-radius: 16px 16px 0 0; box-shadow: 0 -10px 32px rgba(0,0,0,0.65);
      padding: 0 calc(16px + env(safe-area-inset-right, 0px)) calc(16px + env(safe-area-inset-bottom, 0px)) calc(16px + env(safe-area-inset-left, 0px));
      transform: translateY(105%); transition: transform .2s ease;
      display: flex; flex-direction: column; overflow: hidden; }
    #panel.hidden { margin-right: 0; }
    #panel.sheet-open { transform: translateY(0); }
    #panel.dragging { transition: none; }
    #panel-body { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    #panel-handle { display: flex; align-items: center; justify-content: center; height: 34px; flex: 0 0 34px;
      cursor: grab; touch-action: none; margin: 0 -16px; }
    #panel-handle .grip { width: 44px; height: 5px; border-radius: 3px; background: #3a4150; }
  }
  #panel h2 { font-size: 16px; line-height: 1.4; margin-bottom: 6px; }
  #panel h3 { font-size: 13px; color: var(--text-dim); margin: 14px 0 6px; border-top: 1px solid var(--panel-border); padding-top: 12px; }
  #panel .desc { font-size: 13px; line-height: 1.7; color: var(--text); margin: 10px 0; }
  #panel ul { padding-left: 18px; font-size: 12.5px; line-height: 1.8; }
  .badges { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--panel-border); color: var(--text-dim); }
  .badge.skeleton { color: #e0b34a; border-color: #6b5420; }
  .badge.type { color: #5FDCD0; border-color: #1F5B54; }
  .badge.grade { color: #9fe6a0; border-color: #2f6b31; }
  .badge.m-yes { color: var(--green-bright); border-color: #2f6b31; }
  .badge.m-mid { color: #e0b34a; border-color: #6b5420; }
  .badge.m-no { color: var(--bad); border-color: #7c3a28; }
  #panel-close { float: right; background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer;
    min-width: 44px; min-height: 44px; margin: -8px -10px 0 0; }
  #empty-hint { color: var(--text-dim); font-size: 13px; line-height: 2; }
  /* 追溯统计条 */
  .trace-stats { display: flex; gap: 8px; margin: 10px 0; }
  .trace-stat { flex: 1; background: #0d1017; border: 1px solid var(--panel-border); border-radius: 10px;
    padding: 8px 6px; text-align: center; }
  .trace-stat .n { font-size: 18px; font-weight: 800; color: var(--accent); }
  .trace-stat .l { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }
  /* coaching ask 卡 */
  .ask-card { background: #101d2e; border: 1px solid #1e3a52; border-radius: 10px; padding: 12px; margin-top: 10px; }
  .ask-card .ask-tag { font-size: 11px; color: #5FDCD0; font-weight: 700; margin-bottom: 5px; }
  .ask-card .ask-q { font-size: 13.5px; line-height: 1.7; font-weight: 600; }
  .ask-card .ask-pattern { font-size: 12px; color: var(--text-dim); line-height: 1.7; margin-top: 8px;
    border-top: 1px dashed #1e3a52; padding-top: 8px; }
  .ask-card .ask-sec { font-size: 11px; color: #5FDCD0; font-weight: 700; margin: 12px 0 6px;
    border-top: 1px dashed #1e3a52; padding-top: 10px; }
  .var-item { background: #0b1523; border: 1px solid #16304a; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
  .var-item .v-t { font-size: 12.5px; line-height: 1.7; font-weight: 600; }
  .var-item .v-e { font-size: 11.5px; color: var(--text-dim); line-height: 1.7; margin-top: 4px; }
  .drill-item { background: #0b1523; border: 1px solid #16304a; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
  .drill-item .d-q { font-size: 12.5px; line-height: 1.7; font-weight: 600; }
  .drill-item .d-hint { font-size: 11.5px; color: #9fc7ea; line-height: 1.7; margin-top: 5px; }
  .drill-item .d-hint b { color: #5FDCD0; }
  .drill-ans-btn { margin-top: 6px; min-height: 32px; padding: 4px 12px; border-radius: 6px;
    border: 1px dashed #1F5B54; background: none; color: #5FDCD0; font-size: 11.5px; cursor: pointer; }
  .drill-ans { display: none; font-size: 12px; line-height: 1.7; margin-top: 6px;
    border-top: 1px dashed #16304a; padding-top: 6px; color: var(--text-dim); }
  .drill-ans b { color: var(--green-bright); }
  .drill-item.open .drill-ans { display: block; }
  /* 补给包 */
  .pack-card { background: #101d2e; border: 1px solid #1e3a52; border-radius: 10px; padding: 12px; margin-top: 4px; }
  .pack-guide { background: #0b1523; border: 1px solid #16304a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .pg-tag { font-size: 11px; color: #e0b34a; font-weight: 700; margin-bottom: 4px; }
  .pg-sec { font-size: 12.5px; line-height: 1.7; margin-top: 8px; }
  .pg-sec:first-of-type { margin-top: 2px; }
  .pg-sec b { color: #9fc7ea; display: block; margin-bottom: 2px; }
  .pack-src { font-size: 11px; color: var(--text-dim); margin-top: 10px; border-top: 1px dashed #1e3a52; padding-top: 8px; }
  .pack-output { background: #0b1523; border: 1px solid #2f6b31; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .po-text { font-size: 12.5px; line-height: 1.7; font-weight: 600; }
  .po-done { width: 100%; min-height: 40px; margin-top: 8px; border-color: var(--green-bright); color: var(--green-bright); }
  .po-done.done { background: #12291a; }
  /* 回忆卡翻面 */
  .flip-card { perspective: 800px; cursor: pointer; margin-bottom: 6px; }
  .flip-inner { position: relative; transform-style: preserve-3d; transition: transform .45s; }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-face { backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: #0b1523; border: 1px solid #16304a; border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; min-height: 110px; }
  .flip-front { position: relative; }
  .flip-back { position: absolute; inset: 0; transform: rotateY(180deg); border-color: #2f6b31; overflow: auto; }
  .ff-tag { font-size: 11px; font-weight: 700; color: #5FDCD0; margin-bottom: 6px; }
  .flip-back .ff-tag { color: var(--green-bright); }
  .ff-text { font-size: 13px; line-height: 1.7; flex: 1; }
  .ff-hint { font-size: 11px; color: var(--text-dim); text-align: right; margin-top: 6px; }
  .chain-item { font-size: 12.5px; padding: 5px 8px; border-radius: 6px; margin-bottom: 4px; cursor: pointer;
    background: #0d1017; border: 1px solid var(--panel-border); line-height: 1.5; }
  .chain-item:hover { border-color: var(--accent); }
  .chain-item .r { color: var(--text-dim); font-size: 11px; display: block; }
  .chain-item.hard { border-left: 3px solid #e0645a; }
  .chain-item.soft { border-left: 3px solid #4a90d9; }
  #panel .placeholder-note { font-size: 12px; color: #e0b34a; background: #241e10; padding: 8px 10px;
    border-radius: 6px; margin-top: 10px; }
  /* 掌握度大按钮 */
  .mbtns { display: flex; gap: 10px; margin: 12px 0 4px; }
  .mbtn { flex: 1; min-height: 46px; border-radius: 10px; font-size: 14.5px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--panel-border); background: #0d1017; color: var(--text-dim); }
  .mbtn.m-no { border-color: #7c3a28; }
  .mbtn.m-no.active { background: #3a1d14; color: var(--bad); border-color: var(--bad); }
  .mbtn.m-yes { border-color: #2f6b31; }
  .mbtn.m-yes.active { background: #12291a; color: var(--green-bright); border-color: var(--green-bright); }
  .mbtn-hint { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  /* 家长检验卡 */
  .assess-card { background: #10202f; border: 1px solid #1e3a52; border-radius: 10px; padding: 12px; margin-top: 6px; }
  .assess-card .assess-q { font-size: 13px; line-height: 1.7; font-weight: 600; }
  .assess-card .assess-ev { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
  .assess-card .assess-ev ul { padding-left: 16px; line-height: 1.7; margin-top: 4px; }
  .assess-card .assess-btns { display: flex; gap: 10px; margin-top: 10px; }
  .assess-card .assess-btns button { flex: 1; min-height: 44px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--panel-border); background: #0d1017; color: var(--text); }
  .assess-card .assess-btns .ok { border-color: #2f6b31; color: var(--green-bright); }
  .assess-card .assess-btns .bad { border-color: #7c3a28; color: var(--bad); }
  .assess-fb { font-size: 12.5px; margin-top: 8px; min-height: 18px; }
  .assess-fb.ok { color: var(--green-bright); }
  .assess-fb.bad { color: var(--bad); }
  .assess-wrap { margin-top: 6px; }
  .assess-toggle { width: 100%; text-align: left; background: #10202f; border: 1px solid #1e3a52; border-radius: 10px;
    padding: 10px 12px; color: #5FDCD0; font-size: 13px; font-weight: 600; cursor: pointer; min-height: 44px; }
  .assess-wrap.open .assess-toggle { border-radius: 10px 10px 0 0; border-bottom: none; }
  .assess-wrap .assess-card { display: none; border-radius: 0 0 10px 10px; margin-top: 0; border-top: none; }
  .assess-wrap.open .assess-card { display: block; }
  /* 错因回溯 */
  .diag-list { padding-top: 8px; }
  .diag-row { background: #0d1017; border: 1px solid var(--panel-border); border-radius: 8px; padding: 9px 10px; margin-bottom: 8px; }
  .diag-row .dr-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .diag-row .dr-name { font-size: 13.5px; font-weight: 600; line-height: 1.4; }
  .diag-row .dr-grade { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .diag-row .dr-reason { font-size: 11.5px; color: var(--text-dim); line-height: 1.6; margin-top: 4px; }
  .diag-row .dr-btns { display: flex; gap: 8px; margin-top: 8px; }
  .diag-row .dr-btns button { flex: 1; min-height: 44px; border-radius: 8px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--panel-border); background: #12151c; color: var(--text-dim); }
  .diag-row .dr-btns .yes.active { background: #12291a; color: var(--green-bright); border-color: var(--green-bright); }
  .diag-row .dr-btns .no.active { background: #3a1d14; color: var(--bad); border-color: var(--bad); }
  .diag-conclusion { background: #1a1420; border: 1px solid #4a2f5c; border-radius: 10px; padding: 12px; margin-top: 12px;
    font-size: 13px; line-height: 1.7; position: sticky; bottom: 0; }
  .diag-conclusion b { color: #e0aaff; }
  .diag-conclusion .jump { margin-top: 8px; width: 100%; min-height: 44px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--accent); background: #0C2B28; color: var(--accent); }
  .diag-exit { width: 100%; min-height: 44px; border-radius: 8px; font-size: 13.5px; cursor: pointer;
    border: 1px solid var(--panel-border); background: #12151c; color: var(--text-dim); margin-top: 10px; }
  /* 下一步推荐 */
  .next-item { background: #0d1017; border: 1px solid var(--panel-border); border-radius: 8px; padding: 10px;
    margin-bottom: 8px; cursor: pointer; }
  .next-item:hover { border-color: var(--accent); }
  .next-item .ni-name { font-size: 13.5px; font-weight: 600; }
  .next-item .ni-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .next-item .ni-desc { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-top: 5px; }
  .next-guide { font-size: 13px; line-height: 2; color: var(--text-dim); background: #12151c;
    border: 1px dashed var(--panel-border); border-radius: 10px; padding: 16px; margin-top: 10px; text-align: center; }
  /* 学习资源 */
  .res-item { display: flex; gap: 10px; align-items: flex-start; background: #0d1017;
    border: 1px solid var(--panel-border); border-radius: 8px; padding: 9px 10px; margin-bottom: 8px; }
  .res-ico { flex: 0 0 26px; height: 26px; border-radius: 6px; display: flex; align-items: center;

<script>
(async function () {
  const [topicsData, depsData, standardsData, clustersData, quizData, resourcesData] = await Promise.all([
    fetch('data/topics.json').then(r => r.json()),
    fetch('data/dependencies.json').then(r => r.json()),
    fetch('data/curriculum-standards.json').then(r => r.json()),
    fetch('data/clusters.json').then(r => r.json()),
    fetch('data/quiz.json').then(r => r.json()),
    fetch('data/resources.json').then(r => r.json()),
  ]);
  // coaching 数据（R4 内容原子，另一管线产出）：文件不存在或结构不符时优雅降级为空
  let coaching = {};
  try {
    const r = await fetch('data/coaching.json');
    if (r.ok) {
      const c = await r.json();
      // key 可能在顶层，也可能嵌在 coaching 字段下
      const raw = c && typeof c === 'object' && !Array.isArray(c)
        ? (c.coaching && typeof c.coaching === 'object' && !Array.isArray(c.coaching) ? c.coaching : c)
        : {};
      for (const k of Object.keys(raw)) {
        const v = raw[k];
        if (v && typeof v === 'object' && !Array.isArray(v)) coaching[k] = v;
      }
    }
  } catch (e) { coaching = {}; }
  // 五件套课程包（R5）：视频课程/课件/教学设计/学习任务单/课后练习，按 topicId 关联；缺失时优雅降级
  const resPackByTopic = new Map();
  try {
    const r = await fetch('data/resources_pack.json');
    if (r.ok) {
      const d = await r.json();
      const packs = d && (d.packs || d.resources);
      if (Array.isArray(packs)) {
        for (const p of packs) {
          if (p && p.topicId && Array.isArray(p.items)) resPackByTopic.set(p.topicId, p.items);
        }
      }
    }
  } catch (e) {}
  // 补给包（R6：导学卡/变式训练/回忆卡/产出任务）：packs_yw + packs_df 两文件合并；缺失时优雅降级为空
  const packByTopic = new Map();
  for (const url of ['data/packs_yw.json', 'data/packs_df.json']) {
    try {
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        const packs = d && d.packs;
        if (packs && typeof packs === 'object' && !Array.isArray(packs)) {
          for (const k of Object.keys(packs)) {
            const v = packs[k];
            if (v && typeof v === 'object' && !Array.isArray(v)) packByTopic.set(k, v);
          }
        }
      }
    } catch (e) {}
  }
  document.getElementById('loading').remove();

  const topics = topicsData.topics;
  const deps = depsData.dependencies;
  const topicById = new Map(topics.map(t => [t.id, t]));
  const stdByKey = new Map();
  for (const c of standardsData.curricula) for (const s of c.standards) stdByKey.set(s.key, s);
  const clusterByKey = new Map(clustersData.clusters.map(c => [c.subject + '|' + c.domain, c]));

  // ---------- 题库与学习资源 ----------
  const quizByTopic = new Map();
  for (const q of quizData.questions) {
    if (!quizByTopic.has(q.topicId)) quizByTopic.set(q.topicId, []);
    quizByTopic.get(q.topicId).push(q);
  }
  const resByTopic = new Map(resourcesData.resources.map(r => [r.topicId, r.items]));
  const quizSubjects = new Set();
  for (const id of quizByTopic.keys()) {
    const t = topicById.get(id);
    if (t) quizSubjects.add(t.subject);
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // ---------- 布局：每学科一座螺旋塔（y=年级，黄金角盘旋上升，半径随高度收窄成塔） ----------
  const SUBJECT_ORDER = ['道德与法治','语文','数学','英语','科学','物理','化学','生物','历史','地理','思想政治','信息科技','体育与健康','艺术','劳动'];
  const COLORS = {
    '道德与法治':'#e0564b','语文':'#e8913a','数学':'#3a8ee8','英语':'#9a6ae8','科学':'#4cc38a',
    '物理':'#38b6d9','化学':'#d94f9e','生物':'#7bc043','历史':'#c98a4b','地理':'#4aa06a',
    '思想政治':'#d94f4f','信息科技':'#5a6ee0','体育与健康':'#e0c23a','艺术':'#e06ab0','劳动':'#8a8f6a'
  };
  const ROW_H = 78, GRADE_BASE = 0;
  const GOLDEN = Math.PI * (3 - Math.sqrt(5));   // 黄金角 ≈ 137.508°，螺旋不重叠
  const TOWER_R = 150;                            // 塔底半径（世界单位）
  const COL_W = 420;                              // 塔间距（桌面多塔并排）
  const subjects = SUBJECT_ORDER.filter(s => topics.some(t => t.subject === s));
  const subjX = new Map(subjects.map((s, i) => [s, i * COL_W + COL_W / 2]));

  const bySubjLayout = new Map();
  for (const t of topics) {
    if (!bySubjLayout.has(t.subject)) bySubjLayout.set(t.subject, []);
    bySubjLayout.get(t.subject).push(t);
  }
  for (const [subj, list] of bySubjLayout) {
    list.sort((a, b) => {
      const ga = (a.gradeRangeStart + a.gradeRangeEnd) / 2, gb = (b.gradeRangeStart + b.gradeRangeEnd) / 2;
      return ga - gb || a.domain.localeCompare(b.domain, 'zh') || a.name.localeCompare(b.name, 'zh');
    });
    const cx = subjX.get(subj);
    const phase = ((hashStr(subj) % 100) / 100) * Math.PI * 2;
    list.forEach((t, i) => {
      const gMid = (t.gradeRangeStart + t.gradeRangeEnd) / 2;
      const rand01 = (hashStr(t.id) % 1000) / 1000;
      const th = i * GOLDEN + phase;                          // 黄金角递增 → 螺旋
      const taper = 1 - 0.30 * ((gMid - 1) / 11);             // 塔形：年级越高越收窄
      const r = TOWER_R * taper * (0.82 + 0.36 * rand01);     // 少量错落，不死板
      t._cx = cx;                                             // 塔心 x（自转轴）
      t._lx = r * Math.cos(th);                               // 相对塔心的局部坐标
      t._lz = r * Math.sin(th);
      t._wy = GRADE_BASE + gMid * ROW_H + (rand01 - 0.5) * 16;
      t._color = COLORS[t.subject] || '#999';
      t._gMid = gMid;
    });
  }

  // ---------- 依赖图 ----------
  const prereqsOf = new Map();
  const unlocksOf = new Map();
  for (const d of deps) {
    if (!topicById.has(d.topicId) || !topicById.has(d.prerequisiteId)) continue;
    if (!prereqsOf.has(d.topicId)) prereqsOf.set(d.topicId, []);
    prereqsOf.get(d.topicId).push({ id: d.prerequisiteId, strength: d.strength, reason: d.reason });
    if (!unlocksOf.has(d.prerequisiteId)) unlocksOf.set(d.prerequisiteId, []);
    unlocksOf.get(d.prerequisiteId).push({ id: d.topicId, strength: d.strength, reason: d.reason });
  }
  // 传递闭包（BFS）
  function collectChain(startId, map) {
    const seen = new Map();
    const stack = [startId];
    while (stack.length) {
      const cur = stack.pop();
      for (const e of (map.get(cur) || [])) {
        if (!seen.has(e.id) && e.id !== startId) {
          seen.set(e.id, { ...e, from: cur });
          stack.push(e.id);
        }
      }
    }
    return seen;
  }

  // ---------- 节点半径 = 连接度 ----------
  (function sizeByDegree() {
    const deg = new Map();
    for (const d of deps) {
      if (!topicById.has(d.topicId) || !topicById.has(d.prerequisiteId)) continue;
      deg.set(d.topicId, (deg.get(d.topicId) || 0) + 1);
      deg.set(d.prerequisiteId, (deg.get(d.prerequisiteId) || 0) + 1);
    }
    for (const t of topics) {
      const dg = deg.get(t.id) || 0;
      t._deg = dg;
      t._r = 6 * (dg < 3 ? 1 : Math.min(2, 1.3 + (dg - 3) * 0.175));
    }
  })();

  // ---------- 掌握度（0-1 连续值 + 错因归因；旧两态数据自动迁移） ----------
  const MASTERY_KEY = 'cnk12_mastery';
  const MASTERY_META_KEY = 'cnk12_mastery_meta';
  const PROFILE_KEY = 'cnk12_profile';
  const ERR_CN = { concept: '概念性', transfer: '迁移性', careless: '粗心' };
  let mastery = {};
  try { mastery = JSON.parse(localStorage.getItem(MASTERY_KEY) || '{}') || {}; } catch (e) { mastery = {}; }
  // 旧版两态迁移：yes → 0.8，no → 0.1
  let migrated = false;
  for (const k of Object.keys(mastery)) {
    if (mastery[k] === 'yes') { mastery[k] = 0.8; migrated = true; }
    else if (mastery[k] === 'no') { mastery[k] = 0.1; migrated = true; }
  }
  let masteryMeta = {};   // { id: { ts, err, wrongs } }
  try { masteryMeta = JSON.parse(localStorage.getItem(MASTERY_META_KEY) || '{}') || {}; } catch (e) { masteryMeta = {}; }
  let profile = null;
  try { profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null'); } catch (e) { profile = null; }
  function saveMastery() { try { localStorage.setItem(MASTERY_KEY, JSON.stringify(mastery)); } catch (e) {} }
  function saveMasteryMeta() { try { localStorage.setItem(MASTERY_META_KEY, JSON.stringify(masteryMeta)); } catch (e) {} }
  if (migrated) saveMastery();
  function saveProfile() { try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch (e) {} }
  function mv(id) { const v = mastery[id]; return (typeof v === 'number' && isFinite(v)) ? v : null; }
  // 三档显示：≥0.67 已掌握 / 0.34-0.66 在进步 / <0.34 还不会
  function mState(id) { const v = mv(id); return v === null ? null : v >= 0.67 ? 'yes' : v >= 0.34 ? 'mid' : 'no'; }
  // 答题驱动：答对 +0.34 封顶 1，答错 -0.5 封底 0
  function applyAnswer(id, correct, err) {
    if (id == null || !topicById.has(id)) return;
    const cur = mv(id);
    const v = cur === null ? (correct ? 0.34 : 0)
      : correct ? Math.min(1, cur + 0.34) : Math.max(0, cur - 0.5);
    mastery[id] = Math.round(v * 100) / 100;
    const meta = masteryMeta[id] || {};
    meta.ts = Date.now();
    if (!correct) { meta.err = err || meta.err || 'transfer'; meta.wrongs = (meta.wrongs || 0) + 1; }
    masteryMeta[id] = meta;
    saveMastery(); saveMasteryMeta();
    updateStats();
    requestDraw();
  }
  function setErr(id, err) {
    if (!ERR_CN[err]) return;
    const meta = masteryMeta[id] || {};
    meta.err = err;
    masteryMeta[id] = meta;
    saveMasteryMeta();
  }
  function touchMeta(id) {
    const meta = masteryMeta[id] || {};
    meta.ts = Date.now();
    masteryMeta[id] = meta;
    saveMasteryMeta();
  }
  // 手动标记：'yes' → 0.8，'no' → 0.1；再点一次同档取消
  function setMastery(id, state) {
    if (id == null || !topicById.has(id)) return;
    if (state && mState(id) === state) delete mastery[id];
    else if (state) { mastery[id] = state === 'yes' ? 0.8 : 0.1; touchMeta(id); }
    else delete mastery[id];
    saveMastery();
    updateStats();
    requestDraw();
  }
  function updateStats() {
    let yes = 0, no = 0, total = 0;
    for (const t of topics) {
      if (!visible(t)) continue;
      total++;
      const s = mState(t.id);
      if (s === 'yes') yes++;
      else if (s === 'no') no++;
    }
    const el = document.getElementById('mastery-stats');
    if (el) el.innerHTML = `已掌握 <b class="s-yes">${yes}</b> / 还不会 <b class="s-no">${no}</b> / 共 ${total}`;
  }

  // ---------- Tab 管理 ----------
  const TAB_NAMES = { today: '今日', diag: '诊断', plan: '计划', map: '图谱', me: '我的' };
  let currentTab = null;
  let mapVisible = false;
  function switchTab(name) {
    if (!TAB_NAMES[name]) return;
    currentTab = name;
    document.body.dataset.tab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'map') {
      mapVisible = true;
      if (!mapInited) initMapView();
      resize();
      requestDraw();
    } else {
      mapVisible = false;
      if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
      lastTick = 0;
      if (name === 'today') renderTodayTab();
      else if (name === 'diag') renderDiagTab();
      else if (name === 'plan') renderPlanTab();
      else if (name === 'me') renderMeTab();
    }
  }
  document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => switchTab(b.dataset.tab));

  // ---------- Canvas（Marble 美学：深空底 + 慢速自转 + 生长入场） ----------
  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('map');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  let W = 0, H = 0, dpr = 1;
  let scale = 0.8, tx = 0, ty = 0;
  let rotAngle = 0;                    // 自转角度（弧度，绕屏幕中心）
  const ROT_SPEED = 0.006;             // rad/s，约 17 分钟一圈
  let hoverPause = false, touchPause = false;
  let focusTween = null;               // 聚焦补间 {t0,dur,from:{tx,ty,scale},to:{...}}

  // 世界 → 屏幕：螺旋塔绕自身 Y 轴（高度轴）自转 + 透视投影，再仿射到屏幕
  const FOCAL = 760;                           // 透视焦距（世界单位），越小纵深越强
  function curRot() { return isMobile() ? 0 : rotAngle; }   // 移动端不自转（规则保留）
  function projectPoint(x, y, z) {             // 全局世界点（绕原点转，用于年级线/塔心）
    const a = curRot();
    const c = Math.cos(a), s = Math.sin(a);
    const xr = x * c + z * s;
    const zr = -x * s + z * c;                 // zr > 0 = 远离相机
    const persp = FOCAL / (FOCAL + zr);
    return [xr * persp, y * persp, persp, zr];
  }
  function projectTopic(t) {                   // 节点绕自己塔心转
    const a = curRot();
    const c = Math.cos(a), s = Math.sin(a);
    const xr = t._cx + (t._lx * c + t._lz * s);
    const zr = -t._lx * s + t._lz * c;
    const persp = FOCAL / (FOCAL + zr);
    return [xr * persp, t._wy * persp, persp, zr];
  }
  function worldToScreen(px, py) {             // 投影后的 2D 世界坐标 → 屏幕
    return [px * scale + tx, H - (py * scale + ty)];
  }
  function screenToWorld(sx, sy) {
    return [(sx - tx) / scale, (H - sy - ty) / scale];
  }
  function topicScreen(t) {                    // 节点屏幕坐标 + 透视系数（缓存供绘制/命中）
    const [px, py, persp, zr] = projectTopic(t);
    const [sx, sy] = worldToScreen(px, py);
    t._sx = sx; t._sy = sy; t._psr = persp; t._zr = zr;
    return [sx, sy];
  }

  function hexA(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }
  function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return Math.abs(h); }

  // ---- 离屏背景：深空近纯色 + 收敛星云 + 细星点 + 边缘暗角（resize 时重渲染一次） ----
  const bgCanvas = document.createElement('canvas');
  function renderBackground() {
    bgCanvas.width = Math.max(1, Math.round(W * dpr));
    bgCanvas.height = Math.max(1, Math.round(H * dpr));
    const b = bgCanvas.getContext('2d');
    b.setTransform(dpr, 0, 0, dpr, 0, 0);
    const g = b.createRadialGradient(W * 0.5, H * 0.42, 0, W * 0.5, H * 0.42, Math.hypot(W, H) * 0.75);
    g.addColorStop(0, '#10142a'); g.addColorStop(0.55, '#0b0e1c'); g.addColorStop(1, '#070912');
    b.fillStyle = g; b.fillRect(0, 0, W, H);
    let seed = 20240612;
    const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
    const nebCols = ['#16C7B7', '#9a6ae8', '#4cc38a', '#e0564b', '#38b6d9', '#e8913a'];
    for (let i = 0; i < 6; i++) {
      const nx = rnd() * W, ny = rnd() * H, nr = 140 + rnd() * 280;
      const ng = b.createRadialGradient(nx, ny, 0, nx, ny, nr);
      const c = nebCols[i % nebCols.length];
      ng.addColorStop(0, hexA(c, 0.035)); ng.addColorStop(1, hexA(c, 0));
      b.fillStyle = ng; b.beginPath(); b.arc(nx, ny, nr, 0, Math.PI * 2); b.fill();
    }
    for (let i = 0; i < 210; i++) {
      const x = rnd() * W, y = rnd() * H, r = 0.3 + rnd() * 0.9, a = 0.02 + rnd() * 0.07;
      b.fillStyle = `rgba(210,220,240,${a.toFixed(3)})`;
      b.beginPath(); b.arc(x, y, r, 0, Math.PI * 2); b.fill();
    }
    // 边缘暗角：视线向中心图谱聚拢
    const vg = b.createRadialGradient(W * 0.5, H * 0.5, Math.min(W, H) * 0.38, W * 0.5, H * 0.5, Math.hypot(W, H) * 0.62);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.34)');
    b.fillStyle = vg; b.fillRect(0, 0, W, H);
  }

  // ---- 节点精灵：亮色实心核 + 收窄的精致光晕（对标 Marble 的干净节点） ----
  const SPR_SIZE = 128, SPR_CORE = 24, SPR_K = SPR_SIZE / (SPR_CORE * 2);
  function makeSprite(color) {
    const c = document.createElement('canvas');
    c.width = c.height = SPR_SIZE;
    const g2 = c.getContext('2d');
    const g = g2.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0, 'rgba(255,255,255,0.95)');
    g.addColorStop(0.10, color);
    g.addColorStop(SPR_CORE / 64, color);            // 实心色盘到核边缘，保持锐利
    g.addColorStop(0.42, hexA(color, 0.35));         // 光晕快速衰减，不再糊成一团
    g.addColorStop(0.56, hexA(color, 0.06));
    g.addColorStop(0.68, hexA(color, 0));
    g.addColorStop(1, hexA(color, 0));
    g2.fillStyle = g; g2.fillRect(0, 0, SPR_SIZE, SPR_SIZE);
    return c;
  }
  const sprites = new Map();
  for (const s of subjects) sprites.set(s, makeSprite(COLORS[s] || '#999'));
  const spriteYes = makeSprite('#3fae6a');

  // ---------- 渲染循环 ----------
  let rafId = null;
  let lastTick = 0;
  let enterT0 = -1, enterDone = false;
  let inertia = null;
  function rotActive() { return mapVisible && !isMobile() && !hoverPause && !touchPause && !focusTween && !inertia && selectedId == null; }
  function animActive() {
    return mapVisible && (!enterDone || !!inertia || !!focusTween || selectedId != null
      || highlightEdges.size > 0 || rotActive());
  }
  function requestDraw() {
    if (!mapVisible) return;
    if (rafId == null) rafId = requestAnimationFrame(tick);
  }
  function tick(now) {
    rafId = null;
    window.__cnkFrames = (window.__cnkFrames || 0) + 1;
    const dt = lastTick ? Math.min(64, now - lastTick) : 16;
    lastTick = now;
    stepInertia(now);
    stepTween(now);
    if (rotActive()) rotAngle += ROT_SPEED * dt / 1000;
    draw(now);
    if (animActive()) requestDraw();
    else lastTick = 0;
  }
  function stepInertia(now) {
    if (!inertia) return;
    const dt = Math.min(50, now - inertia.last);
    inertia.last = now;
    tx += inertia.vx * dt; ty += inertia.vy * dt;
    const decay = Math.exp(-dt / 160);
    inertia.vx *= decay; inertia.vy *= decay;
    if (now - inertia.t0 > inertia.dur || Math.hypot(inertia.vx, inertia.vy) < 0.02) inertia = null;
  }
  function stepTween(now) {
    if (!focusTween) return;
    const p = Math.min(1, (now - focusTween.t0) / focusTween.dur);
    const e = 1 - Math.pow(1 - p, 3);   // easeOutCubic
    tx = focusTween.from.tx + (focusTween.to.tx - focusTween.from.tx) * e;
    ty = focusTween.from.ty + (focusTween.to.ty - focusTween.from.ty) * e;
    scale = focusTween.from.scale + (focusTween.to.scale - focusTween.from.scale) * e;
    if (p >= 1) focusTween = null;
  }
  // 点选节点 → 相机聚焦补间（按投影后的 2D 世界坐标）
  function startFocus(t) {
    if (!t) return;
    const [px, py] = projectTopic(t);
    const targetScale = Math.min(2.4, Math.max(1.15, scale));
    const syTarget = isMobile() ? H * 0.32 : H / 2;
    focusTween = {
      t0: performance.now(), dur: 620,
      from: { tx, ty, scale },
      to: { tx: W / 2 - px * targetScale, ty: (H - syTarget) - py * targetScale, scale: targetScale }
    };
    requestDraw();
  }

  let lastFitW = 0;
  function resize() {
    if (!mapVisible && !mapInited) return;
    dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth; H = wrap.clientHeight;
    if (!W || !H) return;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    renderBackground();
    applySheetState();
    // 移动端：视口宽度变化（横竖屏切换）时重新 fit 当前学科，平移缩放不被 tab 切换重置
    if (isMobile() && mobileSubject && Math.abs(W - lastFitW) > 50) {
      lastFitW = W;
      fitSubjectMobile(mobileSubject);
    }
    requestDraw();
  }
  window.addEventListener('resize', () => { if (mapVisible) resize(); });

  function projectedBounds(list) {   // 投影后 2D 世界坐标的包围盒
    let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
    for (const t of list) {
      const [px, py] = projectTopic(t);
      if (px < minX) minX = px;
      if (px > maxX) maxX = px;
      if (py < minY) minY = py;
      if (py > maxY) maxY = py;
    }
    return { minX, maxX, minY, maxY };
  }
  function fitView() {
    const b = projectedBounds(topics);
    const minX = b.minX - 90, maxX = b.maxX + 90;
    const minY = 0.3 * ROW_H, maxY = b.maxY + 90;
    scale = Math.min(W / (maxX - minX), H / (maxY - minY));
    scale = Math.max(0.2, Math.min(1.0, scale));
    tx = (W - (minX + maxX) * scale) / 2;
    ty = (H - (minY + maxY) * scale) / 2;
  }
  function focusGradeMobile(g, subject) {
    const want = subject && subjX.get(subject) != null ? subject : '道德与法治';
    const cx = subjX.get(want) != null ? subjX.get(want) : 0;
    const [px, py] = projectPoint(cx, g * ROW_H, 0);
    scale = 0.9;
    tx = W / 2 - px * scale;
    ty = H * 0.42 - py * scale;
  }
  function focusGradeSubject(g, subject) {
    if (isMobile()) { focusGradeMobile(g, subject); return; }
    const cx = subject && subjX.get(subject) != null ? subjX.get(subject) : 0;
    const [px, py] = projectPoint(cx, g * ROW_H, 0);
    scale = Math.min(1.1, Math.max(0.5, W / 2600, H / 900));
    scale = Math.min(6, Math.max(0.12, scale));
    tx = W / 2 - px * scale;
    ty = H / 2 - py * scale;
  }

  // 移动端单学科 fit-to-view：螺旋塔适配视口宽度，不横向溢出；内容矮于视口则垂直居中，否则顶端对齐
  function fitSubjectMobile(subject) {
    const list = topics.filter(t => t.subject === subject);
    if (!list.length || !W || !H) return;
    const b = projectedBounds(list);
    const minX = b.minX - 74, maxX = b.maxX + 74;
    scale = W / (maxX - minX);
    scale = Math.min(2.2, Math.max(0.5, scale));
    tx = W / 2 - ((minX + maxX) / 2) * scale;
    const minY = b.minY - 40, maxY = b.maxY + 40;
    if ((maxY - minY) * scale <= H) {
      ty = H / 2 - ((minY + maxY) / 2) * scale;
    } else {
      ty = H - 12 - maxY * scale;
    }
  }

  // ---------- 状态 ----------
  const activeSubjects = new Set(subjects);
  let mobileSubject = null;   // 移动端：单学科模式，chips 单选切换
  let selectedId = null, hoverId = null;
  let highlightSet = new Set(), highlightEdges = new Set();
  let searchMatches = new Set();
  let panelView = 'empty';   // 'empty' | 'detail' | 'diag' | 'next'
  let diagRootId = null;
  let quiz = null;           // 答题会话 { mode:'node'|'quick', returnTo, topicId?, grade?, subject?, items, idx, picked, results, scored }
  let diagFlow = { step: 'subject' };   // 诊断 tab 流程：subject | grade | say

  function visible(t) { return activeSubjects.has(t.subject); }
  function isMobile() { return window.innerWidth < 768; }

  // ---------- 绘制 ----------
  function draw(now) {
    now = now || performance.now();
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(bgCanvas, 0, 0, W, H);
    // 年级网格线：移动端画屏幕水平线 + 左缘悬浮标签；桌面端画随塔自转的投影线
    ctx.font = '11px sans-serif';
    const gradeAnchorX = isMobile() && mobileSubject && subjX.get(mobileSubject) != null ? subjX.get(mobileSubject) : 0;
    for (let g = 1; g <= 12; g++) {
      if (isMobile()) {
        const [pgx, pgy] = projectPoint(gradeAnchorX, g * ROW_H, 0);
        const [, sy] = worldToScreen(pgx, pgy);
        if (sy < -20 || sy > H + 20) continue;
        ctx.strokeStyle = g % 3 === 1 ? 'rgba(80,92,120,0.20)' : 'rgba(80,92,120,0.10)';
        ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
        const label = g + ' 年级';
        const lw = ctx.measureText(label).width + 10;
        ctx.fillStyle = 'rgba(10,12,20,0.72)';
        ctx.fillRect(4, sy - 15, lw, 15);
        ctx.fillStyle = '#8a94a8';
        ctx.fillText(label, 9, sy - 4);
      } else {
        const [p0x, p0y] = projectPoint(-1400, g * ROW_H, 0);
        const [x0, y0] = worldToScreen(p0x, p0y);
        const [p1x, p1y] = projectPoint(7200, g * ROW_H, 0);
        const [x1, y1] = worldToScreen(p1x, p1y);
        ctx.strokeStyle = g % 3 === 1 ? 'rgba(80,92,120,0.16)' : 'rgba(80,92,120,0.08)';
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
        const [plx, ply] = projectPoint(-90, g * ROW_H, 0);
        const [lx, ly] = worldToScreen(plx, ply);
        ctx.fillStyle = '#5a6373';
        ctx.textAlign = 'right';
        ctx.fillText(g + ' 年级', lx, ly - 4);
        ctx.textAlign = 'left';
      }
    }
    // 学科塔标题：桌面端画在塔顶；移动端由 chips 承担，不画
    if (!isMobile()) {
      ctx.font = 'bold 13px sans-serif';
      for (const s of subjects) {
        if (!activeSubjects.has(s)) continue;
        const [psx, psy] = projectPoint(subjX.get(s), 12 * ROW_H + 70, 0);
        const [sx, sy] = worldToScreen(psx, psy);
        ctx.fillStyle = COLORS[s];
        ctx.textAlign = 'center';
        ctx.fillText(s, sx, sy);
        ctx.textAlign = 'left';
      }
    }

    // 入场生长动画：节点按年级从低到高 stagger 点亮（每次进入图谱播一次）
    let enterNow = 1e9;
    if (!enterDone) {
      if (enterT0 < 0) enterT0 = now;
      enterNow = now - enterT0;
      if (enterNow > 900) enterDone = true;
    }

    // 边：默认透明度 ≤0.1（Marble 暗纹）；选中后只画高亮先修链
    const dashOff = -((now / 30) % 24);
    for (const d of deps) {
      const a = topicById.get(d.prerequisiteId), b = topicById.get(d.topicId);
      if (!a || !b || !visible(a) || !visible(b)) continue;
      const inHL = highlightEdges.has(d.prerequisiteId + '>' + d.topicId);
      if (selectedId && !inHL) continue;   // 选中态：无关心整条隐去
      const [x1, y1] = topicScreen(a);
      const [x2, y2] = topicScreen(b);
      if ((x1 < -50 && x2 < -50) || (x1 > W + 50 && x2 > W + 50)) continue;
      if ((y1 < -50 && y2 < -50) || (y1 > H + 50 && y2 > H + 50)) continue;
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const dx = Math.max(-60, Math.min(60, (x2 - x1) * 0.25));
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(mx + dx, my, x2, y2);
      if (inHL) {
        ctx.strokeStyle = 'rgba(255,214,90,0.95)'; ctx.lineWidth = 2;
        ctx.setLineDash([7, 5]); ctx.lineDashOffset = dashOff;
        ctx.stroke(); ctx.setLineDash([]);
      } else {
        const alpha = d.strength === 'hard' ? 0.06 : 0.035;
        const eg = ctx.createLinearGradient(x1, y1, x2, y2);
        eg.addColorStop(0, hexA(a._color, alpha));
        eg.addColorStop(1, hexA(b._color, alpha));
        ctx.strokeStyle = eg; ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // 节点：远的先画（画家算法），透视缩放半径 + 远端压暗
    const pulse = 1 + 0.14 * Math.sin(now / 280);
    const drawList = [];
    for (const t of topics) {
      if (!visible(t)) continue;
      topicScreen(t);
      if (t._sx < -60 || t._sx > W + 60 || t._sy < -60 || t._sy > H + 60) continue;
      drawList.push(t);
    }
    drawList.sort((a, b) => b._zr - a._zr);
    for (const t of drawList) {
      const sx = t._sx, sy = t._sy;
      const skeleton = t.status === 'skeleton';
      const ms = mState(t.id);
      let ea = 1;
      if (!enterDone) {
        const delay = ((t._gMid - 1) / 11) * 560 + (hashStr(t.id) % 80);
        const p = Math.max(0, Math.min(1, (enterNow - delay) / 200));
        ea = p * p * (3 - 2 * p);
        if (ea <= 0) continue;
      }
      // 选中态：无关节点降至 4% 透明度
      if (selectedId && !highlightSet.has(t.id) && t.id !== selectedId) ea *= 0.04;
      // 纵深：远端节点压暗
      ea *= Math.max(0.35, Math.min(1.08, (t._psr - 0.80) / 0.45));
      let r = (t._r || 6) * t._psr * Math.min(1.3, Math.max(0.6, scale));
      if (t.id === selectedId) r *= 1.35 * pulse;
      else if (t.id === hoverId) r *= 1.18;
      if (!enterDone) r *= 0.3 + 0.7 * Math.min(1, ea * 2);
      const S = r * 2 * SPR_K;
      const nodeAlpha = Math.min(1, ea * (skeleton ? 0.55 : 1));
      ctx.globalAlpha = nodeAlpha;
      ctx.drawImage(ms === 'yes' ? spriteYes : sprites.get(t.subject), sx - S / 2, sy - S / 2, S, S);
      ctx.beginPath();
      if (ms === 'yes') {
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        if (skeleton) ctx.setLineDash([3, 3]);
        ctx.strokeStyle = '#7fe0a4'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.setLineDash([]);
      } else if (ms === 'no') {
        ctx.arc(sx, sy, r + 1.5, 0, Math.PI * 2);
        if (skeleton) ctx.setLineDash([3, 3]);
        ctx.strokeStyle = '#ff6a3d'; ctx.lineWidth = 2.6; ctx.stroke();
        ctx.setLineDash([]);
      } else if (ms === 'mid') {
        ctx.arc(sx, sy, r + 0.8, 0, Math.PI * 2);
        if (skeleton) ctx.setLineDash([3, 3]);
        ctx.strokeStyle = '#e0b34a'; ctx.lineWidth = 2; ctx.stroke();
        ctx.setLineDash([]);
      } else if (skeleton) {
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = t._color; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.setLineDash([]);
      } else {
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1; ctx.stroke();
      }
      ctx.globalAlpha = 1;   // 高亮/搜索圈不受节点透明度影响
      if (highlightSet.has(t.id) && t.id !== selectedId) {
        ctx.beginPath(); ctx.arc(sx, sy, r + 4.5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,214,90,0.9)'; ctx.lineWidth = 2; ctx.stroke();
      }
      if (searchMatches.has(t.id)) {
        ctx.beginPath(); ctx.arc(sx, sy, r + 8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(22,199,183,0.85)'; ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
      }
    }
    if (selectedId) {
      const t = topicById.get(selectedId);
      if (t) {
        const [px, py, psr] = projectTopic(t);
        const [sx, sy] = worldToScreen(px, py);
        const r = (t._r || 6) * psr * Math.min(1.3, Math.max(0.6, scale)) * 1.35 * pulse;
        ctx.font = 'bold 12px sans-serif';
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.fillText(t.name, sx, sy - r - 7);
        ctx.textAlign = 'left';
      }
    }
  }

  // ---------- 指针交互 ----------
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    inertia = null; focusTween = null;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const [wx, wy] = screenToWorld(mx, my);
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    scale = Math.min(6, Math.max(0.12, scale * factor));
    tx = mx - wx * scale; ty = (H - my) - wy * scale;
    requestDraw();
  }, { passive: false });

  // 悬停即停（仅鼠标）
  canvas.addEventListener('pointerenter', (e) => {
    if (e.pointerType === 'mouse') { hoverPause = true; }
  });
  canvas.addEventListener('pointerleave', (e) => {
    if (e.pointerType === 'mouse') { hoverPause = false; tooltip.style.display = 'none'; hoverId = null; requestDraw(); }
  });

  const pointers = new Map();
  let panMoved = 0, panLast = null, downTime = 0, pinch = null;
  let velSamples = [];

  // 阻断触摸后的兼容鼠标事件（ghost click），避免抽屉刚打开就被同一坐标落的假点击误关
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

  function hitTest(sx, sy, isTouch) {   // 屏幕空间命中（投影缓存，透视下也准）
    let best = null, bestScore = Infinity;
    for (const t of topics) {
      if (!visible(t)) continue;
      if (t._sx == null) topicScreen(t);
      const rS = (t._r || 6) * (t._psr || 1) * Math.min(1.3, Math.max(0.6, scale));
      const lim = Math.max(isTouch ? 28 : 14, rS + 6);
      const d = Math.hypot(t._sx - sx, t._sy - sy);
      if (d < lim && d < bestScore) { bestScore = d; best = t; }
    }
    return best;
  }

  canvas.addEventListener('pointerdown', (e) => {
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, t: Date.now() });
    tooltip.style.display = 'none';
    inertia = null; focusTween = null;
    touchPause = true;   // 触摸即停
    if (pointers.size === 1) {
      panMoved = 0; panLast = { x: e.clientX, y: e.clientY }; downTime = Date.now();
      velSamples = [];
      pinch = null;
      canvas.classList.add('dragging');
    } else if (pointers.size === 2) {
      const [p1, p2] = [...pointers.values()];
      pinch = {
        d: Math.hypot(p2.x - p1.x, p2.y - p1.y),
        mx: (p1.x + p2.x) / 2, my: (p1.y + p2.y) / 2,
        scale, tx, ty
      };
      panMoved = 999;
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, t: pointers.get(e.pointerId).t });

    if (pointers.size === 2 && pinch) {
      const [p1, p2] = [...pointers.values()];
      const d = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      const cx = (p1.x + p2.x) / 2 - rect.left, cy = (p1.y + p2.y) / 2 - rect.top;
      const newScale = Math.min(6, Math.max(0.12, pinch.scale * (d / (pinch.d || 1))));
      const [wx, wy] = screenToWorld(cx, cy);
      scale = newScale;
      tx = cx - wx * scale; ty = (H - cy) - wy * scale;
      requestDraw();
      return;
    }
    if (pointers.size === 1 && panLast) {
      const dx = e.clientX - panLast.x, dy = e.clientY - panLast.y;
      panMoved += Math.abs(dx) + Math.abs(dy);
      tx += dx; ty -= dy;
      panLast = { x: e.clientX, y: e.clientY };
      velSamples.push({ x: e.clientX, y: e.clientY, t: performance.now() });
      if (velSamples.length > 6) velSamples.shift();
      requestDraw();
      return;
    }
    if (e.pointerType === 'mouse' && pointers.size === 0) {
      const best = hitTest(mx, my, false);
      const newHover = best ? best.id : null;
      if (newHover !== hoverId) {
        hoverId = newHover;
        if (best) {
          tooltip.style.display = 'block';
          tooltip.style.left = (mx + 14) + 'px';
          tooltip.style.top = (my + 10) + 'px';
          tooltip.innerHTML = `<div class="tt-name" style="color:${best._color}">${best.name}</div>
            <div class="tt-meta">${best.subject} · ${best.domain} · ${best.gradeRangeStart === best.gradeRangeEnd ? best.gradeRangeStart + '年级' : best.gradeRangeStart + '-' + best.gradeRangeEnd + '年级'}${best.status === 'skeleton' ? ' · 骨架占位' : ''}</div>`;
        } else tooltip.style.display = 'none';
        requestDraw();
      } else if (best) {
        tooltip.style.left = (mx + 14) + 'px';
        tooltip.style.top = (my + 10) + 'px';
      }
    }
  });

  function endPointer(e) {
    const wasSingle = pointers.size === 1 && pointers.has(e.pointerId);
    const isTouch = e.pointerType !== 'mouse';
    pointers.delete(e.pointerId);
    if (pointers.size === 0) touchPause = false;   // 抬起后恢复自转（鼠标悬停仍暂停）
    if (pointers.size < 2) pinch = null;
    if (pointers.size === 1) {
      const [p] = [...pointers.values()];
      panLast = { x: p.x, y: p.y };
      velSamples = [];
    }
    if (pointers.size === 0) {
      canvas.classList.remove('dragging');
      if (wasSingle && panMoved < 10 && (Date.now() - downTime) < 500) {
        const rect = canvas.getBoundingClientRect();
        const best = hitTest(e.clientX - rect.left, e.clientY - rect.top, isTouch);
        if (best) selectTopic(best.id);
      } else if (wasSingle && isTouch && panMoved >= 10 && velSamples.length >= 2) {
        const last = velSamples[velSamples.length - 1];
        const recent = velSamples.filter(s => last.t - s.t <= 100);
        const first = recent[0] || last;
        const dt = Math.max(16, last.t - first.t);
        let vx = (last.x - first.x) / dt, vy = (last.y - first.y) / dt;
        const sp = Math.hypot(vx, vy);
        if (sp > 0.05) {
          const cap = 2.5;
          if (sp > cap) { vx *= cap / sp; vy *= cap / sp; }
          inertia = {
            vx, vy: -vy, t0: performance.now(), last: performance.now(),
            dur: Math.max(300, Math.min(600, 300 + sp * 200))
          };
          requestDraw();
        }
      }
      panLast = null;
      velSamples = [];
    }
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);

  // ---------- 面板骨架（桌面右栏 / 移动端固定底部抽屉） ----------
  const panel = document.getElementById('panel');
  const panelBody = document.getElementById('panel-body');
  const handle = document.getElementById('panel-handle');
  const drawerMask = document.getElementById('drawer-mask');
  let sheetState = 'collapsed';   // 移动端语义：'open'（55vh 固定抽屉）| 'collapsed'（隐藏）

  const EMPTY_HINT_HTML = '<div id="empty-hint">点击图谱上的任意节点，查看它的先修链与详情。<br>先用「诊断」找出孩子的薄弱点，再来这里追溯根源。</div>';
  function applySheetState() {
    if (!isMobile()) {
      panel.style.transform = '';
      panel.classList.remove('sheet-open', 'dragging');
      drawerMask.classList.remove('show');
      return;
    }
    panel.classList.toggle('sheet-open', sheetState === 'open');
    drawerMask.classList.toggle('show', sheetState === 'open');
    if (sheetState !== 'open') panel.style.transform = '';
  }
  function openPanelMobile() {
    if (isMobile()) { sheetState = 'open'; applySheetState(); }
    panel.classList.remove('hidden');
  }
  function closePanel() {
    if (isMobile()) { sheetState = 'collapsed'; applySheetState(); }
    else panel.classList.add('hidden');
    selectedId = null; panelView = 'empty'; diagRootId = null;
    highlightSet.clear(); highlightEdges.clear();
    panelBody.innerHTML = EMPTY_HINT_HTML;
    requestDraw();
  }
  drawerMask.addEventListener('click', () => { if (isMobile() && sheetState === 'open') closePanel(); });
  // 抓手条：点按关闭；下滑超过阈值或快速甩动关闭，否则回弹
  let hDrag = null;
  handle.addEventListener('pointerdown', (e) => {
    if (!isMobile() || sheetState !== 'open' || e.pointerType === 'mouse') return;   // 鼠标事件一律忽略，防 ghost click
    try { handle.setPointerCapture(e.pointerId); } catch (err) {}
    hDrag = { startY: e.clientY, dy: 0, moved: 0 };
    panel.classList.add('dragging');
    e.preventDefault();
  });
  handle.addEventListener('pointermove', (e) => {
    if (!hDrag) return;
    const dy = Math.max(0, e.clientY - hDrag.startY);   // 只允许向下拖
    hDrag.dy = dy;
    hDrag.moved += Math.abs(e.movementY || 0);
    panel.style.transform = dy > 0 ? `translateY(${dy}px)` : '';
  });
  function endHandleDrag(e) {
    if (!hDrag) return;
    panel.classList.remove('dragging');
    const dy = hDrag.dy, moved = hDrag.moved;
    const v = e && typeof e.movementY === 'number' ? e.movementY : 0;
    hDrag = null;
    if (moved < 6 || dy > panel.offsetHeight * 0.35 || (dy > 40 && v > 12)) closePanel();
    else { panel.style.transform = ''; }
  }
  handle.addEventListener('pointerup', endHandleDrag);
  handle.addEventListener('pointercancel', () => { hDrag = null; panel.classList.remove('dragging'); panel.style.transform = ''; });

  // ---------- 详情面板（点选节点 → 追溯视图） ----------
  const TYPE_CN = { CONCEPTUAL: '概念理解', PROCEDURAL: '方法技能', REPRESENTATIONAL: '表征方式', LANGUAGE: '语言表达', META: '元认知' };
  function gradeTxtOf(t) { return t.gradeRangeStart === t.gradeRangeEnd ? t.gradeRangeStart + ' 年级' : t.gradeRangeStart + '–' + t.gradeRangeEnd + ' 年级'; }
  function chainListHtml(list, emptyTxt) {
    if (!list.length) return `<div class="desc" style="color:var(--text-dim);font-size:12px">${emptyTxt}</div>`;
    return list.map(e => {
      const t = topicById.get(e.id);
      if (!t) return '';
      return `<div class="chain-item ${e.strength}" data-id="${e.id}">
        <span style="color:${t._color}">${esc(t.name)}</span>
        <span class="r">${gradeTxtOf(t)} · ${e.strength === 'hard' ? '硬依赖' : '软依赖'}${e.reason ? '：' + esc(e.reason) : ''}</span>
      </div>`;
    }).join('');
  }

  function renderPanel(keepScroll) {
    const st = keepScroll ? panelBody.scrollTop : 0;
    if (panelView === 'detail' && selectedId) renderDetail();
    else if (panelView === 'diag' && diagRootId) renderDiag();
    else if (panelView === 'next') renderNext();
    if (keepScroll) panelBody.scrollTop = st;
  }

  // coaching 卡：ask 问句 + pattern 规律 + variants 课外变式 + drills 同类训练（答案默认折叠，给思路不给答案）
  function renderCoachCard(coach, skipDrills) {
    const vars = Array.isArray(coach.variants) ? coach.variants : [];
    const drills = skipDrills ? [] : (Array.isArray(coach.drills) ? coach.drills : []);
    if (!coach.ask && !coach.pattern && !vars.length && !drills.length) return '';
    const varsHtml = vars.length ? `
      <div class="ask-sec">课外变式 · 换个语境还是这条规律（${vars.length}）</div>
      ${vars.map(v => `<div class="var-item">
        <div class="v-t">${esc(v.text)}</div>
        <div class="v-e">${esc(v.explain)}</div>
      </div>`).join('')}` : '';
    const drillsHtml = drills.length ? `
      <div class="ask-sec">同类训练（${drills.length}）· 先看思路提示，做完再点开核对</div>
      ${drills.map((d, i) => `<div class="drill-item">
        <div class="d-q">${esc(d.q)}</div>
        ${d.hint ? `<div class="d-hint"><b>思路：</b>${esc(d.hint)}</div>` : ''}
        <button class="drill-ans-btn" type="button">查看答案（先自己做完再对）</button>
        <div class="drill-ans"><b>参考答案：</b>${esc(d.answer)}</div>
      </div>`).join('')}` : '';
    return `
      <div class="ask-card">
        ${coach.ask ? `<div class="ask-tag">家长一问 · 可观察行为</div><div class="ask-q">${esc(coach.ask)}</div>` : ''}
        ${coach.pattern ? `<div class="ask-pattern">规律：${esc(coach.pattern)}</div>` : ''}
        ${varsHtml}
        ${drillsHtml}
      </div>`;
  }

  function renderDetail() {
    const t = topicById.get(selectedId);
    if (!t) return;
    const preClosure = collectChain(selectedId, prereqsOf);          // 先修总数（传递闭包 BFS）
    const unlockClosure = collectChain(selectedId, unlocksOf);
    const directPre = prereqsOf.get(selectedId) || [];               // 直接先修
    const directUnlock = unlocksOf.get(selectedId) || [];            // 解锁什么
    const coach = coaching[selectedId] || null;
    const cluster = clusterByKey.get(t.subject + '|' + t.domain);
    const m = mState(selectedId);
    const mVal = mv(selectedId);
    const stdHtml = (t.standards || []).map(k => {
      const s = stdByKey.get(k);
      return s ? `<div style="margin-bottom:6px"><b style="font-size:12px">${s.title}</b><div style="font-size:12px;color:var(--text-dim);line-height:1.6">${s.summary}</div></div>` : '';
    }).join('');
    const mBadge = m === 'yes' ? `<span class="badge m-yes">已掌握 ✓ ${Math.round(mVal * 100)}%</span>`
                 : m === 'mid' ? `<span class="badge m-mid">在进步 ${Math.round(mVal * 100)}%</span>`
                 : m === 'no' ? `<span class="badge m-no">还不会 ${Math.round(mVal * 100)}%</span>` : '';
    // coaching 卡（ask/pattern/variants/drills 来自 data/coaching.json；无数据时不渲染此卡）
    // 会员且有补给包时 drills 并入补给包区（合并去重），此处不再重复渲染
    const askHtml = coach ? renderCoachCard(coach, packByTopic.has(selectedId) && isMember()) : '';
    const packHtml = renderPackSection(selectedId);
    // 家长检验卡
    const assessInner = t.assessmentPrompt ? `
      <div class="assess-card">
        <div class="assess-q">检验问题：${t.assessmentPrompt}</div>
        ${(t.evidence && t.evidence.length) ? `<div class="assess-ev"><b>怎么算答对：</b><ul>${t.evidence.map(e => `<li>${e}</li>`).join('')}</ul></div>` : ''}
        <div class="assess-btns">
          <button class="ok" id="assess-ok">答对了</button>
          <button class="bad" id="assess-bad">没答对</button>
        </div>
        <div class="assess-fb" id="assess-fb">${m === 'yes' ? '<span class="assess-fb ok">已标记为已掌握 ✓</span>' : m === 'no' ? '<span class="assess-fb bad">已标记为还不会</span>' : m === 'mid' ? '<span class="assess-fb">在进步中，继续巩固</span>' : ''}</div>
      </div>` : '';
    // 家长检验卡（默认家长视角，始终展开前置）
    const assessCardTop = t.assessmentPrompt ? `<h3>家长检验卡</h3>${assessInner}` : '';
    const quizBtnHtml = quizByTopic.has(selectedId)
      ? `<button class="tbtn quiz-entry" id="btn-quiz">测一测 · ${quizByTopic.get(selectedId).length} 道题确证掌握度</button>` : '';
    const resHtml = resourceSectionHtml(selectedId);
    panelBody.innerHTML = `
      <button id="panel-close" title="关闭">×</button>
      <h2 style="color:${t._color}">${esc(t.name)}</h2>
      <div class="badges">
        <span class="badge" style="color:${t._color};border-color:${t._color}">${t.subject} · ${t.domain}</span>
        <span class="badge type">${TYPE_CN[t.type] || t.type}</span>
        <span class="badge grade">${gradeTxtOf(t)}</span>
        ${t.status === 'skeleton' ? '<span class="badge skeleton">骨架占位</span>' : ''}
        ${mBadge}
      </div>
      <div class="trace-stats">
        <div class="trace-stat"><div class="n">${preClosure.size}</div><div class="l">先修总数（全链）</div></div>
        <div class="trace-stat"><div class="n">${directPre.length}</div><div class="l">直接先修</div></div>
        <div class="trace-stat"><div class="n">${directUnlock.length}</div><div class="l">学会后解锁</div></div>
      </div>
      <div class="mbtns">
        <button class="mbtn m-no ${m === 'no' ? 'active' : ''}" id="mb-no">✗ 还不会</button>
        <button class="mbtn m-yes ${m === 'yes' ? 'active' : ''}" id="mb-yes">✓ 已掌握</button>
      </div>
      <div class="mbtn-hint">再点一次同一按钮可取消标记</div>
      ${quizBtnHtml}
      <button class="tbtn" id="btn-addplan" style="width:100%;min-height:44px;margin-bottom:8px">把「还不会」的先修链排进今日清单 ›</button>
      <button class="tbtn" id="btn-diag" style="width:100%;min-height:44px">这个知识点不会，帮我找原因</button>
      ${assessCardTop}
      ${askHtml}
      ${packHtml}
      <div class="desc">${t.description}</div>
      ${t.status === 'skeleton' ? '<div class="placeholder-note">⚠ 骨架占位节点：内容待按该学科课标逐步填充，当前仅展示知识结构位置（仍可标记掌握度）。</div>' : ''}
      ${(t.evidence && t.evidence.length && !t.assessmentPrompt) ? `<h3>掌握证据（能做到这些就算学会）</h3><ul>${t.evidence.map(e => `<li>${e}</li>`).join('')}</ul>` : ''}
      ${stdHtml ? `<h3>课标对齐（2022 年版义务教育课程标准）</h3>${stdHtml}` : ''}
      ${cluster ? `<h3>本单元概述</h3><div class="desc" style="font-size:12.5px;color:var(--text-dim)">${cluster.summary}</div>` : ''}
      ${resHtml}
      <h3>直接先修（${directPre.length}）</h3>
      ${chainListHtml(directPre, '没有直接先修，这是基础起点。')}
      <h3>学会后能解锁（${directUnlock.length}）</h3>
      ${chainListHtml(directUnlock, '暂无后续知识点依赖它。')}
      <h3>完整先修链（${preClosure.size}）</h3>
      ${chainListHtml([...preClosure.values()], '这个知识点没有先修节点。')}
      <div style="height:20px"></div>`;
    bindDetailEvents();
  }

  function bindDetailEvents() {
    panelBody.querySelector('#panel-close').onclick = closePanel;
    panelBody.querySelector('#mb-yes').onclick = () => { setMastery(selectedId, 'yes'); renderPanel(true); };
    panelBody.querySelector('#mb-no').onclick = () => { setMastery(selectedId, 'no'); renderPanel(true); };
    panelBody.querySelector('#btn-diag').onclick = () => { panelView = 'diag'; diagRootId = selectedId; renderPanel(); };
    panelBody.querySelector('#btn-addplan').onclick = () => requireMember(() => {   // 付费墙：生成清单
      const ids = buildPlanIds();
      if (!ids.length) { toast('先把不会的知识点标记「还不会」，或到「诊断」tab 做一次诊断'); return; }
      buildTodayPlan(ids);
      switchTab('plan');
    });
    const bq = panelBody.querySelector('#btn-quiz');
    if (bq) bq.onclick = () => startNodeQuiz(selectedId, 'map');   // 测一测免费
    const br = panelBody.querySelector('#btn-retest');
    if (br) br.onclick = () => startNodeQuiz(selectedId, 'map');
    const ru = panelBody.querySelector('#res-unlock');
    if (ru) ru.onclick = () => requireMember(() => renderPanel(true));
    const pu = panelBody.querySelector('#pack-unlock');
    if (pu) pu.onclick = () => requireMember(() => renderPanel(true));
    const pod = panelBody.querySelector('#pack-output-done');
    if (pod) pod.onclick = () => {
      togglePackDone(selectedId);
      const done = isPackDone(selectedId);
      pod.classList.toggle('done', done);
      pod.textContent = done ? '已完成 ✓（再点撤销）' : '完成了';
      toast(done ? '产出任务已打卡 ✓' : '已撤销打卡');
    };
    const at = panelBody.querySelector('#assess-toggle');
    if (at) at.onclick = () => {
      const w = panelBody.querySelector('#assess-wrap');
      w.classList.toggle('open');
      at.textContent = w.classList.contains('open') ? '家长检验卡 ▾ 点击收起' : '家长检验卡 ▸ 点击展开';
    };
    const okBtn = panelBody.querySelector('#assess-ok');
    if (okBtn) {
      okBtn.onclick = () => {
        setMastery(selectedId, 'yes');
        renderPanel(true);
        toast(mState(selectedId) === 'yes' ? '已标记为已掌握 ✓' : '已取消标记');
      };
      panelBody.querySelector('#assess-bad').onclick = () => {
        setMastery(selectedId, 'no');
        renderPanel(true);
        toast(mState(selectedId) === 'no' ? '已标记为还不会，可以试试「帮我找原因」' : '已取消标记');
      };
    }
    panelBody.querySelectorAll('.chain-item').forEach(el => el.onclick = () => selectTopic(el.dataset.id));
    panelBody.querySelectorAll('.drill-ans-btn').forEach(btn => btn.onclick = () => {
      const item = btn.closest('.drill-item');
      const open = item.classList.toggle('open');
      btn.textContent = open ? '收起答案' : '查看答案（先自己做完再对）';
    });
    panelBody.querySelectorAll('[data-course-url]').forEach(el => el.onclick = () => {
      openCourse(selectedId, el.dataset.courseUrl, el.dataset.courseTitle);
    });
  }

  // ---------- 错因回溯（诊断模式，面板内） ----------
  function renderDiag() {
    const root = topicById.get(diagRootId);
    if (!root) return;
    const chain = collectChain(diagRootId, prereqsOf);
    const list = [...chain.entries()].sort((a, b) => {
      const ta = topicById.get(a[0]), tb = topicById.get(b[0]);
      return tb.gradeRangeStart - ta.gradeRangeStart;
    });
    const rows = list.map(([id, e]) => {
      const t = topicById.get(id);
      const m = mState(id);
      return `<div class="diag-row" data-id="${id}">
        <div class="dr-head">
          <span class="dr-name" style="color:${t._color}">${esc(t.name)}</span>
          <span class="dr-grade">${gradeTxtOf(t)}</span>
        </div>
        <div class="dr-reason">为什么相关：${esc(e.reason || '后续学习以它为基础')}</div>
        <div class="dr-btns">
          <button class="no ${m === 'no' ? 'active' : ''}" data-id="${id}" data-v="no">不会</button>
          <button class="yes ${m === 'yes' ? 'active' : ''}" data-id="${id}" data-v="yes">会</button>
        </div>
      </div>`;
    }).join('');
    panelBody.innerHTML = `
      <button id="panel-close" title="关闭">×</button>
      <h2 style="color:${root._color}">错因回溯：${esc(root.name)}</h2>
      <div class="desc" style="color:var(--text-dim);font-size:12.5px">学不会往往是因为前面的基础有缺口。下面是「${esc(root.name)}」的完整先修链，逐个自评「会 / 不会」，帮你找到最根上的缺口。（自评会直接写入掌握度标记）</div>
      <div class="diag-list">${rows || '<div class="desc">这个知识点没有先修节点，它就是最基础的起点。</div>'}</div>
      <div id="diag-conclusion-slot"></div>
      <button class="diag-exit" id="diag-exit">‹ 退出，返回详情</button>
      <div style="height:20px"></div>`;
    panelBody.querySelector('#panel-close').onclick = closePanel;
    panelBody.querySelector('#diag-exit').onclick = () => { panelView = 'detail'; selectedId = diagRootId; renderPanel(); };
    panelBody.querySelectorAll('.dr-btns button').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id, v = btn.dataset.v;
        setMastery(id, v);
        const row = panelBody.querySelector(`.diag-row[data-id="${id}"]`);
        if (row) {
          const m2 = mState(id);
          row.querySelector('.yes').classList.toggle('active', m2 === 'yes');
          row.querySelector('.no').classList.toggle('active', m2 === 'no');
        }
        renderDiagConclusion();
      };
    });
    renderDiagConclusion();
  }
  function renderDiagConclusion() {
    const slot = panelBody.querySelector('#diag-conclusion-slot');
    if (!slot) return;
    const chain = collectChain(diagRootId, prereqsOf);
    let deepest = null;
    let anyNo = false, total = 0, answered = 0;
    for (const id of chain.keys()) {
      total++;
      const m = mState(id);
      if (m) answered++;
      if (m === 'no') {
        anyNo = true;
        const t = topicById.get(id);
        if (!deepest || t.gradeRangeStart < topicById.get(deepest).gradeRangeStart) deepest = id;
      }
    }
    if (deepest) {
      const t = topicById.get(deepest);
      slot.innerHTML = `<div class="diag-conclusion">

  // ---------- 补给包（导学卡/变式训练/回忆卡/产出任务；会员专享） ----------
  const PACK_DONE_KEY = 'cnk12_pack_output';

  // 导学卡（why 孩子为什么错 → rule 规律 → example 例子）
  function packGuideHtml(pack) {

  function packRecallHtml(pack) {

  // 变式训练：与 coaching.drills 合并、按题干去重（答案折叠复用 drill-item）
  function packDrills(id) {

    const pack = packByTopic.get(id);
    const seen = new Set(coachDrills.map(d => String(d.q || '').trim()));
    const extra = (pack && Array.isArray(pack.drills) ? pack.drills : [])
      .filter(d => d && d.q && !seen.has(String(d.q).trim()));

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="data:,">
<title>小满伴学 · 今日（v2 清爽工具）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: #FFFFFF;
    color: #1A2330;
    padding: 0 20px calc(92px + env(safe-area-inset-bottom, 0px));
    max-width: 480px;
    margin: 0 auto;
    font-variant-numeric: tabular-nums;
  }
  /* ---------- 顶部品牌 ---------- */
  header {
    padding: 20px 0 14px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #EDF1F6;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .logo {
    width: 26px; height: 26px; border-radius: 7px; background: #16C7B7;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 800;
  }
  .brand h1 { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
  .brand p { font-size: 10.5px; color: #9AA4B2; margin-top: 1px; }
  .date { font-size: 11px; color: #9AA4B2; text-align: right; line-height: 1.6; }
  /* ---------- 问候 ---------- */
  .hello { padding: 22px 0 18px; border-bottom: 1px solid #EDF1F6; }
  .hello .hi { font-size: 22px; font-weight: 700; letter-spacing: .2px; }
  .hello .streak { display: inline-flex; align-items: center; gap: 6px; margin-top: 9px;
    font-size: 12px; color: #4A5568; font-weight: 500; }
  .hello .streak b { color: #1A2330; font-weight: 700; }
  .hello .streak .flame { display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 5px; background: #FFF4E0; font-size: 11px; }
  /* ---------- 教练话术 ---------- */
  .coach {
    margin-top: 18px; background: #F6F8FB; border-left: 2px solid #16C7B7;
    border-radius: 0 10px 10px 0; padding: 13px 15px;
  }
  .coach .tag { font-size: 10.5px; font-weight: 700; color: #16C7B7; letter-spacing: 1.5px; margin-bottom: 6px; }
  .coach .line { font-size: 14.5px; line-height: 1.8; color: #2A3444; font-weight: 500; }
  .coach .line b { color: #0E9C8F; font-weight: 700; }
  /* ---------- 今日三件事 ---------- */
  .sec { display: flex; align-items: baseline; justify-content: space-between; padding: 24px 0 4px; }
  .sec h2 { font-size: 12px; font-weight: 700; color: #9AA4B2; letter-spacing: 2px; }
  .sec span { font-size: 11px; color: #B4BCC8; }
  .tasks { border-top: 1px solid #EDF1F6; margin-top: 10px; }
  .task {
    display: flex; align-items: center; gap: 14px; padding: 15px 2px;
    border-bottom: 1px solid #EDF1F6;
  }
  .task .no { flex: 0 0 26px; font-size: 12px; font-weight: 600; color: #B4BCC8; }
  .task .main { flex: 1; min-width: 0; }
  .task .main .t { font-size: 14.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .pill { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; letter-spacing: .5px; }
  .pill.yi { color: #B98A1D; background: #FDF3D7; }
  .pill.lian { color: #0E9C8F; background: #E2F6F3; }
  .pill.xue { color: #4E9A5F; background: #E8F4EA; }
  .task .main .s { font-size: 11.5px; color: #9AA4B2; margin-top: 4px; }
  .task .go {
    flex: 0 0 auto; border: 1px solid #E2E8F0; background: #fff; cursor: pointer; font-family: inherit;
    color: #4A5568; font-size: 12px; font-weight: 600; border-radius: 8px; padding: 7px 13px;
  }
  .task.hot .go { background: #16C7B7; border-color: #16C7B7; color: #fff; }
  .task .status { flex: 0 0 auto; font-size: 11px; color: #B4BCC8; }
  /* ---------- 掌握度 ---------- */
  .mastery { margin-top: 4px; padding: 16px 2px 4px; border-top: 1px solid #EDF1F6; }
  .mastery .row { display: flex; align-items: baseline; justify-content: space-between; }
  .mastery .subj { font-size: 13px; font-weight: 600; color: #4A5568; }
  .mastery .pct { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 24px; font-weight: 700; color: #1A2330; }
  .mastery .pct small { font-size: 12px; color: #9AA4B2; font-weight: 500; margin-left: 2px; }
  .bar { height: 4px; border-radius: 2px; background: #EDF1F6; margin-top: 12px; overflow: hidden; }
  .bar i { display: block; height: 100%; width: 62%; border-radius: 2px; background: #16C7B7; }
  .mastery .meta { display: flex; justify-content: space-between; font-size: 11px; color: #9AA4B2; margin-top: 8px; }
  .mastery .meta b { color: #0E9C8F; font-weight: 600; }
  /* ---------- 底部 tab ---------- */
  nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: rgba(255,255,255,.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid #EDF1F6;
    display: flex; max-width: 480px; margin: 0 auto;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  nav a {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 0 7px; text-decoration: none; color: #9AA4B2; font-size: 10px; font-weight: 500;
  }
  nav a svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  nav a.on { color: #1A2330; font-weight: 600; }
  nav a.on svg { color: #16C7B7; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">满</div>
    <div>
      <h1>小满伴学</h1>
      <p>孩子卡在哪，今天干什么，一看就懂</p>
    </div>
  </div>
  <div class="date">7 月 24 日<br>星期四</div>
</header>

<div class="hello">
  <div class="hi">早上好</div>
  <div class="streak"><span class="flame">🔥</span>今天是连续打卡第 <b>6</b> 天</div>
</div>

<div class="coach">
  <div class="tag">教练说</div>
  <div class="line">「<b>国家监察机关</b>」概念还没吃透，今天先回忆旧题，再练新题——先回忆，后看答案。</div>
</div>

<div class="sec"><h2>今日三件事</h2><span>约 25 分钟</span></div>

<div class="tasks">
  <div class="task hot">
    <div class="no">01</div>
    <div class="main">
      <div class="t">先回忆旧题 · 2 道<span class="pill yi">忆</span></div>
      <div class="s">凭记忆作答，做完才给答案和解析</div>
    </div>
    <button class="go">开始</button>
  </div>
  <div class="task">
    <div class="no">02</div>
    <div class="main">
      <div class="t">变式训练 · 3 道<span class="pill lian">练</span></div>
      <div class="s">当前最弱：国家监察机关</div>
    </div>
    <button class="go">练习</button>
  </div>
  <div class="task">
    <div class="no">03</div>
    <div class="main">
      <div class="t">补给包 · 导学卡<span class="pill xue">学</span></div>
      <div class="s">孩子为什么错 → 规律 → 例子</div>
    </div>
    <button class="go">看卡</button>
  </div>
</div>

<div class="sec"><h2>掌握度</h2><span></span></div>

<div class="mastery">
  <div class="row">
    <div class="subj">语文 · 当前掌握度</div>
    <div class="pct">62<small>%</small></div>
  </div>
  <div class="bar"><i></i></div>
  <div class="meta"><span>在进步 · 本周 <b>+8%</b></span><span>目标 67% 达标</span></div>
</div>

<nav>
  <a class="on" href="#">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M8.5 12.3l2.4 2.4 4.6-5.2"/></svg>
    今日
  </a>
  <a href="#">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.5"/><path d="M12 1.5v3M12 19.5v3M1.5 12h3M19.5 12h3"/></svg>
    诊断
  </a>
  <a href="#">
    <svg viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 5.5l1.3 1.3L7.6 4.5M4 11.5l1.3 1.3 2.3-2.3M4 17.5l1.3 1.3 2.3-2.3"/></svg>
    计划
  </a>
  <a href="#">
    <svg viewBox="0 0 24 24"><circle cx="6" cy="18" r="2.4"/><circle cx="12" cy="6" r="2.4"/><circle cx="18.5" cy="15" r="2.4"/><path d="M7.4 16.2l3.2-8M13.9 7.6l3.4 5.6"/></svg>
    图谱
  </a>
  <a href="#">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4.5 20.5c1.5-3.5 4.3-5 7.5-5s6 1.5 7.5 5"/></svg>
    我的
  </a>
</nav>

</body>
</html>
